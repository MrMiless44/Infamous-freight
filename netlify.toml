## Netlify Configuration for Next.js app in `web/`

[build]
  # Build from repo root to support pnpm workspaces
  base = "."
  command = "corepack enable && pnpm install --frozen-lockfile --prod=false && pnpm --filter @infamous-freight/shared build && pnpm --filter web build"
  publish = "web/.next"
  # The Next.js Netlify plugin will set the functions output

[build.environment]
  NODE_VERSION = "20"
  PNPM_VERSION = "9"
  NEXT_PUBLIC_API_URL = "https://api.infamous-freight.com"
  NEXT_PUBLIC_API_BASE = "https://api.infamous-freight.com/api"

## Next.js on Netlify
[[plugins]]
  package = "@netlify/plugin-nextjs"

## Optional: Deploy static assets to 21YunBox China CDN
[[plugins]]
  package = "@21yunbox/netlify-plugin-21yunbox-deploy-to-china-cdn"
  [plugins.inputs]
    # Configure via Netlify env vars for credentials/target as per plugin docs
    # Example keys (set in Netlify UI):
    # YUNBOX_TOKEN, YUNBOX_SITE_ID
    # See: plugin README for exact inputs

## Security headers
[[headers]]
  for = "/"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

## Contexts
[context.production]
  command = "corepack enable && pnpm install --frozen-lockfile --prod=false && pnpm --filter @infamous-freight/shared build && pnpm --filter web build"
  [context.production.environment]
    NODE_ENV = "production"

[context.deploy-preview]
  command = "corepack enable && pnpm install --frozen-lockfile --prod=false && pnpm --filter @infamous-freight/shared build && pnpm --filter web build"

[context.branch-deploy]
  command = "corepack enable && pnpm install --frozen-lockfile --prod=false && pnpm --filter @infamous-freight/shared build && pnpm --filter web build"
