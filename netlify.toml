[build]
  command = "corepack enable && pnpm install --frozen-lockfile && pnpm -r --filter @infamous-freight/shared build && pnpm --filter web build"
  publish = "web/.next"

[build.environment]
  NODE_VERSION = "20"
  # Public API endpoint configuration for the web app.
  # Update these to point at the correct production API base URL for this environment.
  NEXT_PUBLIC_API_URL = "https://api.example.com"
  NEXT_PUBLIC_API_BASE = "https://api.example.com"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Optional: only keep if you truly use these
# [[plugins]]
# package = "@netlify/plugin-lighthouse"
