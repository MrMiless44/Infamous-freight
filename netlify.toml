# Netlify configuration for monorepo web deployment.
# Deploys apps/web (Next.js) from the workspace root.

[build]
  base = "."
  command = "pnpm install --frozen-lockfile && pnpm --filter web build"
  publish = "apps/web/out"

[build.environment]
  NODE_VERSION = "24"
  PNPM_VERSION = "10.15.0"
  NEXT_TELEMETRY_DISABLED = "1"
  BUILD_TARGET = "netlify"

[dev]
  command = "pnpm --filter web dev"
  port = 8888
  targetPort = 3000
  autoLaunch = false
