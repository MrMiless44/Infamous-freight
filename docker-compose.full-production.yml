version: "3.9"

# Production Docker Compose - Deploy Entire Stack
# Usage: docker-compose -f docker-compose.full-production.yml up -d

services:
  # PostgreSQL Database
  postgres:
    image: postgres:17-alpine
    container_name: infamous-freight-db-prod
    restart: always
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme123}
      POSTGRES_DB: ${DB_NAME:-infamous_freight}
      POSTGRES_HOST_AUTH_METHOD: ${DB_AUTH_METHOD:-scram-sha-256}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres} -d ${DB_NAME:-infamous_freight}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - infamous-freight-network

  # API Server
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: infamous-freight-api-prod
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3001
      API_PORT: 3001
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-changeme123}@postgres:5432/${DB_NAME:-infamous_freight}?schema=public
      JWT_SECRET: ${JWT_SECRET:-CHANGE_ME_IMMEDIATELY_32_CHARS}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000,https://infamous-freight-enterprises.vercel.app}
      AI_PROVIDER: ${AI_PROVIDER:-synthetic}
      AVATAR_STORAGE: ${AVATAR_STORAGE:-local}
      LOG_LEVEL: ${LOG_LEVEL:-info}
      SENTRY_DSN: ${SENTRY_DSN:-}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      PAYPAL_CLIENT_ID: ${PAYPAL_CLIENT_ID:-}
      PAYPAL_CLIENT_SECRET: ${PAYPAL_CLIENT_SECRET:-}
    ports:
      - "${API_PORT:-3001}:3001"
    volumes:
      - api_uploads:/app/api/uploads
      - api_logs:/app/api/logs
    healthcheck:
      test:
        ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - infamous-freight-network

  # Nginx Reverse Proxy (Optional - for SSL/domain)
  nginx:
    image: nginx:alpine
    container_name: infamous-freight-nginx-prod
    restart: always
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
    networks:
      - infamous-freight-network

volumes:
  postgres_data_prod:
    driver: local
  api_uploads:
    driver: local
  api_logs:
    driver: local

networks:
  infamous-freight-network:
    driver: bridge
