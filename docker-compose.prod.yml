version: "3.8"

# Production Docker Compose Configuration - Blue-Green Deployment
# Optimized for production with health checks and auto-restart

services:
  postgres:
    image: postgres:16-alpine
    container_name: infamous-postgres-prod
    restart: unless-stopped
    environment:
      POSTGRES_DB: infamous_freight
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - infamous-network

  redis:
    image: redis:7-alpine
    container_name: infamous-redis-prod
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis123} --maxmemory 512mb --maxmemory-policy allkeys-lru
    volumes:
      - redis_prod_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - infamous-network

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: infamous-api-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      LOG_LEVEL: info
      DATABASE_URL: postgresql://${DB_USER:-postgres}:${DB_PASSWORD:-postgres}@postgres:5432/infamous_freight
      REDIS_URL: redis://:${REDIS_PASSWORD:-redis123}@redis:6379
      JWT_SECRET: ${JWT_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      API_PORT: ${API_PORT:-4000}
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - infamous-network

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    container_name: infamous-web-prod
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: http://api:4000
    ports:
      - "3000:3000"
    depends_on:
      - api
    networks:
      - infamous-network

networks:
  infamous-network:
    driver: bridge

volumes:
  postgres_prod_data:
  redis_prod_data:
