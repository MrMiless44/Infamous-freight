version: "3.9"

# Docker Compose with Service Profiles for selective startup
# Usage:
#   docker-compose --profile api up -d      # API only
#   docker-compose --profile fullstack up -d # API + Web
#   docker-compose --profile dev up -d       # Development tools
#   docker-compose --profile monitoring up -d # Monitoring stack

services:
  # Core services (always start)
  postgres:
    profiles: [""]

  redis:
    profiles: [""]

  # Application services
  api:
    profiles: ["", "api", "fullstack"]

  web:
    profiles: ["", "web", "fullstack"]

  # Development tools (dev profile)
  pgadmin:
    profiles: ["dev", "tools"]
    image: dpage/pgadmin4:latest
    container_name: infamous_pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@infamous.local
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: "False"
      PGADMIN_CONFIG_MASTER_PASSWORD_REQUIRED: "False"
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - postgres
    networks:
      - infamous-network

  redis-commander:
    profiles: ["dev", "tools"]
    image: rediscommander/redis-commander:latest
    container_name: infamous_redis_commander
    restart: unless-stopped
    environment:
      REDIS_HOSTS: local:redis:6379:0
    ports:
      - "8081:8081"
    depends_on:
      - redis
    networks:
      - infamous-network

  # Monitoring stack (monitoring profile)
  prometheus:
    profiles: ["monitoring"]
    image: prom/prometheus:latest
    container_name: infamous_prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    networks:
      - infamous-network
    security_opt:
      - no-new-privileges:true

  grafana:
    profiles: ["monitoring"]
    image: grafana/grafana:latest
    container_name: infamous_grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_INSTALL_PLUGINS: "redis-datasource"
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - infamous-network
    security_opt:
      - no-new-privileges:true

  node-exporter:
    profiles: ["monitoring"]
    image: prom/node-exporter:latest
    container_name: infamous_node_exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - "--path.procfs=/host/proc"
      - "--path.sysfs=/host/sys"
      - "--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)"
    networks:
      - infamous-network
    security_opt:
      - no-new-privileges:true

  postgres-exporter:
    profiles: ["monitoring"]
    image: prometheuscommunity/postgres-exporter:latest
    container_name: infamous_postgres_exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-infamous_freight}?sslmode=disable"
    ports:
      - "9187:9187"
    depends_on:
      - postgres
    networks:
      - infamous-network
    security_opt:
      - no-new-privileges:true

volumes:
  pgadmin_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local

networks:
  infamous-network:
    driver: bridge
    name: infamous-network
