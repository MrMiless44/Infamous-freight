codecov:
  require_ci_to_pass: yes
  branch: main
  max_report_age: "12h" # equates to 12 hours
  # max_report_age can be listed in hours '#h' (hours) or '#d' (days)

coverage:
  precision: 2
  round: down
  range: "90...100"
  status:
    project:
      default:
        target: 100%
        threshold: 5%
        informational: false
    patch:
      default:
        target: 100%
        threshold: 10%
        informational: false

comment:
  layout: "reach,diff,flags,tree,betaprofiling"
  behavior: default
  require_changes: no
  require_base: no
  require_head: yes
  show_carryforward_flags: false

ignore:
  - "node_modules"
  - "coverage"
  - "dist"
  - ".next"
  - "out"
  - "**/__tests__/**"
  - "**/*.test.js"
  - "**/*.test.ts"
  - "**/*.spec.js"
  - "**/*.spec.ts"
  - "**/prisma/seed.js"
  - "**/prisma/migrations/**"

flags:
  api:
    carryforward: true
    paths:
      - api/src/
    target: 100%
    threshold: 5%
  web:
    carryforward: true
    paths:
      - web/
    target: 100%
    threshold: 5%
  shared:
    carryforward: true
    paths:
      - packages/shared/src/
    target: 100%
    threshold: 5%
