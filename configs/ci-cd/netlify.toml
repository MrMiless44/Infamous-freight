[build]
  command = "corepack enable && pnpm install --no-frozen-lockfile && pnpm -C web build"
  publish = "web/.next"

[build.environment]
  NODE_VERSION = "24"
  NPM_FLAGS = "--version"
  PNPM_HOME = "/opt/buildhome/.pnpm"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[[plugins]]
  package = "@21yunbox/netlify-plugin-21yunbox-deploy-to-china-cdn"
