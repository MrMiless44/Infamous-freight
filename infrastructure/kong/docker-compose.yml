version: "3.8"

services:
  # PostgreSQL for Kong database
  kong-db:
    image: postgres:15-alpine
    container_name: kong-db
    environment:
      POSTGRES_DB: kong
      POSTGRES_USER: kong
      POSTGRES_PASSWORD: ${KONG_DB_PASSWORD:-kong}
    volumes:
      - kong-db-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "kong"]
      interval: 30s
      timeout: 5s
      retries: 5
    networks:
      - infamous

  # Kong migration
  kong-migration:
    image: kong:3.0-alpine
    container_name: kong-migration
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-db
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: ${KONG_DB_PASSWORD:-kong}
    command: kong migrations bootstrap
    depends_on:
      kong-db:
        condition: service_healthy
    networks:
      - infamous

  # Kong API Gateway
  kong:
    image: kong:3.0-alpine
    container_name: kong-api
    environment:
      KONG_DATABASE: postgres
      KONG_PG_HOST: kong-db
      KONG_PG_USER: kong
      KONG_PG_PASSWORD: ${KONG_DB_PASSWORD:-kong}
      KONG_PROXY_ACCESS_LOG: /dev/stdout
      KONG_ADMIN_ACCESS_LOG: /dev/stdout
      KONG_PROXY_ERROR_LOG: /dev/stderr
      KONG_ADMIN_ERROR_LOG: /dev/stderr
      KONG_ADMIN_LISTEN: 0.0.0.0:8001
      KONG_LOG_LEVEL: info
      KONG_TRUSTED_IPS: 0.0.0.0/0
      KONG_REAL_IP_HEADER: X-Forwarded-For
      KONG_REAL_IP_RECURSIVE: "on"
    ports:
      - "8000:8000" # Proxy
      - "8001:8001" # Admin
      - "8443:8443" # Proxy HTTPS
    depends_on:
      - kong-db
      - kong-migration
    healthcheck:
      test: ["CMD", "kong", "health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - infamous
    volumes:
      - ./kong/plugins:/usr/local/share/lua/5.1/kong/plugins
      - ./kong/config:/etc/kong

  # Konga - Kong Admin UI
  konga:
    image: pantsel/konga:latest
    container_name: konga
    environment:
      NODE_ENV: production
      DB_ADAPTER: postgres
      DB_HOST: kong-db
      DB_USER: kong
      DB_PASSWORD: ${KONG_DB_PASSWORD:-kong}
      DB_DATABASE: konga
      KONGA_LOG_LEVEL: debug
    ports:
      - "1337:1337"
    depends_on:
      - kong-db
      - kong
    networks:
      - infamous

volumes:
  kong-db-data:

networks:
  infamous:
    driver: bridge
