AWSTemplateFormatVersion: "2010-09-09"
Description: "CloudFront CDN Configuration for Infamous Freight Enterprises"

Parameters:
  DomainName:
    Type: String
    Default: "infamousfreight.com"
    Description: "Primary domain name"

  CertificateArn:
    Type: String
    Description: "ARN of ACM certificate for HTTPS (must be in us-east-1)"

  OriginDomain:
    Type: String
    Default: "infamous-freight.netlify.app"
    Description: "Origin domain for Next.js app"

Resources:
  # S3 Bucket for Static Assets
  StaticAssetsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${DomainName}-static-assets"
      AccessControl: Private
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldVersions
            Status: Enabled
            NoncurrentVersionExpirationInDays: 30
      CorsConfiguration:
        CorsRules:
          - AllowedOrigins:
              - !Sub "https://${DomainName}"
              - !Sub "https://www.${DomainName}"
            AllowedMethods:
              - GET
              - HEAD
            AllowedHeaders:
              - "*"
            MaxAge: 3600

  # CloudFront Origin Access Identity
  CloudFrontOAI:
    Type: AWS::CloudFront::CloudFrontOriginAccessIdentity
    Properties:
      CloudFrontOriginAccessIdentityConfig:
        Comment: !Sub "OAI for ${DomainName}"

  # S3 Bucket Policy
  StaticAssetsBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref StaticAssetsBucket
      PolicyDocument:
        Statement:
          - Sid: AllowCloudFrontOAI
            Effect: Allow
            Principal:
              CanonicalUser: !GetAtt CloudFrontOAI.S3CanonicalUserId
            Action: "s3:GetObject"
            Resource: !Sub "${StaticAssetsBucket.Arn}/*"

  # CloudFront Distribution
  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        Comment: !Sub "CDN for ${DomainName}"
        Aliases:
          - !Ref DomainName
          - !Sub "www.${DomainName}"

        # Origins
        Origins:
          # Next.js App Origin
          - Id: NextJsOrigin
            DomainName: !Ref OriginDomain
            CustomOriginConfig:
              HTTPPort: 80
              HTTPSPort: 443
              OriginProtocolPolicy: https-only
              OriginSSLProtocols:
                - TLSv1.2
                - TLSv1.3
            OriginCustomHeaders:
              - HeaderName: X-Forwarded-Host
                HeaderValue: !Ref DomainName

          # S3 Static Assets Origin
          - Id: S3Origin
            DomainName: !GetAtt StaticAssetsBucket.DomainName
            S3OriginConfig:
              OriginAccessIdentity: !Sub "origin-access-identity/cloudfront/${CloudFrontOAI}"

        # Default cache behavior (Next.js pages)
        DefaultCacheBehavior:
          TargetOriginId: NextJsOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
            - OPTIONS
            - PUT
            - POST
            - PATCH
            - DELETE
          CachedMethods:
            - GET
            - HEAD
            - OPTIONS
          Compress: true
          ForwardedValues:
            QueryString: true
            Cookies:
              Forward: all
            Headers:
              - Accept
              - Accept-Language
              - Authorization
              - CloudFront-Forwarded-Proto
              - Host
              - User-Agent
          MinTTL: 0
          DefaultTTL: 0
          MaxTTL: 31536000

        # Cache behaviors
        CacheBehaviors:
          # Next.js static files (_next/static/*)
          - PathPattern: "_next/static/*"
            TargetOriginId: NextJsOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
            CachedMethods:
              - GET
              - HEAD
            Compress: true
            ForwardedValues:
              QueryString: false
              Cookies:
                Forward: none
            MinTTL: 31536000
            DefaultTTL: 31536000
            MaxTTL: 31536000

          # Static assets from S3
          - PathPattern: "static/*"
            TargetOriginId: S3Origin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
            CachedMethods:
              - GET
              - HEAD
            Compress: true
            ForwardedValues:
              QueryString: false
              Cookies:
                Forward: none
            MinTTL: 2592000
            DefaultTTL: 2592000
            MaxTTL: 31536000

          # API requests (no caching)
          - PathPattern: "api/*"
            TargetOriginId: NextJsOrigin
            ViewerProtocolPolicy: redirect-to-https
            AllowedMethods:
              - GET
              - HEAD
              - OPTIONS
              - PUT
              - POST
              - PATCH
              - DELETE
            CachedMethods:
              - GET
              - HEAD
            Compress: true
            ForwardedValues:
              QueryString: true
              Cookies:
                Forward: all
              Headers:
                - "*"
            MinTTL: 0
            DefaultTTL: 0
            MaxTTL: 0

        # Custom error responses
        CustomErrorResponses:
          - ErrorCode: 404
            ResponseCode: 404
            ResponsePagePath: /404.html
            ErrorCachingMinTTL: 300
          - ErrorCode: 500
            ResponseCode: 500
            ResponsePagePath: /500.html
            ErrorCachingMinTTL: 60
          - ErrorCode: 503
            ResponseCode: 503
            ResponsePagePath: /503.html
            ErrorCachingMinTTL: 10

        # SSL/TLS Configuration
        ViewerCertificate:
          AcmCertificateArn: !Ref CertificateArn
          SslSupportMethod: sni-only
          MinimumProtocolVersion: TLSv1.2_2021

        # HTTP/2 and HTTP/3
        HttpVersion: http2and3

        # Price class (use all edge locations for best performance)
        PriceClass: PriceClass_All

        # Logging
        Logging:
          Bucket: !GetAtt LogsBucket.DomainName
          Prefix: cloudfront/
          IncludeCookies: false

  # S3 Bucket for CloudFront Logs
  LogsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${DomainName}-cloudfront-logs"
      AccessControl: LogDeliveryWrite
      LifecycleConfiguration:
        Rules:
          - Id: DeleteOldLogs
            Status: Enabled
            ExpirationInDays: 90

Outputs:
  CloudFrontDistributionId:
    Description: "CloudFront Distribution ID"
    Value: !Ref CloudFrontDistribution
    Export:
      Name: !Sub "${AWS::StackName}-DistributionId"

  CloudFrontDomainName:
    Description: "CloudFront Distribution Domain Name"
    Value: !GetAtt CloudFrontDistribution.DomainName
    Export:
      Name: !Sub "${AWS::StackName}-DomainName"

  StaticAssetsBucketName:
    Description: "S3 Bucket for Static Assets"
    Value: !Ref StaticAssetsBucket
    Export:
      Name: !Sub "${AWS::StackName}-AssetsBucket"

  DNSConfiguration:
    Description: "DNS Configuration Instructions"
    Value: !Sub |
      Create CNAME records:
      ${DomainName} -> ${CloudFrontDistribution.DomainName}
      www.${DomainName} -> ${CloudFrontDistribution.DomainName}
