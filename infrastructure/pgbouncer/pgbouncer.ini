[databases]
infamous_freight = host=postgres-primary port=5432 dbname=infamous_freight user=app_user password=${DB_PASSWORD}
infamous_freight_read = host=postgres-read-replica port=5432 dbname=infamous_freight user=app_read password=${DB_PASSWORD}

[pgbouncer]
pool_mode = transaction
max_client_conn = 1000
default_pool_size = 25
min_pool_size = 10
reserve_pool_size = 5
reserve_pool_timeout = 3

max_db_connections = 100
max_user_connections = 100

server_lifetime = 3600
server_idle_timeout = 600
server_connect_timeout = 15
server_login_retry = 15

client_idle_timeout = 900
client_login_timeout = 60

query_timeout = 0
query_wait_timeout = 120
idle_in_transaction_session_timeout = 0

dns_max_ttl = 15
dns_nxdomain_ttl = 15

auth_type = md5
auth_file = /etc/pgbouncer/userlist.txt
auth_user = bouncer
auth_query = SELECT usename, passwd FROM pg_shadow WHERE usename=$1

stats_users = stats
admin_users = pgbouncer_admin

logfile = /var/log/pgbouncer/pgbouncer.log
pidfile = /var/run/pgbouncer/pgbouncer.pid
listen_port = 6432
listen_addr = 0.0.0.0
unix_socket_dir = /var/run/pgbouncer
unix_socket_mode = 0777

verbose = 1
log_connections = 1
log_disconnections = 1
log_pooler_errors = 1
log_statements = 1

# Connection monitoring
check_query = select 1
check_query_interval = 10
check_query_timeout = 1

# Maintenance
maintenance_db = postgres
maintenance_user = bouncer

# Replication awareness
replication_user = replicator

application_name_add_host = 1
server_round_robin = false
