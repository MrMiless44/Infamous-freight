auth_enabled: false

ingester:
  chunk_idle_period: 3m
  chunk_retain_period: 1m
  max_chunk_age: 1h
  chunk_encoding: snappy
  max_concurrent_flushes: 10

limits_config:
  enforce_metric_name: false
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  ingestion_rate_mb: 100
  ingestion_burst_size_mb: 200
  max_streams_per_user: 10000
  max_entries_limit_per_minute: 1000000

schema_config:
  configs:
    - from: 2020-10-24
      store: boltdb-shipper
      object_store: filesystem
      schema: v11
      index:
        prefix: index_
        period: 24h

server:
  http_listen_port: 3100
  log_level: info
  log_format: json

storage_config:
  boltdb_shipper:
    active_index_directory: /loki/boltdb-shipper-active
    shared_store: filesystem
    cache_location: /loki/boltdb-shipper-cache
  filesystem:
    directory: /loki/chunks

chunk_store_config:
  max_look_back_period: 0s

table_manager:
  retention_deletes_enabled: false
  retention_period: 0s

query_range:
  align_queries_with_step: true
  max_cache_freshness_per_query: 10m
  cache_results: true
  results_cache:
    cache:
      enable_fifocache: true
      default_validity: 10m
      enable_compression: true

frontend:
  compress_responses: true
  log_queries_longer_than: 1s
  downstream_url: http://loki-backend:3100

# Retention
retention_config:
  enabled: true
  default: 30d
  rules:
    - selector: '{severity="debug"}'
      period: 7d
    - selector: '{severity="info"}'
      period: 30d
    - selector: '{severity="warning"}'
      period: 90d
    - selector: '{severity="error"}'
      period: 180d
