apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: infamous-freight
  namespace: default
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.infamousfreight.com
        - app.infamousfreight.com
      secretName: infamous-freight-tls
  rules:
    - host: api.infamousfreight.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: infamous-freight-api
                port:
                  number: 80
    - host: app.infamousfreight.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: infamous-freight-web
                port:
                  number: 80
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: admin@infamousfreight.com
    privateKeySecretRef:
      name: letsencrypt-prod
    solvers:
      - http01:
          ingress:
            class: nginx
