---
- name: Harden SSH daemon configuration
  hosts: all
  serial: 1
  become: true
  gather_facts: true

  vars:
    sshd_config_path: /etc/ssh/sshd_config
    ssh_service_name: "{{ 'ssh' if ansible_os_family == 'Debian' else 'sshd' }}"

  handlers:
    - name: Restart SSH service
      ansible.builtin.service:
        name: "{{ ssh_service_name }}"
        state: restarted

  tasks:
    - name: Enforce secure SSH daemon settings
      ansible.builtin.lineinfile:
      ansible.builtin.blockinfile:
        path: "{{ sshd_config_path }}"
        create: false
        backup: true
        marker: "# {mark} ANSIBLE MANAGED SSH HARDENING"
        block: |
          PermitRootLogin no
          PasswordAuthentication no
          PubkeyAuthentication yes
          ChallengeResponseAuthentication no
          KbdInteractiveAuthentication no
          UsePAM yes
          MaxAuthTries 3
          LoginGraceTime 30
          X11Forwarding no
          AllowTcpForwarding no
        validate: "/usr/sbin/sshd -t -f %s"
      notify: Restart SSH service

    - name: Ensure SSH daemon is enabled and running
      ansible.builtin.service:
        name: "{{ ssh_service_name }}"
        enabled: true
        state: started
