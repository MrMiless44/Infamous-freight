# INFÆMOUS FREIGHT - Load Balancer Docker Compose Configuration
# Version: 1.0.0
# Purpose: Production load balancing with NGINX

version: '3.8'

services:
  # NGINX Load Balancer
  nginx:
    image: nginx:1.25-alpine
    container_name: infæmous-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"  # Status endpoint (internal only)
    volumes:
      # NGINX configuration
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      
      # SSL certificates (replace with your actual certs)
      - ./ssl:/etc/nginx/ssl:ro
      
      # Cache directory
      - nginx_cache:/var/cache/nginx
      
      # Logs
      - nginx_logs:/var/log/nginx
      
      # Let's Encrypt challenge directory
      - ./certbot/www:/var/www/certbot:ro
    networks:
      - infæmous_network
    depends_on:
      - api-1
      - api-2
      - web-1
      - web-2
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 256M

  # API Instance 1
  api-1:
    build:
      context: .
      dockerfile: Dockerfile.optimized
      target: api-runner
    container_name: infæmous-api-1
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - API_PORT=4000
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
    networks:
      - infæmous_network
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # API Instance 2
  api-2:
    build:
      context: .
      dockerfile: Dockerfile.optimized
      target: api-runner
    container_name: infæmous-api-2
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - API_PORT=4000
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
    networks:
      - infæmous_network
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # API Instance 3 (Backup)
  api-3:
    build:
      context: .
      dockerfile: Dockerfile.optimized
      target: api-runner
    container_name: infæmous-api-3
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - API_PORT=4000
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_REFRESH_SECRET=${JWT_REFRESH_SECRET}
    networks:
      - infæmous_network
    depends_on:
      - postgres
      - redis
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    profiles:
      - high-availability  # Only start with --profile high-availability

  # Web Instance 1
  web-1:
    build:
      context: .
      dockerfile: Dockerfile.optimized
      target: web-runner
    container_name: infæmous-web-1
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - WEB_PORT=3000
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    networks:
      - infæmous_network
    depends_on:
      - api-1
      - api-2
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Web Instance 2
  web-2:
    build:
      context: .
      dockerfile: Dockerfile.optimized
      target: web-runner
    container_name: infæmous-web-2
    restart: unless-stopped
    environment:
      - NODE_ENV=production
      - WEB_PORT=3000
      - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
    networks:
      - infæmous_network
    depends_on:
      - api-1
      - api-2
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: infæmous-postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB:-infamousfreight}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./apps/api/prisma/schema.prisma:/docker-entrypoint-initdb.d/schema.prisma:ro
    networks:
      - infæmous_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: infæmous-redis
    restart: unless-stopped
    command: >
      redis-server 
      --maxmemory 2gb 
      --maxmemory-policy allkeys-lru 
      --maxclients 10000
      --save 900 1
      --save 300 10
      --save 60 10000
    volumes:
      - redis_data:/data
    networks:
      - infæmous_network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 2G
        reservations:
          cpus: '0.25'
          memory: 512M

  # Let's Encrypt Certbot
  certbot:
    image: certbot/certbot:latest
    container_name: infæmous-certbot
    volumes:
      - ./ssl:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - infæmous_network
    profiles:
      - ssl  # Only start with --profile ssl

networks:
  infæmous_network:
    driver: bridge
    ipam:
      config:
        - subnet: 172.28.0.0/16

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  nginx_cache:
    driver: local
  nginx_logs:
    driver: local
