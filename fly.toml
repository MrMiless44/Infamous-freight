app = "infamous-freight-db"
primary_region = "iad"

[build]
image = "registry.fly.io/infamous-freight:deployment-67dd98202ad8fd8f97666d2a301dc4e2"

[http_service]
auto_start_machines = true
auto_stop_machines = true
force_https = true
internal_port = 3000
min_machines_running = 0
processes = [ "app" ]

[[vm]]
