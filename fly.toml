# fly.toml app configuration file generated for infamous-freight-enterprises-64t-nw on 2026-01-12T12:16:25Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'infamous-freight-api'
primary_region = 'iad'

[build]

[env]
  API_PORT = "3001"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024

[[services]]
  protocol = "tcp"
  internal_port = 3001
  processes = ["app"]

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]
