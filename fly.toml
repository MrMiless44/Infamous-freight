# fly.toml app configuration for production API deployment.
#
# This root config is used by CI/CD deploy commands such as:
# flyctl deploy -a infamous-freight --config fly.toml

app = "infamous-freight-db"
primary_region = "iad"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 2048
