name: Uptime Check

on:
  schedule:
    # Run every 5 minutes
    - cron: "*/5 * * * *"

  # Allow manual trigger
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${ github.ref }-${ github.workflow }
  cancel-in-progress: false

jobs:
  health-check:
    runs-on: ubuntu-latest
    name: API Health Check

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check health endpoint
        id: health
        env:
          DOMAIN: ${{ secrets.UPTIME_DOMAIN || 'https://infamous-freight.vercel.app' }}
        run: |
          echo "🔍 Checking health endpoint..."
          RESPONSE=$(curl -s -w "\n%{http_code}" "${DOMAIN}/api/health")
          HTTP_CODE=$(echo "$RESPONSE" | tail -n1)
          BODY=$(echo "$RESPONSE" | head -n1)

          echo "HTTP Status: $HTTP_CODE"
          echo "Response: $BODY"

          if [ "$HTTP_CODE" = "200" ]; then
            echo "✅ Health check passed"
            echo "status=success" >> $GITHUB_OUTPUT
          else
            echo "❌ Health check failed"
            echo "status=failed" >> $GITHUB_OUTPUT
            exit 1
          fi

      - name: Alert on failure - Slack
        if: failure()
        uses: slackapi/slack-github-action@v2
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "🔴 UPTIME ALERT",
              "blocks": [
                {
                  "type": "header",
                  "text": {
                    "type": "plain_text",
                    "text": "🔴 Uptime Check Failed"
                  }
                },
                {
                  "type": "section",
                  "fields": [
                    {
                      "type": "mrkdwn",
                      "text": "*Domain:*\n${{ secrets.UPTIME_DOMAIN || 'https://infamous-freight.vercel.app' }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Endpoint:*\n/api/health"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Time:*\n${{ github.event.repository.updated_at }}"
                    },
                    {
                      "type": "mrkdwn",
                      "text": "*Action:*\n<${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Details>"
                    }
                  ]
                },
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "⚠️ Production service may be down. Immediate investigation required."
                  }
                }
              ]
            }

      - name: Alert on failure - Email
        if: failure()
        uses: dawidd6/action-send-mail@v9
        with:
          server_address: ${{ secrets.MAIL_SERVER }}
          server_port: ${{ secrets.MAIL_PORT }}
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: 🔴 Production Uptime Alert - Health Check Failed
          to: ${{ secrets.UPTIME_ALERT_EMAIL }}
          from: alerts@infamousfreight.com
          body: |
            PRODUCTION ALERT

            Your Infamous Freight production service health check has failed.

            Details:
            - Time: ${{ github.event.repository.updated_at }}
            - Endpoint: ${{ secrets.UPTIME_DOMAIN || 'https://infamous-freight.vercel.app' }}/api/health
            - Status: Health check returned error

            Action Required:
            1. Check the service status dashboard
            2. Review recent deployments
            3. Check error logs in Sentry
            4. Consider rolling back to previous version

            View workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

      - name: Check response time
        if: success()
        env:
          DOMAIN: ${{ secrets.UPTIME_DOMAIN || 'https://infamous-freight.vercel.app' }}
        run: |
          echo "⏱️  Measuring response time..."
          TIME=$(curl -s -o /dev/null -w "%{time_total}" "${DOMAIN}/api/health")
          echo "Response time: ${TIME}s"

          # Alert if slow
          if (( $(echo "$TIME > 10" | bc -l) )); then
            echo "⚠️  Slow response detected: ${TIME}s"
            echo "Consider investigating database performance"
          fi

  status-check-complete:
    runs-on: ubuntu-latest
    needs: health-check
    if: always()

    steps:
      - name: Log status
        run: |
          echo "✅ Uptime check completed"
          echo "Time: $(date)"
          echo "Status: ${{ needs.health-check.result }}"
