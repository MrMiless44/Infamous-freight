name: Deploy IGFX Marketplace

on:
  workflow_dispatch:
  workflow_call:

jobs:
  deploy-igfx:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Detect IGFX app directory
        id: igfx-assets
        run: |
          if [ -f "igfx/package.json" ]; then
            echo "igfx_present=true" >> "$GITHUB_OUTPUT"
          else
            echo "igfx_present=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up pnpm
        if: steps.igfx-assets.outputs.igfx_present == 'true'
        uses: pnpm/action-setup@v4
        with:
          run_install: false

      - name: Set up Node.js
        if: steps.igfx-assets.outputs.igfx_present == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
          cache-dependency-path: igfx/pnpm-lock.yaml

      - name: Install dependencies
        if: steps.igfx-assets.outputs.igfx_present == 'true'
        run: pnpm install --frozen-lockfile
        working-directory: igfx

      - name: Build IGFX
        if: steps.igfx-assets.outputs.igfx_present == 'true'
        run: pnpm run build
        working-directory: igfx

      - name: Deploy IGFX
        if: steps.igfx-assets.outputs.igfx_present == 'true'
        run: pnpm run deploy
        working-directory: igfx

      - name: Publish skip notice
        if: steps.igfx-assets.outputs.igfx_present != 'true'
        run: |
          echo "IGFX deployment skipped (no igfx/package.json present)." >> "$GITHUB_STEP_SUMMARY"
