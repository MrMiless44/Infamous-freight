name: Refresh pnpm Lockfile

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - '.github/workflows/refresh-pnpm-lockfile.yml'
      - 'package.json'
      - 'apps/*/package.json'

permissions:
  contents: write

concurrency:
  group: refresh-pnpm-lockfile
  cancel-in-progress: true

jobs:
  refresh-lockfile:
    name: Refresh pnpm-lock.yaml
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.1.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Regenerate lockfile only
        run: pnpm install --lockfile-only

      - name: Commit lockfile if changed
        run: |
          set -euo pipefail
          if git diff --quiet -- pnpm-lock.yaml; then
            echo "pnpm-lock.yaml already up to date."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add pnpm-lock.yaml
          git commit -m "chore(deps): refresh pnpm lockfile"
          git push
