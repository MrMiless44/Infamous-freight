# Firebase CI/CD Integration
# GitHub Actions workflow for automated Firebase deployment

name: Firebase Deployment

on:
  push:
    branches:
      - main
      - staging
      - development
  pull_request:
    branches:
      - main

env:
  NODE_VERSION: "18.x"

permissions:
  contents: read

concurrency:
  group: ci-${ github.ref }-${ github.workflow }
  cancel-in-progress: false

jobs:
  # Verify Firebase configuration
  verify:
    runs-on: ubuntu-latest
    name: Verify Firebase Setup

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          npm install -g firebase-tools
          cd apps/api && npm install

      - name: Verify Firebase files
        run: |
          chmod +x scripts/verify-firebase.sh
          ./scripts/verify-firebase.sh

      - name: Check Firebase configuration
        run: |
          test -f firebase.json
          test -f .firebaserc
          test -f firestore.rules
          test -f storage.rules
          test -f firestore.indexes.json

  # Test Firebase integration
  test:
    runs-on: ubuntu-latest
    name: Test Firebase Integration
    needs: verify

    services:
      # Firebase emulator
      firebase:
        image: andreysenov/firebase-tools
        ports:
          - 8080:8080
          - 9099:9099
          - 9199:9199

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: |
          npm install -g firebase-tools
          cd apps/api && npm install

      - name: Start Firebase emulators
        run: |
          firebase emulators:start --only firestore,storage,auth &
          sleep 10
        env:
          FIRESTORE_EMULATOR_HOST: localhost:8080

      - name: Run API tests
        run: |
          cd apps/api
          npm test
        env:
          FIREBASE_PROJECT_ID: demo-test
          FIRESTORE_EMULATOR_HOST: localhost:8080
          FIREBASE_AUTH_EMULATOR_HOST: localhost:9099

  # Deploy security rules to staging
  deploy-rules-staging:
    runs-on: ubuntu-latest
    name: Deploy Rules to Staging
    needs: test
    if: github.ref == 'refs/heads/staging'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firestore rules
        run: |
          firebase deploy --only firestore:rules --project ${{ secrets.FIREBASE_PROJECT_ID_STAGING }}
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy Storage rules
        run: |
          firebase deploy --only storage:rules --project ${{ secrets.FIREBASE_PROJECT_ID_STAGING }}
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy Firestore indexes
        run: |
          firebase deploy --only firestore:indexes --project ${{ secrets.FIREBASE_PROJECT_ID_STAGING }}
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

  # Deploy security rules to production
  deploy-rules-production:
    runs-on: ubuntu-latest
    name: Deploy Rules to Production
    needs: test
    if: github.ref == 'refs/heads/main'
    environment:
      name: production
      url: https://console.firebase.google.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy Firestore rules
        run: |
          firebase deploy --only firestore:rules --project ${{ secrets.FIREBASE_PROJECT_ID_PRODUCTION }}
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy Storage rules
        run: |
          firebase deploy --only storage:rules --project ${{ secrets.FIREBASE_PROJECT_ID_PRODUCTION }}
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deploy Firestore indexes
        run: |
          firebase deploy --only firestore:indexes --project ${{ secrets.FIREBASE_PROJECT_ID_PRODUCTION }}
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Create deployment tag
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          TAG="firebase-$(date +%Y%m%d-%H%M%S)"
          git tag -a "$TAG" -m "Firebase deployment $TAG"
          git push origin "$TAG"

  # Send deployment notification
  notify:
    runs-on: ubuntu-latest
    name: Send Deployment Notification
    needs: [deploy-rules-staging, deploy-rules-production]
    if: always()

    steps:
      - name: Slack Notification - Success
        if: ${{ success() }}
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_CHANNEL: firebase-deployments
          SLACK_COLOR: good
          SLACK_TITLE: Firebase Deployment Success
          SLACK_MESSAGE: "Firebase rules deployed successfully"

      - name: Slack Notification - Failure
        if: ${{ failure() }}
        uses: rtCamp/action-slack-notify@v2
        env:
          SLACK_WEBHOOK: ${{ secrets.SLACK_WEBHOOK }}
          SLACK_CHANNEL: firebase-deployments
          SLACK_COLOR: danger
          SLACK_TITLE: Firebase Deployment Failed
          SLACK_MESSAGE: "Firebase deployment failed - check logs"

# Required GitHub Secrets:
# - FIREBASE_TOKEN: Firebase CI token (run: firebase login:ci)
# - FIREBASE_PROJECT_ID_STAGING: Staging project ID
# - FIREBASE_PROJECT_ID_PRODUCTION: Production project ID
# - SLACK_WEBHOOK: Slack webhook URL for notifications
