name: Rollback Deployment

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Environment to rollback"
        required: true
        type: choice
        options:
          - production
          - staging
      service:
        description: "Service to rollback"
        required: true
        type: choice
        options:
          - api
          - web
          - all
      version:
        description: "Target version/commit (leave empty for previous)"
        required: false

permissions:
  contents: read
  deployments: write

jobs:
  rollback:
    name: Rollback ${{ inputs.service }} to ${{ inputs.environment }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Determine rollback target
        id: target
        run: |
          if [ -z "${{ inputs.version }}" ]; then
            # Get previous successful deployment
            PREVIOUS=$(git log --oneline --grep="deployment.*success" -1 | cut -d' ' -f1)
            echo "target=$PREVIOUS" >> $GITHUB_OUTPUT
            echo "📦 Rolling back to previous: $PREVIOUS"
          else
            echo "target=${{ inputs.version }}" >> $GITHUB_OUTPUT
            echo "📦 Rolling back to: ${{ inputs.version }}"
          fi

      - name: Rollback API on Fly.io
        if: ${{ inputs.service == 'api' || inputs.service == 'all' }}
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          curl -X POST https://api.fly.io/graphql \
            -H "Authorization: Bearer $FLY_API_TOKEN" \
            -H "Content-Type: application/json" \
            -d '{
              "query": "mutation { appRollback(appId: \"infamous-freight-api\", imageRef: \"${{ steps.target.outputs.target }}\") { id } }"
            }'
          echo "✅ API rollback initiated"

      - name: Rollback Web on Vercel
        if: ${{ inputs.service == 'web' || inputs.service == 'all' }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          # Vercel rollback via CLI
          npx vercel rollback \
            --token=$VERCEL_TOKEN \
            --scope=infamous-freight
          echo "✅ Web rollback initiated"

      - name: Verify rollback
        run: |
          sleep 10
          echo "🔍 Verifying rollback..."

          # Check API
          API_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://infamous-freight-api.fly.dev/api/health")
          echo "API Status: $API_STATUS"

          # Check Web
          WEB_STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            "https://infamous-freight-enterprises.vercel.app")
          echo "Web Status: $WEB_STATUS"

      - name: Create deployment record
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.ref,
              environment: '${{ inputs.environment }}',
              description: 'Rollback to ${{ steps.target.outputs.target }}',
              auto_merge: false,
              required_contexts: [],
            });

      - name: Notify Slack
        if: always()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "🔄 Deployment Rollback",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Rollback Complete*\nService: ${{ inputs.service }}\nEnvironment: ${{ inputs.environment }}\nTarget: ${{ steps.target.outputs.target }}"
                  }
                }
              ]
            }
