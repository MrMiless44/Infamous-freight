name: "Week 2: Database & Testing"

on:
  push:
    branches: [main, develop]
    paths:
      - "apps/api/**"
      - "apps/web/**"
      - "e2e/**"
      - "packages/shared/**"
      - ".github/workflows/week-2-*.yml"
  pull_request:
    branches: [main, develop]
  schedule:
    - cron: "0 2 * * *" # Run daily at 2 AM

env:
  NODE_VERSION: "20"
  DATABASE_URL: postgresql://postgres:postgres@localhost:5432/infamous_freight_test
  REDIS_URL: redis://localhost:6379
  JWT_SECRET: test-secret-key
  CORS_ORIGINS: http://localhost:3000

jobs:
  # Job 1: Database migrations and schema validation
  database:
    name: "Database Migrations"
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: infamous_freight_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        working-directory: api
        run: npx prisma generate

      - name: Run database migrations
        working-directory: api
        run: npx prisma migrate deploy

      - name: Seed database
        working-directory: api
        run: npx prisma db seed || true

      - name: Validate schema
        working-directory: api
        run: npx prisma validate

      - name: Generate Prisma Studio snapshot
        working-directory: api
        run: npx prisma studio export --out=schema-snapshot.json || true

  # Job 2: E2E Tests with Playwright
  e2e-tests:
    name: "E2E Tests"
    runs-on: ubuntu-latest
    needs: database
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: infamous_freight_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        working-directory: e2e
        run: npx playwright install --with-deps

      - name: Setup database
        working-directory: api
        run: npx prisma migrate deploy && npx prisma db seed

      - name: Build shared package
        working-directory: packages/shared
        run: npm run build || true

      - name: Start API server
        working-directory: api
        run: npm start &
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          REDIS_URL: ${{ env.REDIS_URL }}
          JWT_SECRET: ${{ env.JWT_SECRET }}

      - name: Start Web server
        working-directory: web
        run: npm start &
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000

      - name: Wait for servers
        run: |
          npm install -g wait-on
          wait-on http://localhost:3000 http://localhost:4000 --timeout 120000

      - name: Run E2E tests
        working-directory: e2e
        run: npx playwright test --reporter=html,json
        env:
          BASE_URL: http://localhost:3000
          API_URL: http://localhost:4000

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-test-results
          path: e2e/test-results/
          retention-days: 7

      - name: Comment PR with test results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('e2e/test-results.json', 'utf8'));
            const passed = results.stats.expected;
            const failed = results.stats.unexpected;
            const comment = `## E2E Test Results\n\n- ✅ Passed: ${passed}\n- ❌ Failed: ${failed}\n\n[View full report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # Job 3: Load tests with k6 (optional)
  load-tests:
    name: "Load Testing"
    runs-on: ubuntu-latest
    needs: database
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: infamous_freight_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install k6
        run: |
          sudo apt-key adv --keyserver hkp://keyserver.ubuntu.com:80 --recv-keys C5AD17C747E3415A3642D57D77C6C491D6AC1D69
          echo "deb https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update
          sudo apt-get install k6

      - name: Install dependencies
        run: npm ci

      - name: Setup database
        working-directory: api
        run: npx prisma migrate deploy && npx prisma db seed

      - name: Start API server
        working-directory: api
        run: npm start &
        env:
          DATABASE_URL: ${{ env.DATABASE_URL }}
          REDIS_URL: ${{ env.REDIS_URL }}
          JWT_SECRET: ${{ env.JWT_SECRET }}

      - name: Wait for API
        run: |
          npm install -g wait-on
          wait-on http://localhost:4000/api/health --timeout 120000

      - name: Run load tests - Ramp-up
        working-directory: e2e
        run: k6 run load-tests/scenario-1-ramp-up.js --vus 10 --duration 30s
        env:
          BASE_URL: http://localhost:4000

      - name: Run load tests - Spike
        working-directory: e2e
        run: k6 run load-tests/scenario-2-spike.js --vus 10 --duration 30s
        env:
          BASE_URL: http://localhost:4000

  # Job 4: Code quality checks
  quality:
    name: "Code Quality"
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Lint API
        working-directory: api
        run: npm run lint || true

      - name: Lint Web
        working-directory: web
        run: npm run lint || true

      - name: Type check API
        working-directory: api
        run: npm run type-check || true

      - name: Type check Web
        working-directory: web
        run: npm run type-check || true

      - name: Format check
        run: npm run format:check || npm run format:check --workspaces || true
