# Enhanced CI Workflow with Quality Gates
name: Enhanced CI - Quality Gates

on:
  push:
    branches: ["main", "develop"]
  pull_request:
    branches: ["main", "develop"]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  # Phase 1: Validation & Guards
  validate:
    name: Repository Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Guard - No package-lock.json
        run: |
          if git ls-files '**/package-lock.json' | grep -q .; then
            echo "❌ ERROR: package-lock.json found. Use pnpm only."
            exit 1
          fi

      - name: Guard - No committed node_modules
        run: |
          if git ls-files '**/node_modules/**' | grep -q .; then
            echo "❌ ERROR: node_modules tracked in git."
            exit 1
          fi

      - name: Guard - No secrets in code
        run: |
          if git diff --cached | grep -E '(password|secret|api[_-]?key|token)' | grep -v '.example'; then
            echo "❌ ERROR: Potential secrets detected"
            exit 1
          fi

  # Phase 2: Build & Dependency Check
  build:
    name: Build & Dependencies
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @infamous-freight/shared build

      - name: Check for vulnerable dependencies
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Build all packages
        run: |
          pnpm --filter infamous-freight-api build
          pnpm --filter web build

  # Phase 3: Code Quality
  quality:
    name: Code Quality & Linting
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint - API
        run: pnpm --filter infamous-freight-api lint
        continue-on-error: false

      - name: Typecheck - All packages
        run: pnpm typecheck
        continue-on-error: false

      - name: Format check
        run: pnpm prettier --check .
        continue-on-error: true

  # Phase 4: Testing
  test:
    name: Unit & Integration Tests
    runs-on: ubuntu-latest
    needs: [validate, build]
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: infamous
          POSTGRES_PASSWORD: infamouspass
          POSTGRES_DB: infamous_freight_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Test - API
        run: pnpm --filter infamous-freight-api test
        env:
          DATABASE_URL: postgresql://infamous:infamouspass@localhost:5432/infamous_freight_test
          JWT_SECRET: test-secret-key
        continue-on-error: false

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./api/coverage/lcov.info
          flags: api
          name: api-coverage
          fail_ci_if_error: false

      - name: Report test results
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Test Results
          path: "api/junit.xml"
          reporter: jest-junit

  # Phase 5: Security Scan
  security:
    name: Security Analysis
    runs-on: ubuntu-latest
    needs: validate
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"

      - name: Upload Trivy results
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: "trivy-results.sarif"
        if: always()

  # Phase 6: E2E Tests (Optional - can be parallel)
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v2
        with:
          version: 8
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps

      - name: Run E2E tests
        run: pnpm --filter e2e test
        continue-on-error: true

      - name: Upload E2E results
        uses: actions/upload-artifact@v3
        if: always()
        with:
          name: playwright-report
          path: e2e/playwright-report/
          retention-days: 30

  # Phase 7: Summary & Status
  status:
    name: CI Status Summary
    runs-on: ubuntu-latest
    needs: [validate, build, quality, test, security]
    if: always()
    steps:
      - name: Check CI Status
        run: |
          if [[ "${{ needs.validate.result }}" == "failure" || \
                "${{ needs.build.result }}" == "failure" || \
                "${{ needs.quality.result }}" == "failure" || \
                "${{ needs.test.result }}" == "failure" ]]; then
            echo "❌ CI FAILED"
            exit 1
          fi
          echo "✅ CI PASSED"

      - name: Comment PR on failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ CI checks failed. Please review the logs above.'
            })
