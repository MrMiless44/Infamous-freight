name: Deploy Web to Fly.io

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - "packages/shared/**"
      - "Dockerfile"
      - "fly.toml"
      - ".github/workflows/deploy-web-fly.yml"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: production-web
      url: https://infamous-freight-enterprises.fly.dev
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy Web to Fly.io
        run: flyctl deploy -a infamous-freight-enterprises --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Verify Deployment
        run: |
          sleep 10
          curl -f https://infamous-freight-enterprises.fly.dev/ || exit 1
