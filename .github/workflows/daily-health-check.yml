name: Daily Health Check
on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${ github.ref }-${ github.workflow }
  cancel-in-progress: false

jobs:
  health:
    runs-on: ubuntu-latest
    steps:
      - name: Check API health
        run: curl -fsS https://infamous-freight-api.fly.dev/health
      - name: Check Web
        run: curl -fsS https://infamous-freight-enterprises.vercel.app
