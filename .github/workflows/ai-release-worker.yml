name: AI Release Worker

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ai-release-worker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332
      - uses: actions/setup-python@82c7e631bb3cdc910f68e0081d67478d79c6982d
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements-ai-workers.txt
      - name: Run release worker
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o-mini' }}
          ENABLE_DRAFT_RELEASE: ${{ vars.ENABLE_DRAFT_RELEASE || 'false' }}
        run: python workers/release/main.py
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808
        with:
          name: ai-release-worker-artifacts
          path: artifacts/
          if-no-files-found: ignore
