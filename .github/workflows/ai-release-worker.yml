name: AI Release Worker

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: ai-release-worker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: pip install -r requirements-ai-workers.txt
      - name: Run release worker
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          OPENAI_MODEL: ${{ vars.OPENAI_MODEL || 'gpt-4o-mini' }}
          ENABLE_DRAFT_RELEASE: ${{ vars.ENABLE_DRAFT_RELEASE || 'false' }}
        run: python workers/release/main.py
      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ai-release-worker-artifacts
          path: artifacts/
          if-no-files-found: ignore
