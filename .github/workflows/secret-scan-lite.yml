name: Secret Scan Lite

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${ github.ref }-${ github.workflow }
  cancel-in-progress: true

jobs:
  secret-scan:
    name: secret-scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Scan for obvious secrets
        shell: bash
        run: |
          set -euo pipefail

          if grep -RInE \
            '(api[_-]?key|aws_access_key_id|aws_secret_access_key|BEGIN (RSA|EC|OPENSSH) PRIVATE KEY|DATABASE_URL=.*:.*@)' \
            . \
            --exclude-dir=node_modules \
            --exclude-dir=.git \
            --exclude-dir=docs \
            --exclude='.env*.example' \
            --exclude='pnpm-lock.yaml'
          then
            echo "Potential secret-like material detected."
            exit 1
          fi
