name: CD Pipeline (Deploy)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy-api:
    uses: ./.github/workflows/fly-deploy.yml
    secrets: inherit

  deploy-web:
    uses: ./.github/workflows/vercel-deploy.yml
    secrets: inherit

  production-validation:
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-web]
    steps:
      - name: Validate deployed endpoints
        env:
          DEPLOYED_API_URL: ${{ secrets.STAGING_API_URL }}
          DEPLOYED_WEB_URL: ${{ secrets.STAGING_WEB_URL }}
        run: |
          if [ -n "$DEPLOYED_API_URL" ]; then
            curl -f "$DEPLOYED_API_URL"
          else
            echo "DEPLOYED_API_URL not set; skipping API validation"
          fi

          if [ -n "$DEPLOYED_WEB_URL" ]; then
            curl -f "$DEPLOYED_WEB_URL"
          else
            echo "DEPLOYED_WEB_URL not set; skipping web validation"
          fi
