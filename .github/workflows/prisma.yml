name: Prisma

on:
  pull_request:
    paths:
      - 'prisma/**'
      - 'apps/api/**'
      - 'packages/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'

concurrency:
  group: prisma-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: 20
  PNPM_VERSION: 9

jobs:
  prisma-check:
    name: Prisma Validate & Drift Guard
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: prisma_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d prisma_ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/prisma_ci?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/prisma_ci?schema=public

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prisma format
        run: pnpm --filter ./apps/api exec prisma format

      - name: Prisma validate
        run: pnpm --filter ./apps/api exec prisma validate

      - name: Prisma generate
        run: pnpm --filter ./apps/api exec prisma generate

      - name: Apply migrations
        run: pnpm --filter ./apps/api exec prisma migrate deploy

      - name: Check migration status
        run: pnpm --filter ./apps/api exec prisma migrate status
