name: Prisma Validate & Drift Guard

on:
  pull_request:
    paths:
      - 'apps/api/**'
      - 'packages/**'
      - 'prisma/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'
  push:
    branches:
      - main
    paths:
      - 'apps/api/**'
      - 'packages/**'
      - 'prisma/**'
      - 'package.json'
      - 'pnpm-lock.yaml'
      - 'pnpm-workspace.yaml'

permissions:
  contents: read

env:
  NODE_VERSION: '20'

jobs:
  prisma-check:
    name: Prisma Validate & Drift Guard
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: infamous_freight_prisma
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d infamous_freight_prisma"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/infamous_freight_prisma?schema=public

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: ${{ github.workspace }}

      - name: Prisma format
        run: pnpm exec prisma format

      - name: Prisma validate
        run: pnpm exec prisma validate

      - name: Prisma generate
        run: pnpm exec prisma generate

      - name: Prisma migrate status
        run: pnpm exec prisma migrate status
