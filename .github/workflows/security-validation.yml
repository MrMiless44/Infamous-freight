name: Security Testing & Validation

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Daily security check at 2 AM UTC
    - cron: "0 2 * * *"

concurrency:
  group: ci-${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  security-headers:
    name: Validate Security Headers
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.28.2"

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run security header tests
        run: pnpm --filter web test:security --run
        continue-on-error: true

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: security-test-results
          path: apps/web/test-results/

  dependency-check:
    name: Check Dependencies for Vulnerabilities
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.28.2"

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - name: Setup pnpm cache
        uses: actions/cache@v4
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=moderate || true

      - name: Generate SBOM (Software Bill of Materials)
        run: |
          npx @cyclonedx/npm@latest --output-file sbom.json
        continue-on-error: true

      - name: Upload SBOM
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sbom
          path: sbom.json

  csp-check:
    name: Validate Content Security Policy
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Validate CSP Header
        run: |
          CSP=$(grep -oP 'Content-Security-Policy.*(?=.;)' apps/web/proxy.ts | head -1)

          # Check for required directives
          if [[ ! $CSP =~ "default-src" ]]; then
            echo "❌ Missing default-src directive"
            exit 1
          fi

          if [[ ! $CSP =~ "script-src" ]]; then
            echo "❌ Missing script-src directive"
            exit 1
          fi

          if [[ ! $CSP =~ "style-src" ]]; then
            echo "❌ Missing style-src directive"
            exit 1
          fi

          echo "✅ CSP validation passed"

  rate-limit-test:
    name: Test Rate Limiting
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: "10.28.2"

      - name: Install dependencies
        working-directory: apps/api
        run: pnpm install --frozen-lockfile

      - name: Test rate limiting
        working-directory: apps/api
        env:
          REDIS_URL: redis://localhost:6379
          DATABASE_URL: postgresql://postgres:test@localhost:5432/test_db
        run: |
          # Simple rate limiting test
          node -e "
          const rateLimit = require('./src/middleware/rateLimitRedis.js');
          console.log('Rate limiter module loaded:', !!rateLimit);
          "

  sentry-config:
    name: Validate Sentry Configuration
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4

      - name: Check Sentry initialization
        run: |
          if grep -q "Sentry.init" apps/web/src/lib/sentry.ts; then
            echo "✅ Sentry initialization found"
          else
            echo "⚠️  Sentry initialization not found"
            exit 1
          fi

      - name: Verify Sentry in _app.tsx
        run: |
          if grep -q "import.*Sentry" apps/web/pages/_app.tsx; then
            echo "✅ Sentry imported in _app.tsx"
          fi

  markdown-lint:
    name: Lint Markdown Documentation
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install markdownlint
        run: npm install -g markdownlint-cli2

      - name: Lint markdown files
        run: |
          markdownlint-cli2 "**/*.md" || true
        continue-on-error: true

      - name: Report markdown issues
        run: |
          echo "## Markdown Linting Report" >> $GITHUB_STEP_SUMMARY
          markdownlint-cli2 "**/*.md" >> $GITHUB_STEP_SUMMARY 2>&1 || true

  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [security-headers, dependency-check, csp-check, sentry-config]
    if: always()

    steps:
      - name: Create Security Report
        run: |
          echo "# 🔒 Security Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Status" >> $GITHUB_STEP_SUMMARY
          echo "- Security Headers: ${{ needs.security-headers.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Dependencies: ${{ needs.dependency-check.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- CSP Configuration: ${{ needs.csp-check.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Sentry Config: ${{ needs.sentry-config.result }}" >> $GITHUB_STEP_SUMMARY

      - name: Fail if critical tests failed
        if: |
          needs.security-headers.result == 'failure' ||
          needs.csp-check.result == 'failure' ||
          needs.sentry-config.result == 'failure'
        run: exit 1
