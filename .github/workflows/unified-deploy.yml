name: Unified Deploy Pipeline (Vercel + Fly.io)

on:
  push:
    branches: ["main"]
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read
  deployments: write
  pull-requests: write

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  SHARED_PACKAGE: "@infamous-freight/shared"

jobs:
  # ============================================
  # PHASE 1: Pre-flight validation
  # ============================================
  validate:
    name: Pre-Deployment Validation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    outputs:
      shared_changed: ${{ steps.detect.outputs.shared_changed }}
      api_changed: ${{ steps.detect.outputs.api_changed }}
      web_changed: ${{ steps.detect.outputs.web_changed }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8.15.9

      - name: Detect changes
        id: detect
        run: |
          # Check what changed since last commit
          if git diff HEAD~1 --name-only | grep -q "packages/shared/"; then
            echo "shared_changed=true" >> $GITHUB_OUTPUT
          fi
          if git diff HEAD~1 --name-only | grep -q "api/"; then
            echo "api_changed=true" >> $GITHUB_OUTPUT
          fi
          if git diff HEAD~1 --name-only | grep -q "web/"; then
            echo "web_changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Install dependencies
        env:
          HUSKY: 0
        run: pnpm install --frozen-lockfile

      - name: Lint check
        run: pnpm lint

      - name: Type check
        run: pnpm check:types

      - name: Security audit
        run: npm audit --audit-level=moderate || true

      - name: Verify no secrets in code
        run: |
          if git diff HEAD~1 | grep -E 'AWS_SECRET|API_KEY|PRIVATE_KEY'; then
            echo "❌ Secrets detected in code!"
            exit 1
          fi
          echo "✅ No secrets detected"

  # ============================================
  # PHASE 2: Build & Test
  # ============================================
  build-and-test:
    name: Build & Test
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        env:
          HUSKY: 0
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        if: needs.validate.outputs.shared_changed == 'true'
        run: pnpm --filter "${{ env.SHARED_PACKAGE }}" build

      - name: Build API
        if: needs.validate.outputs.api_changed == 'true'
        run: pnpm --filter api build

      - name: Build Web
        if: needs.validate.outputs.web_changed == 'true'
        run: pnpm --filter web build

      - name: Run API tests
        if: needs.validate.outputs.api_changed == 'true'
        run: pnpm --filter api test:coverage

      - name: Run E2E tests
        run: pnpm test:e2e
        continue-on-error: true

      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./api/coverage/lcov.info
          flags: api
          fail_ci_if_error: false

  # ============================================
  # PHASE 3: Deploy to Vercel (Web)
  # ============================================
  deploy-web:
    name: Deploy Web to Vercel
    needs: [validate, build-and-test]
    if: needs.validate.outputs.web_changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production-web
      url: https://infamous-freight-enterprises.vercel.app
    permissions:
      contents: read
      deployments: write

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        env:
          HUSKY: 0
        run: pnpm install --frozen-lockfile

      - name: Build shared
        run: pnpm --filter "${{ env.SHARED_PACKAGE }}" build

      - name: Build and deploy to Vercel
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          NEXT_PUBLIC_API_URL: ${{ secrets.NEXT_PUBLIC_API_URL }}
        run: |
          pnpm install -g vercel@latest
          vercel pull --yes --environment=production --token=$VERCEL_TOKEN
          vercel build --prod --token=$VERCEL_TOKEN
          DEPLOY_URL=$(vercel deploy --prod --prebuilt --token=$VERCEL_TOKEN)
          echo "deploy_url=$DEPLOY_URL" >> $GITHUB_ENV

      - name: Health check - Vercel
        run: |
          for i in {1..10}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://infamous-freight-enterprises.vercel.app/api/health)
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ Web app healthy (HTTP $HTTP_CODE)"
              exit 0
            fi
            echo "⏳ Attempt $i/10 (HTTP $HTTP_CODE)"
            sleep 5
          done
          echo "❌ Health check failed"
          exit 1

  # ============================================
  # PHASE 4: Deploy to Fly.io (API)
  # ============================================
  deploy-api:
    name: Deploy API to Fly.io
    needs: [validate, build-and-test]
    if: needs.validate.outputs.api_changed == 'true' || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production-api
      url: https://infamous-freight-api.fly.dev

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8.15.9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install Fly CLI
        run: curl -L https://fly.io/install.sh | sh

      - name: Deploy to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          $HOME/.fly/bin/flyctl deploy --remote-only --yes

      - name: Health check - Fly.io
        run: |
          for i in {1..10}; do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" https://infamous-freight-api.fly.dev/api/health)
            if [ "$HTTP_CODE" = "200" ]; then
              echo "✅ API healthy (HTTP $HTTP_CODE)"
              exit 0
            fi
            echo "⏳ Attempt $i/10 (HTTP $HTTP_CODE)"
            sleep 5
          done
          echo "❌ Health check failed"
          exit 1

  # ============================================
  # PHASE 5: Post-deployment validation
  # ============================================
  post-deploy-validation:
    name: Post-Deployment Validation
    needs: [deploy-web, deploy-api]
    if: always()
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - name: Run smoke tests
        run: |
          echo "✅ Checking API connectivity..."
          curl -f https://infamous-freight-api.fly.dev/api/health || exit 1

          echo "✅ Checking Web app..."
          curl -f https://infamous-freight-enterprises.vercel.app || exit 1

      - name: Create deployment summary
        if: always()
        run: |
          echo "## 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Web**: https://infamous-freight-enterprises.vercel.app" >> $GITHUB_STEP_SUMMARY
          echo "- **API**: https://infamous-freight-api.fly.dev" >> $GITHUB_STEP_SUMMARY
          echo "- **Timestamp**: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deployment validation failed!"
          exit 1
