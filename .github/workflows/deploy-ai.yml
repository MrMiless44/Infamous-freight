name: Deploy Genesis AI

on:
  workflow_dispatch:
  workflow_call:

jobs:
  deploy-ai:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Detect Genesis AI deployment assets
        id: genesis-assets
        run: |
          if [ -f "ai/Dockerfile" ]; then
            echo "dockerfile=true" >> "$GITHUB_OUTPUT"
          else
            echo "dockerfile=false" >> "$GITHUB_OUTPUT"
          fi

          if [ -f "ai/fly.toml" ]; then
            echo "fly_config=true" >> "$GITHUB_OUTPUT"
          else
            echo "fly_config=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Docker Buildx
        if: steps.genesis-assets.outputs.dockerfile == 'true'
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: steps.genesis-assets.outputs.dockerfile == 'true'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Normalize GHCR owner
        if: steps.genesis-assets.outputs.dockerfile == 'true'
        run: echo "GHCR_OWNER=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_ENV"

      - name: Build and push Genesis AI image
        if: steps.genesis-assets.outputs.dockerfile == 'true'
        uses: docker/build-push-action@v6
        with:
          context: ./ai
          push: true
          tags: ghcr.io/${{ env.GHCR_OWNER }}/genesis-ai:latest
          cache-from: type=registry,ref=ghcr.io/${{ env.GHCR_OWNER }}/genesis-ai:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ env.GHCR_OWNER }}/genesis-ai:buildcache,mode=max

      - name: Set up Fly.io CLI
        if: steps.genesis-assets.outputs.fly_config == 'true'
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy Genesis AI
        if: steps.genesis-assets.outputs.fly_config == 'true'
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        working-directory: ai
        run: flyctl deploy --remote-only

      - name: Publish skip notice
        if: steps.genesis-assets.outputs.dockerfile != 'true' && steps.genesis-assets.outputs.fly_config != 'true'
        run: |
          echo "Genesis AI deployment skipped (no ai/Dockerfile or ai/fly.toml present)." >> "$GITHUB_STEP_SUMMARY"
