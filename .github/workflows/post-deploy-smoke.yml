cd /workspaces/Infamous-freight-enterprises
gh auth login --with-token
# choose GitHub.com → HTTPS → paste PAT (scopes: repo, workflow) when promptedname: Post-Deploy Smoke Tests

on:
  workflow_run:
    workflows:
      - Auto Deploy 100%
      - Unified Deploy Pipeline
      - Deploy Web to Vercel
      - deploy-api-fly
      - deploy-web
    types: [completed]
  workflow_dispatch:
  schedule:
    - cron: "0 * * * *" # hourly smoke check

permissions:
  contents: read

jobs:
  smoke:
    name: Web + API + Metrics Smoke Tests
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    timeout-minutes: 15
    steps:
      - name: Determine targets
        id: targets
        run: |
          WEB_URL="${{ secrets.WEB_URL }}"
          API_URL="${{ secrets.API_URL }}"
          METRICS_URL="${{ secrets.METRICS_URL }}"

          [ -z "$WEB_URL" ] && WEB_URL="https://infamous-freight-enterprises.vercel.app"
          [ -z "$API_URL" ] && API_URL="https://infamous-freight-api.fly.dev/api/health"
          [ -z "$METRICS_URL" ] && METRICS_URL="https://infamous-freight-api.fly.dev/api/metrics"

          echo "web_url=$WEB_URL" >> $GITHUB_OUTPUT
          echo "api_url=$API_URL" >> $GITHUB_OUTPUT
          echo "metrics_url=$METRICS_URL" >> $GITHUB_OUTPUT

      - name: Run smoke checks
        id: smoke
        run: |
          fail_count=0
          summary_rows=""

          check() {
            local name="$1"; shift
            local url="$1"; shift
            local retries=5
            local backoff=3

            echo "🔍 Checking $name -> $url"

            for i in $(seq 1 $retries); do
              code=$(curl -s -o /tmp/smoke_body -w "%{http_code}" -m 15 "$url" || true)
              time=$(curl -s -o /dev/null -w "%{time_total}" -m 15 "$url" || true)

              echo "Attempt $i/$retries: HTTP $code in ${time}s"

              if [ "$code" = "200" ]; then
                summary_rows+="| ${name} | ✅ | ${time}s | ${url} |\n"
                return 0
              fi

              sleep $backoff
            done

            summary_rows+="| ${name} | ❌ (HTTP $code) | - | ${url} |\n"
            fail_count=$((fail_count+1))
            return 1
          }

          check "Web" "${{ steps.targets.outputs.web_url }}" || true
          check "API Health" "${{ steps.targets.outputs.api_url }}" || true
          check "Metrics" "${{ steps.targets.outputs.metrics_url }}" || true

          echo "summary_rows<<'EOF'" >> $GITHUB_OUTPUT
          echo -e "$summary_rows" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          if [ $fail_count -gt 0 ]; then
            echo "status=failure" >> $GITHUB_OUTPUT
            exit 1
          else
            echo "status=success" >> $GITHUB_OUTPUT
          fi

      - name: Publish summary
        if: always()
        run: |
          echo "## 🚦 Post-Deploy Smoke Tests" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Target | Status | Response Time | URL |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|--------|---------------|-----|" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.smoke.outputs.summary_rows }}" >> $GITHUB_STEP_SUMMARY

      - name: Slack notification (failures)
        if: failure() && secrets.SLACK_WEBHOOK != ''
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "🚨 Smoke tests failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Post-deploy smoke tests failed*\n${{ github.event_name }}"
                  }
                }
              ]
            }

      - name: Create status check
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ steps.smoke.outputs.status || 'failure' }}';
            const conclusion = status === 'success' ? 'success' : 'failure';
            const sha = context.eventName === 'workflow_run'
              ? context.payload.workflow_run.head_sha
              : context.sha;

            github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'Post-Deploy Smoke',
              head_sha: sha,
              status: 'completed',
              conclusion,
              output: {
                title: 'Post-Deploy Smoke Tests',
                summary: 'Web, API health, and metrics endpoints checked',
              }
            });
