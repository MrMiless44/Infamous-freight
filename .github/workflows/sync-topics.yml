name: Sync Repository Topics

on:
  push:
    branches:
      - main
    paths:
      - .github/topics.json
  workflow_dispatch:

permissions:
  contents: read
  metadata: write

jobs:
  sync-topics:
    name: Apply topics from topics.json
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.sha }}

      - name: Read topics
        id: read
        run: |
          NAMES=$(jq -c '.names' .github/topics.json)
          echo "names=$NAMES" >> "$GITHUB_OUTPUT"

      - name: Replace repository topics
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const names = ${{ steps.read.outputs.names }};
            await github.rest.repos.replaceAllTopics({
              owner: context.repo.owner,
              repo: context.repo.repo,
              names,
            });
            core.info(`Set ${names.length} topics: ${names.join(', ')}`);
