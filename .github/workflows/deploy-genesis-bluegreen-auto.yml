name: Deploy Genesis AI (Blue/Green Auto)

on:
  push:
    branches: [main]
    paths:
      - "apps/genesis-ai/**"
      - "packages/**"
      - "pnpm-lock.yaml"

concurrency:
  group: deploy-genesis-bluegreen-auto
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PROD_DOMAIN: genesis.infamousfreight.com
      BLUE_CNAME: genesis-blue.infamousfreight.com
      GREEN_CNAME: genesis-green.infamousfreight.com
      BLUE_HEALTH: https://genesis-blue.infamousfreight.com/health
      GREEN_HEALTH: https://genesis-green.infamousfreight.com/health
      PROD_HEALTH: https://genesis.infamousfreight.com/health

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9.15.0

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter genesis-ai build

      - name: Detect active color from Cloudflare
        id: active
        run: |
          resp=$(curl -sS -X GET \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/dns_records/${{ secrets.CLOUDFLARE_RECORD_ID_GENESIS }}" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json")

          content=$(echo "$resp" | jq -r '.result.content')
          if [ "$content" = "${BLUE_CNAME}" ]; then
            echo "active=blue" >> $GITHUB_OUTPUT
            echo "target=green" >> $GITHUB_OUTPUT
          elif [ "$content" = "${GREEN_CNAME}" ]; then
            echo "active=green" >> $GITHUB_OUTPUT
            echo "target=blue" >> $GITHUB_OUTPUT
          else
            echo "Unknown prod CNAME content: $content"
            exit 1
          fi

      - name: Deploy to target color (Fly rolling)
        uses: superfly/flyctl-actions@1.5
        with:
          args: >
            deploy
            --config apps/genesis-ai/fly.${{ steps.active.outputs.target }}.toml
            --remote-only
            --strategy rolling
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Wait for target health
        run: |
          url="$GREEN_HEALTH"
          if [ "${{ steps.active.outputs.target }}" = "blue" ]; then url="$BLUE_HEALTH"; fi
          for i in {1..40}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$url" || true)
            if [ "$code" = "200" ]; then exit 0; fi
            sleep 5
          done
          exit 1

      - name: Flip production DNS to target
        run: |
          cname="$GREEN_CNAME"
          if [ "${{ steps.active.outputs.target }}" = "blue" ]; then cname="$BLUE_CNAME"; fi
          curl -sS -X PUT \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/dns_records/${{ secrets.CLOUDFLARE_RECORD_ID_GENESIS }}" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data "{\"type\":\"CNAME\",\"name\":\"$PROD_DOMAIN\",\"content\":\"$cname\",\"ttl\":60,\"proxied\":true}" \
            | jq -e '.success==true' >/dev/null

      - name: Verify production health after flip
        run: |
          for i in {1..30}; do
            code=$(curl -s -o /dev/null -w "%{http_code}" "$PROD_HEALTH" || true)
            if [ "$code" = "200" ]; then exit 0; fi
            sleep 5
          done
          exit 1

      - name: Revert DNS back to active color (if needed)
        if: failure()
        run: |
          cname="$GREEN_CNAME"
          if [ "${{ steps.active.outputs.active }}" = "blue" ]; then cname="$BLUE_CNAME"; fi
          curl -sS -X PUT \
            "https://api.cloudflare.com/client/v4/zones/${{ secrets.CLOUDFLARE_ZONE_ID }}/dns_records/${{ secrets.CLOUDFLARE_RECORD_ID_GENESIS }}" \
            -H "Authorization: Bearer ${{ secrets.CLOUDFLARE_API_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data "{\"type\":\"CNAME\",\"name\":\"$PROD_DOMAIN\",\"content\":\"$cname\",\"ttl\":60,\"proxied\":true}" \
            | jq -e '.success==true' >/dev/null
