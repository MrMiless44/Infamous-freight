name: Security Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]
  schedule:
    # Run daily at 6 AM UTC
    - cron: "0 6 * * *"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  security-headers:
    name: Security Headers Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: |
          cd apps/web
          pnpm install --frozen-lockfile

      - name: Run security tests
        run: |
          cd apps/web
          pnpm test:security
        env:
          NEXT_PUBLIC_VERCEL_URL: ${{ vars.VERCEL_URL || 'https://infamous.vercel.app' }}

  dependency-scan:
    name: Dependency Security Scan
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit dependencies
        run: pnpm audit --audit-level=moderate
        continue-on-error: true

      - name: Check for outdated dependencies
        run: pnpm outdated || true

  security-linting:
    name: Security Linting
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint security rules
        run: pnpm lint
        continue-on-error: true

      - name: Check for hardcoded secrets
        run: |
          # Check for common secret patterns
          echo "Scanning for potential secrets..."
          if grep -r -E '(password|secret|key|token|api_key)\s*=\s*["\'][^"\']{8,}["\']' \
            --exclude-dir=node_modules \
            --exclude-dir=.git \
            --exclude-dir=.next \
            --exclude-dir=dist \
            --exclude='*.lock' \
            --exclude='pnpm-lock.yaml' \
            .; then
            echo "⚠️ Potential hardcoded secrets found!"
            exit 1
          else
            echo "✓ No hardcoded secrets detected"
          fi

  ssl-certificate-check:
    name: SSL Certificate Validation
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      - name: Check Vercel SSL
        run: |
          echo "Checking Vercel SSL certificate..."
          curl -vI https://infamous.vercel.app 2>&1 | grep -i "SSL certificate verify ok" || exit 1

      - name: Check Fly.io SSL
        run: |
          echo "Checking Fly.io SSL certificate..."
          curl -vI https://infamous-freight-as-3gw.fly.dev 2>&1 | grep -i "SSL certificate verify ok" || exit 1

      - name: SSL expiration check
        run: |
          echo "Checking SSL certificate expiration..."
          echo | openssl s_client -servername infamous.vercel.app -connect infamous.vercel.app:443 2>/dev/null | \
            openssl x509 -noout -dates

  report:
    name: Security Report
    runs-on: ubuntu-latest
    needs: [security-headers, dependency-scan, security-linting]
    if: always()

    steps:
      - name: Generate summary
        run: |
          echo "## Security Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Test Status" >> $GITHUB_STEP_SUMMARY
          echo "- Security Headers: ${{ needs.security-headers.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Dependency Scan: ${{ needs.dependency-scan.result }}" >> $GITHUB_STEP_SUMMARY
          echo "- Security Linting: ${{ needs.security-linting.result }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Timestamp: $(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_STEP_SUMMARY
