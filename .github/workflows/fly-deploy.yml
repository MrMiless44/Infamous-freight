name: Deploy API (Fly.io)

on:
  workflow_dispatch:
  workflow_call:
    outputs:
      app_url:
        description: "Deployed Fly.io app URL"
        value: ${{ jobs.deploy-api.outputs.app_url }}
      health_url:
        description: "Fly.io health check URL"
        value: ${{ jobs.deploy-api.outputs.health_url }}

permissions:
  contents: read

jobs:
  deploy-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      app_url: ${{ steps.get-url.outputs.app_url }}
      health_url: ${{ steps.get-url.outputs.health_url }}
    steps:
      - uses: actions/checkout@v4

      - name: Validate Fly.io secrets
        run: |
          if [ -z "${{ secrets.FLY_API_TOKEN }}" ]; then
            echo "Missing FLY_API_TOKEN secret"
            exit 1
          fi

      - name: Setup pnpm
        # Version is read from the "packageManager" field in package.json (pnpm@9.15.0) — single source of truth.
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Resolve Fly app config
        id: fly-config
        shell: bash
        run: |
          APP_NAME=$(grep -E '^app\s*=\s*' apps/api/fly.toml | head -1 | sed -E 's/.*=\s*"?([^" ]+)"?/\1/')
          if [ -z "$APP_NAME" ]; then
            echo "Fly app name not found in apps/api/fly.toml"
            exit 1
          fi
          echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"

      - name: Deploy to Fly.io
        run: flyctl deploy -c apps/api/fly.toml -a "${{ steps.fly-config.outputs.app_name }}" --remote-only --depot=false
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Get app URLs
        id: get-url
        run: |
          APP_NAME="${{ steps.fly-config.outputs.app_name }}"
          echo "app_url=https://$APP_NAME.fly.dev" >> $GITHUB_OUTPUT
          echo "health_url=https://$APP_NAME.fly.dev/api/health" >> $GITHUB_OUTPUT

      - name: Health check
        run: |
          echo "Checking ${{ steps.get-url.outputs.health_url }}"
          curl -sf "${{ steps.get-url.outputs.health_url }}" | jq .

      - name: Deployment summary
        run: |
          APP_NAME="${{ steps.fly-config.outputs.app_name }}"
          echo "## 🪁 Fly.io Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **App**: $APP_NAME" >> $GITHUB_STEP_SUMMARY
          echo "- **URL**: ${{ steps.get-url.outputs.app_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Health Check**: ${{ steps.get-url.outputs.health_url }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Dashboard**: https://fly.io/apps/$APP_NAME" >> $GITHUB_STEP_SUMMARY
