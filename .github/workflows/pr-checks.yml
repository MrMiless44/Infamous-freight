name: PR Checks

on:
  pull_request:
    branches: ["main", "master"]

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test -- --runInBand

  summarize-on-fail:
    name: Summarize CI failures
    if: failure()
    needs: [validate]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Post failure note
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              "CI failed. Next steps:",
              "- Check typecheck/lint/test logs in Actions",
              "- Fix top repeating failures first (mocks/paths/prisma guards)",
              "- Re-run `pnpm test -- --runInBand`",
            ].join("\n");

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });
