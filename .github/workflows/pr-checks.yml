name: PR Checks

on:
  pull_request:
    branches: ["main", "master"]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Lint
        run: pnpm lint

      - name: Test
        run: pnpm test -- --runInBand

  summarize-on-fail:
    name: Summarize CI failures
    if: failure()
    needs: [validate]
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write

    steps:
      - name: Post failure note
        uses: actions/github-script@v7
        with:
          script: |
            const marker = "<!-- ci-failure-summary -->";

            const body = [
              marker,
              "CI failed. Next steps:",
              "- Check typecheck/lint/test logs in Actions",
              "- Fix top repeating failures first (mocks/paths/prisma guards)",
              "- Re-run `pnpm test -- --runInBand`",
            ].join("\n");

            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const issue_number = context.payload.pull_request.number;

            const { data: comments } = await github.rest.issues.listComments({
              owner,
              repo,
              issue_number,
            });

            const existing = comments.find(
              (comment) => typeof comment.body === "string" && comment.body.includes(marker)
            );

            if (existing) {
              await github.rest.issues.updateComment({
                owner,
                repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner,
                repo,
                issue_number,
                body,
              });
            }
