name: Deploy Genesis AI (Fly)

on:
  workflow_dispatch:
  workflow_call: {}

concurrency:
  group: deploy-genesis-ai
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_APP: ${{ secrets.FLY_GENESIS_AI_APP_NAME }}
        run: flyctl deploy --remote-only -a "$FLY_APP"

      - name: Wait for health
        env:
          HEALTH_URL: https://${{ secrets.FLY_GENESIS_AI_APP_NAME }}.fly.dev/health
        run: |
          for i in {1..30}; do
            code=$(curl -s --connect-timeout 5 --max-time 15 -o /dev/null -w "%{http_code}" "$HEALTH_URL" || true)
            if [ "$code" = "200" ]; then
              echo "Health check passed."
              exit 0
            fi
            echo "Health check attempt $i failed with code $code. Retrying..."
            sleep 10
          done
          echo "Health check failed after 30 attempts."
          exit 1

      - name: Rollback (if needed)
        if: failure()
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
          FLY_APP: ${{ secrets.FLY_GENESIS_AI_APP_NAME }}
        run: |
          prev=$(flyctl releases list -a "$FLY_APP" --json | jq -r '.[1].version // ""')
          if [ -n "$prev" ]; then
            flyctl releases rollback -a "$FLY_APP" --version "$prev"
          else
            echo "No previous release found to roll back."
          fi
