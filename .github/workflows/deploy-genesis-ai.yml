name: Deploy Genesis AI (Fly)

on:
  push:
    branches: [main]
    paths:
      - "apps/genesis-ai/**"
      - "src/apps/genesis-ai/**"
      - "packages/**"
      - "pnpm-lock.yaml"
  workflow_call: {}

concurrency:
  group: deploy-genesis-ai
  cancel-in-progress: true

jobs:
  deploy:
    if: ${{ hashFiles('apps/genesis-ai/**', 'src/apps/genesis-ai/**') != '' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build Genesis AI
        run: pnpm --filter genesis-ai build

      - name: Deploy to Fly
        uses: superfly/flyctl-actions@1.5
        with:
          args: "deploy --config apps/genesis-ai/fly.toml --remote-only"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
