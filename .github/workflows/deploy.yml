name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-production
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: "22"
  PNPM_VERSION: "9.15.0"

jobs:
  changes:
    name: Detect deployable changes
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      api: ${{ steps.filter.outputs.api }}
      mobile: ${{ steps.filter.outputs.mobile }}

    steps:
      - uses: actions/checkout@v4

      - id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            web:
              - 'apps/web/**'
              - 'packages/**'
            api:
              - 'apps/api/**'
              - 'packages/**'
              - 'supabase/**'
              - 'docker/**'
              - 'Dockerfile*'
            mobile:
              - 'apps/mobile/**'
              - 'packages/**'

  verify:
    name: Verify production build
    runs-on: ubuntu-latest
    needs: changes

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm -r build --if-present

  db_migrate:
    name: Apply DB migrations
    runs-on: ubuntu-latest
    needs: [changes, verify]
    if: needs.changes.outputs.api == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Prisma migrate deploy
        run: cd apps/api && pnpm prisma migrate deploy
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Apply Supabase SQL migrations
        shell: bash
        run: |
          if [ -d "supabase/migrations" ]; then
            find supabase/migrations -type f -name '*.sql' -print0 \
              | sort -z \
              | xargs -0 -I {} sh -c 'echo "Applying migration: {}" && psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$1"' _ {}
          else
            echo "No supabase/migrations directory found; skipping."
          fi
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  deploy_api:
    name: Deploy API to Fly.io
    runs-on: ubuntu-latest
    needs: [changes, verify, db_migrate]
    if: needs.changes.outputs.api == 'true'

    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@v1.5
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  canary_api:
    name: Canary API health check
    runs-on: ubuntu-latest
    needs: [changes, deploy_api]
    if: needs.changes.outputs.api == 'true' && needs.deploy_api.result == 'success'

    steps:
      - name: Health check
        shell: bash
        run: |
          set -u
          MAX_RETRIES=5
          RETRY_DELAY_SECONDS=10
          EXPECTED_BODY_SUBSTRING='"status":"ok"'

          for attempt in $(seq 1 "$MAX_RETRIES"); do
            echo "Attempt $attempt/$MAX_RETRIES"
            RESPONSE="$(curl --fail --show-error --silent --max-time 30 "$CANARY_URL/health" 2>&1)" || true

            if echo "$RESPONSE" | grep -q "$EXPECTED_BODY_SUBSTRING"; then
              echo "Canary passed."
              exit 0
            fi

            echo "Canary failed. Response:"
            echo "$RESPONSE"

            if [ "$attempt" -lt "$MAX_RETRIES" ]; then
              sleep "$RETRY_DELAY_SECONDS"
            fi
          done

          echo "::error::Canary health check failed for ${CANARY_URL}/health"
          exit 1
        env:
          CANARY_URL: ${{ secrets.API_CANARY_URL }}

  deploy_web:
    name: Deploy web
    runs-on: ubuntu-latest
    needs: [changes, verify]
    if: needs.changes.outputs.web == 'true' && secrets.NETLIFY_BUILD_HOOK != ''

    steps:
      - name: Trigger web deploy hook
        run: curl -X POST "$NETLIFY_BUILD_HOOK"
        env:
          NETLIFY_BUILD_HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}

  deploy_mobile:
    name: Deploy mobile
    runs-on: ubuntu-latest
    needs: [changes, verify]
    if: needs.changes.outputs.mobile == 'true'

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: cd apps/mobile && eas build --platform all --non-interactive
