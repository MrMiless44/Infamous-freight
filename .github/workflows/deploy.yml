name: Unified Deploy (Fly + Netlify)

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality-gate:
    name: Quality Gate (API tests + Docker build)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter @infamous/api prisma:generate

      - name: Build API
        run: pnpm --filter @infamous/api build

      - name: Run API tests (runInBand)
        run: |
          set -euo pipefail
          if pnpm --filter @infamous/api exec -- jest --version >/dev/null 2>&1; then
            pnpm --filter @infamous/api exec -- jest --runInBand
          else
            pnpm --filter @infamous/api test -- --runInBand
          fi

      - name: Build API Docker image
        run: docker build -f Dockerfile.api -t infamous-freight-api:ci .

  deploy-api:
    name: Deploy API to Fly.io
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [quality-gate]
    if: ${{ always() && github.ref_name == 'main' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy API
        id: deploy
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          set -euo pipefail
          PRIMARY_APP=$(awk -F'=' '/^[[:space:]]*app[[:space:]]*=/{gsub(/[ "\t]/, "", $2); print $2; exit}' fly.api.toml)
          FALLBACK_APP=$(awk -F'=' '/^[[:space:]]*app[[:space:]]*=/{gsub(/[ "\t]/, "", $2); print $2; exit}' apps/api/fly.toml || true)

          if [ -n "${PRIMARY_APP}" ] && flyctl deploy --config fly.api.toml -a "$PRIMARY_APP" --remote-only --depot=false; then
            echo "app_name=$PRIMARY_APP" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          if [ -n "${FALLBACK_APP}" ] && [ "$FALLBACK_APP" != "$PRIMARY_APP" ]; then
            echo "Primary Fly deploy failed, retrying with fallback app: $FALLBACK_APP"
            flyctl deploy --config apps/api/fly.toml -a "$FALLBACK_APP" --remote-only --depot=false
            echo "app_name=$FALLBACK_APP" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "Fly deploy failed for primary app and no valid fallback app available" >&2
          exit 1

      - name: API health check
        run: |
          set -euo pipefail
          APP_NAME="${{ steps.deploy.outputs.app_name }}"
          if [ -z "${APP_NAME}" ]; then
            echo "Failed to resolve deployed app name" >&2
            exit 1
          fi
          API_HEALTH_URL="https://${APP_NAME}.fly.dev/api/health"
          ROOT_HEALTH_URL="https://${APP_NAME}.fly.dev/health"
          for attempt in 1 2 3 4 5; do
            if curl -fsS "$API_HEALTH_URL" >/dev/null; then
              echo "Health check passed: $API_HEALTH_URL"
              exit 0
            fi
            if curl -fsS "$ROOT_HEALTH_URL" >/dev/null; then
              echo "Fallback health check passed: $ROOT_HEALTH_URL"
              exit 0
            fi
            echo "Health check attempt $attempt failed, retrying..."
            sleep 5
          done
          echo "Health check failed after retries: $API_HEALTH_URL and $ROOT_HEALTH_URL" >&2
          exit 1

  deploy-web:
    name: Deploy Web to Netlify
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [quality-gate]
    if: ${{ always() && github.ref_name == 'main' }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Deploy to Netlify
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}
        run: |
          set -euo pipefail
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            pnpm --package=netlify-cli dlx netlify deploy --build --prod --message "GitHub Actions deploy from ${GITHUB_REF_NAME}" --site "$NETLIFY_SITE_ID" --auth "$NETLIFY_AUTH_TOKEN"
          else
            pnpm --package=netlify-cli dlx netlify deploy --build --message "GitHub Actions preview deploy from ${GITHUB_REF_NAME}" --site "$NETLIFY_SITE_ID" --auth "$NETLIFY_AUTH_TOKEN"
          fi
