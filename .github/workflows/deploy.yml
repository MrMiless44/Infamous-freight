name: Deploy

on:
  push:
    branches: [main]

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:


  security_scan:
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: javascript
      - uses: github/codeql-action/analyze@v3

  changes:
    runs-on: ubuntu-latest
    outputs:
      web: ${{ steps.filter.outputs.web }}
      api: ${{ steps.filter.outputs.api }}
      mobile: ${{ steps.filter.outputs.mobile }}
      ai: ${{ steps.filter.outputs.ai }}
      shared: ${{ steps.filter.outputs.shared }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            web:
              - "apps/web/**"
              - "packages/shared/**"
            api:
              - "apps/api/**"
              - "packages/shared/**"
            mobile:
              - "apps/mobile/**"
              - "packages/shared/**"
            ai:
              - "apps/ai/**"
              - "packages/shared/**"
            shared:
              - "packages/shared/**"

  verify:
    runs-on: ubuntu-latest
    needs: [changes, security_scan]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
      - run: corepack enable
      - run: corepack install
      - run: pnpm install --frozen-lockfile
      - run: pnpm lint
      - run: pnpm typecheck
      - run: pnpm -r --topological run build --if-present

  deploy_web:
    needs: [changes, verify]
    if: needs.changes.outputs.web == 'true' && secrets.NETLIFY_BUILD_HOOK != ''
    runs-on: ubuntu-latest
    steps:
      - run: curl -X POST "$NETLIFY_BUILD_HOOK"
        env:
          NETLIFY_BUILD_HOOK: ${{ secrets.NETLIFY_BUILD_HOOK }}



  db_migrate:
    needs: [changes, verify]
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm
      - run: corepack enable
      - run: corepack install
      - run: pnpm install --frozen-lockfile
      - name: Apply DB migrations
        run: |
          # Apply Prisma migrations
          pnpm --filter api prisma migrate deploy

          # Install PostgreSQL client to apply Supabase SQL migrations
          sudo apt-get update
          sudo apt-get install -y postgresql-client

          # Apply Supabase SQL migrations in deterministic order
          if [ -d "supabase/migrations" ]; then
            find supabase/migrations -type f -name '*.sql' -print0 \
              | sort -z \
              | xargs -0 -I {} sh -c 'echo "Applying migration: {}" && psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f "$1"' _ {}
          else
            echo "No supabase/migrations directory found; skipping Supabase SQL migrations."
          fi
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

  deploy_api:
    needs: [changes, verify, db_migrate]
    if: needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: superfly/flyctl-actions/setup-flyctl@master

      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy_mobile:
    needs: [changes, verify]
    if: needs.changes.outputs.mobile == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: pnpm

      - run: corepack enable
      - run: corepack install
      - run: pnpm install --frozen-lockfile

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - run: cd apps/mobile && eas build --platform all --non-interactive


  canary_api:
    needs: [changes, deploy_api]
    if: needs.deploy_api.result == 'success' && needs.changes.outputs.api == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Canary health check
        run: |
          set -u
          MAX_RETRIES=3
          RETRY_DELAY_SECONDS=10
          EXPECTED_BODY_SUBSTRING='"status":"ok"'

          attempt=1
          while [ "$attempt" -le "$MAX_RETRIES" ]; do
            echo "Canary health check attempt $attempt/$MAX_RETRIES..."

            # Perform health check with explicit timeout; do not fail the script automatically on curl error
            RESPONSE="$(curl --fail --show-error --silent --max-time 30 "$CANARY_URL/health" 2>&1)"
            CURL_EXIT_CODE=$?

            if [ "$CURL_EXIT_CODE" -eq 0 ] && echo "$RESPONSE" | grep -q "$EXPECTED_BODY_SUBSTRING"; then
              echo "Canary health check passed with expected response."
              exit 0
            fi;

            echo "Canary attempt $attempt failed (exit code: $CURL_EXIT_CODE). Response:"
            echo "$RESPONSE"

            if [ "$attempt" -lt "$MAX_RETRIES" ]; then
              echo "Retrying in ${RETRY_DELAY_SECONDS}s..."
              sleep "$RETRY_DELAY_SECONDS"
            fi

            attempt=$((attempt + 1))
          done

          echo "::error::Canary health check failed after ${MAX_RETRIES} attempts for ${CANARY_URL}/health"
          exit 1
        env:
          CANARY_URL: ${{ secrets.API_CANARY_URL }}
