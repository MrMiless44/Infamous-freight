name: Deploy to Vercel (Web) + Fly (API)

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/api

jobs:
  # ==================== WEB DEPLOYMENT (VERCEL) ====================
  deploy-web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Deploy Web to Vercel
        uses: vercel/action@v5
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID }}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID_WEB }}
          working-directory: web

  # ==================== API DEPLOYMENT (FLY.IO) ====================
  deploy-api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: ./api
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

      - name: Deploy to Fly.io
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy API
        run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        working-directory: api

      - name: Health check
        run: |
          sleep 10
          curl -f https://${{ secrets.FLY_APP_NAME }}.fly.dev/api/health || exit 1

  # ==================== DATABASE MIGRATIONS ====================
  migrate-db:
    runs-on: ubuntu-latest
    needs: deploy-api
    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20.11.0"

      - name: Install dependencies
        run: npm ci --workspace=api

      - name: Run Prisma migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: npm run prisma:migrate --workspace=api

  # ==================== SMOKE TESTS ====================
  smoke-tests:
    runs-on: ubuntu-latest
    needs: [deploy-web, deploy-api, migrate-db]
    steps:
      - uses: actions/checkout@v6

      - name: Health check API
        run: |
          API_URL="https://${{ secrets.FLY_APP_NAME }}.fly.dev"
          curl -f "$API_URL/api/health" || exit 1

      - name: Health check Web
        run: |
          WEB_URL="https://${{ secrets.VERCEL_URL }}"
          curl -f "$WEB_URL/" || exit 1

      - name: Test dispatch endpoint
        run: |
          API_URL="https://${{ secrets.FLY_APP_NAME }}.fly.dev"
          curl -f "$API_URL/api/dispatch/drivers" \
            -H "Authorization: Bearer ${{ secrets.TEST_JWT_TOKEN }}" || exit 1
