name: Deploy Staging

on:
  push:
    branches:
      - develop
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: deploy-staging-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate Before Staging Deploy
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      CI: true
      NODE_ENV: test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm -r --if-present lint

      - name: Typecheck
        run: pnpm -r --if-present typecheck

      - name: Test
        run: pnpm -r --if-present test -- --runInBand

      - name: Build
        run: pnpm -r --if-present build

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs:
      - validate
    environment:
      name: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy placeholder
        run: |
          echo "Replace this step with your staging deploy command."
          echo "Examples:"
          echo "  flyctl deploy --config fly.staging.toml"
          echo "  vercel deploy --prebuilt --token=\$VERCEL_TOKEN"
