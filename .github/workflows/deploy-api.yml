name: Deploy API (Fly)

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - "packages/**"
      - "pnpm-lock.yaml"
  workflow_call: {}

concurrency:
  group: deploy-api
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build API
        run: pnpm --filter infamous-freight-api build

      - name: Prisma migrate deploy (guarded)
        run: |
          set -euo pipefail
          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            changed_files="$(git ls-tree -r --name-only "${{ github.sha }}")"
          else
            changed_files="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")"
          fi

          if echo "$changed_files" | grep -q "^api/prisma/"; then
            pnpm --filter api prisma migrate deploy
          else
            echo "No api/prisma changes detected; skipping Prisma migrate deploy."
          fi

      - name: Deploy to Fly
        uses: superfly/flyctl-actions@1.5
        with:
          args: "deploy --config api/fly.toml --remote-only"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Wait for health
        env:
          HEALTH_URL: https://${{ secrets.FLY_APP_NAME }}.fly.dev/api/health
        run: |
          for i in {1..30}; do
            code=$(curl -s --connect-timeout 5 --max-time 15 -o /dev/null -w "%{http_code}" "$HEALTH_URL" || true)
            if [ "$code" = "200" ]; then
              echo "Health check passed."
              exit 0
            fi
            echo "Health check attempt $i failed with code $code. Retrying..."
            sleep 10
          done
          echo "Health check failed after 30 attempts."
          exit 1
