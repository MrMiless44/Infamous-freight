name: Deploy API (Fly)

on:
  push:
    branches: [main]
    paths:
      - "api/**"
      - "packages/**"
      - "pnpm-lock.yaml"
  workflow_call: {}

concurrency:
  group: deploy-api
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Block deploy during freeze
        if: vars.PROD_FREEZE == 'true'
        run: |
          echo "Production freeze is enabled. Blocking deploy."
          exit 1

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build API
        run: pnpm --filter infamous-freight-api build

      - name: Prisma migrate deploy (guarded + locked)
        run: |
          set -euo pipefail
          if [ "${{ github.event.before }}" = "0000000000000000000000000000000000000000" ]; then
            changed_files="$(git ls-tree -r --name-only "${{ github.sha }}")"
          else
            changed_files="$(git diff --name-only "${{ github.event.before }}" "${{ github.sha }}")"
          fi

          if echo "$changed_files" | grep -q "^api/prisma/"; then
            echo "api/prisma changes detected; running Prisma migrate deploy with lock."
            # Acquire an exclusive file lock for up to 180 seconds (matching the previous 180000 ms timeout)
            exec 200>/tmp/prisma-migrate.lock
            if ! flock -w 180 200; then
              echo "Failed to acquire Prisma migration lock within 180 seconds." >&2
              exit 1
            fi
            pnpm --filter infamous-freight-api prisma migrate deploy
          else
            echo "No api/prisma changes detected; skipping Prisma migrate deploy."
          fi
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Set up Fly.io CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly (progressive)
        uses: superfly/flyctl-actions@1.5
        with:
          args: "deploy --config apps/api/fly.toml --remote-only --strategy rolling"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Wait for Fly deployment to stabilize
        run: |
          FLY_APP=$(awk -F'"' '/^app =/ {print $2}' apps/api/fly.toml)
          flyctl status -a "$FLY_APP"
          flyctl checks list -a "$FLY_APP" || true
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Wait for health
        env:
          HEALTH_URL: https://${{ secrets.FLY_APP_NAME }}.fly.dev/api/health
        run: |
          for i in {1..30}; do
            code=$(curl -s --connect-timeout 5 --max-time 15 -o /dev/null -w "%{http_code}" "$HEALTH_URL" || true)
            if [ "$code" = "200" ]; then
              echo "Health check passed."
              exit 0
            fi
            echo "Health check attempt $i failed with code $code. Retrying..."
            sleep 10
          done
          echo "Health check failed after 30 attempts."
          exit 1

      - name: Sentry release (API)
        if: success() && secrets.SENTRY_AUTH_TOKEN != ''
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ORG: ${{ secrets.SENTRY_ORG }}
          SENTRY_PROJECT: ${{ secrets.SENTRY_PROJECT_API }}
        run: |
          npx --yes @sentry/cli releases new "${{ github.sha }}"
          npx --yes @sentry/cli releases set-commits "${{ github.sha }}" --auto
          npx --yes @sentry/cli releases finalize "${{ github.sha }}"
          npx --yes @sentry/cli releases deploys "${{ github.sha }}" new -e production

      - name: Slack notify (success)
        if: success() && secrets.SLACK_WEBHOOK_URL != ''
        run: |
          payload=$(jq -n \
            --arg text "✅ Deploy Success: ${{ github.workflow }} @ ${{ github.ref_name }} (commit ${{ github.sha }})" \
            '{text:$text}')
          curl -X POST -H 'Content-type: application/json' \
            --data "$payload" "${{ secrets.SLACK_WEBHOOK_URL }}"

      - name: Slack notify (failure)
        if: failure() && secrets.SLACK_WEBHOOK_URL != ''
        run: |
          payload=$(jq -n \
            --arg text "❌ Deploy Failed: ${{ github.workflow }} @ ${{ github.ref_name }} (commit ${{ github.sha }})" \
            '{text:$text}')
          curl -X POST -H 'Content-type: application/json' \
            --data "$payload" "${{ secrets.SLACK_WEBHOOK_URL }}"
