name: CI - Enterprise Grade

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  checks: write
  pull-requests: write
  actions: read

env:
  NODE_VERSION: '20.11.0'
  PNPM_VERSION: '9.15.0'

jobs:
  # Validation & Guards - Enterprise Standards
  validate:
    name: Validate Repository Standards
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Guard - No package-lock.json (pnpm only)
        run: |
          if git ls-files '**/package-lock.json' | grep -q .; then
            echo "❌ ERROR: package-lock.json found. Use pnpm only."
            git ls-files '**/package-lock.json'
            exit 1
          fi

      - name: Guard - No committed node_modules
        run: |
          if git ls-files '**/node_modules/**' | grep -q .; then
            echo "❌ ERROR: node_modules tracked in git."
            git ls-files '**/node_modules/**' | head
            exit 1
          fi

  # Lint - Enforce Code Quality
  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [validate]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        env:
          HUSKY: 0
        run: pnpm install --frozen-lockfile

      - name: Lint - API
        run: pnpm --filter infamous-freight-api lint

      - name: Format Check
        run: pnpm format:check
        continue-on-error: true

  # Type Checking - Enforce Type Safety
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [validate]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        env:
          HUSKY: 0
        run: pnpm install --frozen-lockfile

      - name: Build Shared Package (Required for typechecking)
        run: pnpm --filter @infamous-freight/shared build

      - name: Type Check - All Packages
        run: pnpm typecheck

  # Test - Ensure Functionality & Coverage
  test:
    name: Test
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [validate, lint, typecheck]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        env:
          HUSKY: 0
        run: pnpm install --frozen-lockfile

      - name: Build Shared Package
        run: pnpm --filter @infamous-freight/shared build

      - name: Run API Tests with Coverage
        run: pnpm --filter infamous-freight-api test:coverage

      - name: Upload Coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./api/coverage/lcov.info
          flags: api
          name: api-coverage
        if: always()

  # Build - Verify Production Build
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: [validate, lint, typecheck]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        env:
          HUSKY: 0
        run: pnpm install --frozen-lockfile

      - name: Build - Shared Package
        run: pnpm --filter @infamous-freight/shared build

      - name: Build - API
        run: pnpm --filter infamous-freight-api build

      - name: Build - Web (if exists)
        run: pnpm --filter web build || echo "Web package not configured yet"
        continue-on-error: true

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            packages/shared/dist/
          retention-days: 7
        if: success()

  # Summary - Report CI Status
  ci-success:
    name: CI Success
    runs-on: ubuntu-latest
    needs: [validate, lint, typecheck, test, build]
    if: success()
    steps:
      - name: Report Success
        run: |
          echo "✅ All CI checks passed successfully!"
          echo "- Validation: ✅"
          echo "- Linting: ✅"
          echo "- Type Checking: ✅"
          echo "- Testing: ✅"
          echo "- Build: ✅"
