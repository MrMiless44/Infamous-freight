name: CI

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 8

      - name: Setup Node + pnpm cache
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Guard: no package-lock.json anywhere
        run: |
          if git ls-files '**/package-lock.json' | grep -q .; then
            echo "ERROR: package-lock.json found. Use pnpm only."
            git ls-files '**/package-lock.json'
            exit 1
          fi

      - name: Guard: no committed node_modules
        run: |
          if git ls-files '**/node_modules/**' | grep -q .; then
            echo "ERROR: node_modules tracked in git. Remove it from version control."
            git ls-files '**/node_modules/**' | head
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # === LINT ACROSS ALL PACKAGES ===
      - name: Lint (shared)
        run: cd packages/shared && pnpm lint || echo "No linter configured"
        continue-on-error: true

      - name: Lint (api)
        run: cd apps/api && pnpm lint
        continue-on-error: false

      - name: Lint (web)
        run: cd apps/web && pnpm lint || echo "No linter configured"
        continue-on-error: true

      - name: notify vercel (lint)
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: Vercel - genesis: lint

      # === TYPE-CHECK ACROSS ALL PACKAGES ===
      - name: Typecheck (shared)
        run: cd packages/shared && pnpm typecheck
        continue-on-error: false

      - name: Typecheck (api)
        run: cd apps/api && pnpm typecheck
        continue-on-error: false

      - name: Typecheck (web)
        run: cd apps/web && pnpm typecheck
        continue-on-error: false

      - name: Typecheck (e2e)
        run: cd e2e && pnpm typecheck || echo "No typecheck in e2e"
        continue-on-error: true

      - name: notify vercel (typecheck)
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: Vercel - genesis: typecheck

      # === TEST ACROSS ALL PACKAGES ===
      - name: Build shared (pre-test)
        run: cd packages/shared && pnpm build
        continue-on-error: false

      - name: Test (api)
        run: cd apps/api && pnpm test --coverage
        continue-on-error: false
        env:
          JWT_SECRET: test-secret-key-for-ci
          NODE_ENV: test

      - name: Upload coverage reports
        uses: codecov/codecov-action@v3
        with:
          files: ./apps/api/coverage/lcov.info
          flags: api
          fail_ci_if_error: false

      - name: Test (e2e)
        run: cd e2e && pnpm test || echo "No e2e tests configured"
        continue-on-error: true
        env:
          NODE_ENV: test

      - name: notify vercel (test)
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: Vercel - genesis: test

      # === BUILD ACROSS ALL PACKAGES ===
      - name: Build (shared)
        run: cd packages/shared && pnpm build
        continue-on-error: false

      - name: Build (api)
        run: cd apps/api && pnpm build
        continue-on-error: false

      - name: Build (web)
        run: cd apps/web && pnpm build
        continue-on-error: false

      - name: notify vercel (build)
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: Vercel - genesis: build

      # === PRISMA VALIDATION ===
      - name: Prisma format check
        run: cd apps/api && pnpm prisma format --check || (echo "Prisma schema needs formatting" && exit 1)
        continue-on-error: false

      - name: Prisma validate
        run: cd apps/api && pnpm prisma validate
        continue-on-error: false
