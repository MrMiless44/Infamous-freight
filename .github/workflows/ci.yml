name: Infamous Freight CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  api-ci:
    runs-on: ubuntu-latest  # Recommend using GitHub-hosted runners for better scalability

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Enable Corepack
        run: corepack enable

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint  # Add linting with ESLint

      - name: Typecheck
        run: pnpm typecheck

      - name: Run Tests
        run: pnpm test --if-present  # Ensure tests are run before building

      - name: Build
        run: pnpm build

      - name: Security Audit
        run: pnpm audit  # Check for dependencies with vulnerabilities

      - name: Health summary
        run: echo "CI passed for Infamous Freight API"