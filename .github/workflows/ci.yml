name: CI

on:
  push:
    branches: ["main"]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

env:
  NODE_ENV: test
  JWT_SECRET: test-secret-for-ci
  DATABASE_URL: postgresql://test:test@localhost:5432/test_db

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.15.0

      - name: Setup Node + pnpm cache
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Guard: no package-lock.json anywhere
        run: |
          if git ls-files '**/package-lock.json' | grep -q .; then
            echo "ERROR: package-lock.json found. Use pnpm only."
            git ls-files '**/package-lock.json'
            exit 1
          fi

      - name: Guard: no committed node_modules
        run: |
          if git ls-files '**/node_modules/**' | grep -q .; then
            echo "ERROR: node_modules tracked in git. Remove it from version control."
            git ls-files '**/node_modules/**' | head
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @infamous-freight/shared build

      - name: Lint API
        run: pnpm --filter api lint
        continue-on-error: false

      - name: Lint Web
        run: cd apps/web && pnpm run typecheck
        continue-on-error: true

      - name: Typecheck API
        run: pnpm --filter api typecheck
        continue-on-error: false

      - name: Typecheck Web
        run: pnpm --filter web typecheck
        continue-on-error: true

      - name: Typecheck Shared
        run: pnpm --filter @infamous-freight/shared typecheck
        continue-on-error: true

      - name: Test API with Coverage
        run: pnpm --filter api test:coverage
        continue-on-error: false

      - name: Upload API Coverage
        uses: codecov/codecov-action@v3
        if: always()
        with:
          files: ./apps/api/coverage/coverage-final.json
          flags: api
          name: api-coverage
          fail_ci_if_error: false

      - name: Check API Coverage Thresholds
        run: |
          cd apps/api
          node -e "const c=require('./coverage/coverage-summary.json');const t=c.total;if(t.branches.pct<80||t.functions.pct<85||t.lines.pct<88)process.exit(1)"
        continue-on-error: false

      - name: Build API
        run: pnpm --filter api build
        continue-on-error: false

      - name: Build Web
        run: pnpm --filter web build
        env:
          NEXT_PUBLIC_API_BASE: http://localhost:4000/api
        continue-on-error: false

      - name: Verify Build Outputs
        run: |
          echo "Checking API build..."
          test -f apps/api/src/server.js || exit 1
          echo "Checking Web build..."
          test -d apps/web/.next || exit 1
          echo "✅ All builds verified"

      - name: notify vercel
        if: always()
        uses: vercel/repository-dispatch/actions/status@v1
        with:
          name: Vercel - genesis: ci-complete
