name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test-api:
    name: API Unit & Integration Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/api/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run tests with coverage
        run: npx vitest run --coverage --config vitest.config.ts

      - name: Upload API coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: api-coverage
          path: apps/api/coverage/

  test-shared:
    name: Shared Package Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: packages/shared

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: packages/shared/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Run tests with coverage
        run: npx vitest run --coverage --config vitest.config.ts

      - name: Upload shared coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: shared-coverage
          path: packages/shared/coverage/

  typecheck:
    name: Type Check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: apps/api/package-lock.json

      - name: Install API dependencies
        working-directory: apps/api
        run: npm install

      - name: Type check API
        working-directory: apps/api
        run: npx tsc --noEmit -p tsconfig.json

  security-scan:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Audit API dependencies
        working-directory: apps/api
        run: npm install && npm audit --audit-level=high || true

      - name: Audit shared dependencies
        working-directory: packages/shared
        run: npm install && npm audit --audit-level=high || true

