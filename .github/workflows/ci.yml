name: CI

on:
  push:
    branches: [main, develop]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '22.22.0'
  PNPM_VERSION: '9.15.0'
  CI: true

jobs:
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      shared: ${{ steps.filter.outputs.shared }}
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      mobile: ${{ steps.filter.outputs.mobile }}
      e2e: ${{ steps.filter.outputs.e2e }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect changed paths
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            shared:
              - 'packages/shared/**'
              - 'packages/**'
              - 'pnpm-lock.yaml'
              - 'package.json'
              - 'pnpm-workspace.yaml'
              - 'tsconfig*.json'
            api:
              - 'apps/api/**'
              - 'packages/**'
              - 'supabase/**'
              - 'pnpm-lock.yaml'
              - 'package.json'
              - 'pnpm-workspace.yaml'
              - 'tsconfig*.json'
            web:
              - 'apps/web/**'
              - 'packages/**'
              - 'pnpm-lock.yaml'
              - 'package.json'
              - 'pnpm-workspace.yaml'
              - 'tsconfig*.json'
            mobile:
              - 'apps/mobile/**'
              - 'packages/**'
              - 'pnpm-lock.yaml'
              - 'package.json'
              - 'pnpm-workspace.yaml'
              - 'tsconfig*.json'
            e2e:
              - 'e2e/**'
              - 'apps/web/**'
              - 'apps/api/**'
              - 'packages/shared/**'
              - 'pnpm-lock.yaml'
              - 'package.json'
              - 'pnpm-workspace.yaml'

  verify:
    name: Lint • Typecheck • Test • Build
    runs-on: ubuntu-latest
    needs: changes
    timeout-minutes: 45

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: infamous_freight_ci
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d infamous_freight_ci"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12

      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=12

    env:
      NODE_ENV: test
      JWT_SECRET: test-secret-key-for-ci
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/infamous_freight_ci?schema=public
      DIRECT_URL: postgresql://postgres:postgres@localhost:5432/infamous_freight_ci?schema=public
      REDIS_URL: redis://localhost:6379

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Guard - no package-lock.json
        shell: bash
        run: |
          if git ls-files '**/package-lock.json' | grep -q .; then
            echo "::error::package-lock.json found. This repo should use pnpm only."
            git ls-files '**/package-lock.json'
            exit 1
          fi

      - name: Guard - no committed node_modules
        shell: bash
        run: |
          if git ls-files '**/node_modules/**' | grep -q .; then
            echo "::error::Tracked node_modules found. Remove them from git."
            git ls-files '**/node_modules/**' | head -50
            exit 1
          fi

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared
        if: needs.changes.outputs.shared == 'true' || needs.changes.outputs.api == 'true' || needs.changes.outputs.web == 'true' || needs.changes.outputs.mobile == 'true' || needs.changes.outputs.e2e == 'true'
        run: |
          if [ -d packages/shared ]; then
            cd packages/shared
            pnpm build
          fi

      - name: Prisma format check
        if: needs.changes.outputs.api == 'true'
        run: cd apps/api && pnpm prisma format --check

      - name: Prisma validate
        if: needs.changes.outputs.api == 'true'
        run: cd apps/api && pnpm prisma validate

      - name: Prisma generate
        if: needs.changes.outputs.api == 'true'
        run: cd apps/api && pnpm prisma generate

      - name: Lint shared
        if: needs.changes.outputs.shared == 'true'
        run: cd packages/shared && pnpm lint

      - name: Lint API
        if: needs.changes.outputs.api == 'true'
        run: cd apps/api && pnpm lint

      - name: Lint web
        if: needs.changes.outputs.web == 'true'
        run: cd apps/web && pnpm lint

      - name: Lint mobile
        if: needs.changes.outputs.mobile == 'true'
        run: cd apps/mobile && pnpm lint

      - name: Typecheck shared
        if: needs.changes.outputs.shared == 'true'
        run: cd packages/shared && pnpm typecheck

      - name: Typecheck API
        if: needs.changes.outputs.api == 'true'
        run: cd apps/api && pnpm typecheck

      - name: Typecheck web
        if: needs.changes.outputs.web == 'true'
        run: cd apps/web && pnpm typecheck

      - name: Typecheck mobile
        if: needs.changes.outputs.mobile == 'true'
        run: cd apps/mobile && pnpm typecheck

      - name: Typecheck e2e
        if: needs.changes.outputs.e2e == 'true'
        run: cd e2e && pnpm typecheck

      - name: Test API
        if: needs.changes.outputs.api == 'true'
        run: cd apps/api && pnpm test -- --runInBand --coverage

      - name: Upload API coverage
        if: always() && needs.changes.outputs.api == 'true'
        uses: codecov/codecov-action@v4
        with:
          files: ./apps/api/coverage/lcov.info
          flags: api
          fail_ci_if_error: false

      - name: Test e2e
        if: needs.changes.outputs.e2e == 'true'
        run: cd e2e && pnpm test

      - name: Build API
        if: needs.changes.outputs.api == 'true'
        run: cd apps/api && pnpm build

      - name: Build web
        if: needs.changes.outputs.web == 'true'
        run: cd apps/web && pnpm build

      - name: Build mobile
        if: needs.changes.outputs.mobile == 'true'
        run: cd apps/mobile && pnpm build
