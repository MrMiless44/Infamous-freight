name: Documentation Validation

on:
  pull_request:
    paths:
      - "**.md"
      - ".github/workflows/doc-validation.yml"
  push:
    branches:
      - main
    paths:
      - "**.md"

permissions:
  pull-requests: write
  contents: read

concurrency:
  group: ci-${ github.ref }-${ github.workflow }
  cancel-in-progress: true

jobs:
  validate-docs:
    runs-on: ubuntu-latest
    name: Validate Documentation

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check for forbidden documentation patterns
        run: |
          echo "🔍 Checking for forbidden documentation patterns..."

          # Patterns that should never be committed
          FORBIDDEN_PATTERNS=(
            "*_STATUS*.md"
            "*_COMPLETE*.md"
            "*_100*.md"
            "*.log"
            "DEPLOYMENT_STATUS*"
            "FIREBASE_DEPLOYMENT_*"
            "AI_ACTIONS_100*"
            "ALL_FEATURES_100*"
            "ALL_BRANCHES_GREEN*"
          )

          VIOLATIONS_FOUND=0

          for pattern in "${FORBIDDEN_PATTERNS[@]}"; do
            matches=$(find . -path ./archive -prune -o -path ./node_modules -prune -o -name "$pattern" -type f -print 2>/dev/null)
            if [ -n "$matches" ]; then
              echo "❌ VIOLATION FOUND: Files matching '$pattern'"
              echo "$matches"
              VIOLATIONS_FOUND=$((VIOLATIONS_FOUND + 1))
            fi
          done

          if [ $VIOLATIONS_FOUND -gt 0 ]; then
            echo ""
            echo "❌ FAILED: $VIOLATIONS_FOUND forbidden patterns detected"
            echo ""
            echo "📋 Forbidden file patterns (must use -RECOMMENDED naming):"
            echo "  - *_STATUS*.md (use release notes instead)"
            echo "  - *_COMPLETE*.md (use git tags instead)"
            echo "  - *_100*.md (use versioning instead)"
            echo "  - *.log (use .gitignore for logs)"
            echo ""
            echo "✅ Use DOCUMENTATION_STANDARDS-RECOMMENDED.md as your guide:"
            echo "   https://github.com/MrMiless44/Infamous-freight/blob/main/DOCUMENTATION_STANDARDS-RECOMMENDED.md"
            exit 1
          fi

          echo "✅ No forbidden patterns detected"

      - name: Verify documentation structure
        run: |
          echo "📚 Verifying documentation structure..."

          REQUIRED_DOCS=(
            "README.md"
            "CONTRIBUTING.md"
            "QUICK-REFERENCE-RECOMMENDED.md"
            "API-DOCUMENTATION-RECOMMENDED.md"
          )

          MISSING=0

          for doc in "${REQUIRED_DOCS[@]}"; do
            if [ ! -f "$doc" ]; then
              echo "❌ MISSING: $doc"
              MISSING=$((MISSING + 1))
            else
              echo "✅ Found: $doc"
            fi
          done

          if [ $MISSING -gt 0 ]; then
            echo ""
            echo "❌ FAILED: $MISSING required documentation files missing"
            exit 1
          fi

          echo "✅ All required documentation files present"

      - name: Check for broken markdown links
        run: |
          echo "🔗 Checking for broken markdown links..."

          # Check for common broken patterns
          broken_count=0

          # Check for links to deleted files
          if grep -r "](DEPLOYMENT_STATUS" --include="*.md" --exclude-dir=node_modules --exclude-dir=archive --exclude-dir=.git . 2>/dev/null; then
            echo "❌ Found references to deleted DEPLOYMENT_STATUS files"
            broken_count=$((broken_count + 1))
          fi

          if grep -r "](QUICKSTART_100" --include="*.md" --exclude-dir=node_modules --exclude-dir=archive --exclude-dir=.git . 2>/dev/null; then
            echo "❌ Found references to deleted QUICKSTART_100 files"
            broken_count=$((broken_count + 1))
          fi

          if grep -r "](AI_ACTIONS_100" --include="*.md" --exclude-dir=node_modules --exclude-dir=archive --exclude-dir=.git . 2>/dev/null; then
            echo "❌ Found references to deleted AI_ACTIONS_100 files"
            broken_count=$((broken_count + 1))
          fi

          if [ $broken_count -gt 0 ]; then
            echo ""
            echo "❌ FAILED: $broken_count broken link patterns detected"
            echo ""
            echo "💡 Tip: Update links to use -RECOMMENDED versions or valid files"
            exit 1
          fi

          echo "✅ No broken links to deleted files detected"

      - name: Lint markdown files
        uses: nosborn/github-action-markdown-cli@v3.3.0
        with:
          files: .
          config_file: ".markdownlint.json"
          ignore_files: "archive,node_modules,.next"
        continue-on-error: true

      - name: Comment on PR with validation results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { owner, repo, number } = context.issue;

            const comment = `## 📚 Documentation Validation Results ✅

            ### Checks Performed
            - ✅ Forbidden patterns scan (no *_STATUS, *_COMPLETE, *_100 files)
            - ✅ Required documentation verification
            - ✅ Broken link detection
            - ✅ Markdown linting

            ### Guidelines
            📖 **Active Documentation Naming Convention:**
            - Use \`{SUBJECT}-RECOMMENDED.md\` for active documentation
            - Use git tags for versioning instead of status files
            - Store deprecated files in \`/archive\` directory

            **Need help?** See [DOCUMENTATION_STANDARDS-RECOMMENDED.md](https://github.com/${{ github.repository }}/blob/main/DOCUMENTATION_STANDARDS-RECOMMENDED.md)`;

            github.rest.issues.createComment({
              owner,
              repo,
              issue_number: number,
              body: comment
            });

      - name: Summary
        if: success()
        run: |
          echo "✅ All documentation validation checks PASSED"
          echo ""
          echo "📋 Summary:"
          echo "  • No forbidden patterns detected"
          echo "  • All required files present"
          echo "  • No broken links to deleted files"
          echo "  • Markdown linting complete"
          echo ""
          echo "🚀 Ready to merge documentation changes"
