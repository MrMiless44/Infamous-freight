name: Deploy Mobile (EAS Update)

on:
  push:
    branches: [main]
    paths:
      - "mobile/**"
      - "packages/**"
      - "pnpm-lock.yaml"
  workflow_dispatch:
  workflow_call:

jobs:
  ota:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS Update (OTA)
        run: cd mobile && eas update --auto --channel production
