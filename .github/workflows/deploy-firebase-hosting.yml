# Firebase Hosting Deployment
# Automated deployment of infamousfreight.com to Firebase Hosting

name: Deploy Firebase Hosting

on:
  push:
    branches:
      - main
    paths:
      - "apps/web/**"
      - "packages/shared/**"
      - "firebase.json"
      - ".firebaserc"
      - ".github/workflows/deploy-firebase-hosting.yml"
  workflow_dispatch: # Manual trigger

env:
  NODE_VERSION: "24.x"

permissions:
  contents: read

concurrency:
  group: ci-${ github.ref }-${ github.workflow }
  cancel-in-progress: false

jobs:
  deploy-hosting:
    runs-on: ubuntu-latest
    name: Deploy to Firebase Hosting

    environment:
      name: production
      url: https://infamousfreight.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: |
          echo "Installing with pnpm..."
          pnpm install --no-frozen-lockfile || {
            echo "pnpm install failed, trying npm install..."
            npm install
          }

      - name: Build shared package
        run: |
          echo "Building shared package..."
          cd packages/shared
          npx tsc -p tsconfig.json
          echo "✓ Shared package built"

      - name: Build Next.js for Firebase
        run: |
          echo "Building Next.js application..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          # Debug: Show environment variables
          echo "📋 Environment:"
          echo "  BUILD_TARGET: ${BUILD_TARGET:-not set}"
          echo "  NODE_ENV: ${NODE_ENV:-not set}"
          echo "  SKIP_PREBUILD: ${SKIP_PREBUILD:-not set}"
          echo "  Node version: $(node --version)"
          echo "  npm version: $(npm --version)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          
          # Use --prefix to isolate build to apps/web only
          # No workspace resolution, no recursion, no prebuild issues
          echo "🔨 Starting build..."
          BUILD_TARGET=firebase NODE_ENV=production SKIP_PREBUILD=true npm --prefix apps/web run build
          BUILD_EXIT_CODE=$?
          
          if [ $BUILD_EXIT_CODE -ne 0 ]; then
            echo "❌ Build failed with exit code $BUILD_EXIT_CODE"
            echo "Listing apps/web directory:"
            ls -la apps/web/
            exit $BUILD_EXIT_CODE
          fi
          
          # Verify out directory was created
          if [ ! -d "apps/web/out" ]; then
            echo "❌ ERROR: out directory not created!"
            echo "Listing apps/web directory:"
            ls -la apps/web/
            exit 1
          fi
          
          echo "✅ Build successful"
          echo "📦 Build size: $(du -sh apps/web/out/ | cut -f1)"
          echo "📄 Files generated: $(find apps/web/out -type f | wc -l)"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Verify export
        run: |
          echo "🔍 Verifying static export..."
          cd apps/web/out
          test -f index.html && echo "  ✅ index.html exists"
          test -f sitemap.xml && echo "  ✅ sitemap.xml exists"
          test -f robots.txt && echo "  ✅ robots.txt exists"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "📂 Generated files (first 20):"
          ls -lh | head -20
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        run: |
          echo "🚀 Deploying to Firebase Hosting..."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          firebase deploy --only hosting --project infamous-freight-85082765
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deployment Summary
        run: |
          echo "🎉 Deployment completed!"
          echo "Production URL: https://infamousfreight.web.app"
          echo "Custom Domain: https://infamousfreight.com"
          echo ""
          echo "Next steps:"
          echo "1. Verify deployment at https://infamousfreight.web.app"
          echo "2. Configure DNS if not already done"
          echo "3. Connect custom domain in Firebase Console"

      - name: Post deployment check
        run: |
          echo "⏳ Waiting 30s for deployment to propagate..."
          sleep 30
          echo "🌐 Testing deployed site..."
          if curl -I https://infamousfreight.web.app 2>/dev/null | head -1; then
            echo "✅ Site is accessible!"
          else
            echo "⚠️  Site not yet accessible (may need more time)"
          fi

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "Check logs above for errors"
          echo "Common issues:"
          echo "- FIREBASE_TOKEN not set in GitHub Secrets"
          echo "- Build errors in Next.js"
          echo "- Firebase project permissions"
