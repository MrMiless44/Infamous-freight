# Firebase Hosting Deployment
# Automated deployment of infamousfreight.com to Firebase Hosting

name: Deploy Firebase Hosting

on:
  push:
    branches:
      - main
    paths:
      - "apps/web/**"
      - "packages/shared/**"
      - "firebase.json"
      - ".firebaserc"
  workflow_dispatch: # Manual trigger

env:
  NODE_VERSION: "24.x"

jobs:
  deploy-hosting:
    runs-on: ubuntu-latest
    name: Deploy to Firebase Hosting

    environment:
      name: production
      url: https://infamousfreight.com

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Setup pnpm
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: |
          echo "Installing with pnpm..."
          pnpm install --no-frozen-lockfile || {
            echo "pnpm install failed, trying npm install..."
            npm install
          }

      - name: Build shared package
        run: |
          echo "Building shared package..."
          pnpm --filter @infamous-freight/shared build || {
            echo "pnpm build failed, attempting with npm..."
            cd packages/shared && npm run build && cd ../..
          }

      - name: Build Next.js for Firebase
        run: |
          echo "Building Next.js application..."
          cd apps/web
          BUILD_TARGET=firebase NODE_ENV=production pnpm build || {
            echo "pnpm build failed, trying npm..."
            npm run build
          }
          # Verify out directory was created
          if [ ! -d "out" ]; then
            echo "ERROR: out directory not created!"
            ls -la
            exit 1
          fi
          ls -lh out/ | head -20
          echo "✓ Build successful"

      - name: Verify export
        run: |
          cd apps/web/out
          test -f index.html && echo "✓ index.html"
          test -f sitemap.xml && echo "✓ sitemap.xml"
          test -f robots.txt && echo "✓ robots.txt"
          ls -lh | head -20

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Deploy to Firebase Hosting
        run: firebase deploy --only hosting --project infamous-freight-85082765
        env:
          FIREBASE_TOKEN: ${{ secrets.FIREBASE_TOKEN }}

      - name: Deployment Summary
        run: |
          echo "🎉 Deployment completed!"
          echo "Production URL: https://infamousfreight.web.app"
          echo "Custom Domain: https://infamousfreight.com"
          echo ""
          echo "Next steps:"
          echo "1. Verify deployment at https://infamousfreight.web.app"
          echo "2. Configure DNS if not already done"
          echo "3. Connect custom domain in Firebase Console"

      - name: Post deployment check
        run: |
          echo "Waiting 30s for deployment to propagate..."
          sleep 30
          curl -I https://infamousfreight.web.app || echo "Site not yet accessible"

      - name: Notify on failure
        if: failure()
        run: |
          echo "❌ Deployment failed!"
          echo "Check logs above for errors"
          echo "Common issues:"
          echo "- FIREBASE_TOKEN not set in GitHub Secrets"
          echo "- Build errors in Next.js"
          echo "- Firebase project permissions"
