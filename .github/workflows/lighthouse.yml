name: Lighthouse CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v2
        with:
          version: 9.15.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @infamous-freight/shared build

      - name: Build web app
        run: pnpm --filter web build
        env:
          NEXT_PUBLIC_API_BASE: http://localhost:4000/api

      - name: Start web server
        run: |
          cd apps/web
          pnpm start &
          sleep 5
        env:
          NEXT_PUBLIC_API_BASE: http://localhost:3000/api

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v10
        with:
          configPath: "./lighthouserc.json"
          uploadArtifacts: true
          temporaryPublicStorage: true

      - name: Comment Lighthouse Results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const results = JSON.parse(fs.readFileSync('./.lighthouseci/results.json', 'utf8'));

            const comment = `## Lighthouse CI Results

            | Metric | Score |
            |--------|-------|
            | Performance | ${results[0].summary.performance * 100} |
            | Accessibility | ${results[0].summary.accessibility * 100} |
            | Best Practices | ${results[0].summary['best-practices'] * 100} |
            | SEO | ${results[0].summary.seo * 100} |

            [View full report](${results[0].persistedUrl})
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment,
            });
