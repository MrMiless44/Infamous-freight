name: Vercel Preview Note

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  pull-requests: write
  contents: read

jobs:
  add-preview-note:
    runs-on: ubuntu-latest
    steps:
      - name: Add preview guidance comment
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              '### Preview deployment note',
              '',
              '- Vercel preview builds run for `apps/web` on this PR.',
              '- Ensure the required Vercel project environment variables are set.',
              '- After merge, production deploy is driven by the main branch workflow.'
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
