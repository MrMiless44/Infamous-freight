name: Smoke Test

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - CI/CD — Infamous Freight
    types:
      - completed

permissions:
  contents: read

concurrency:
  group: smoke-test-${{ github.ref }}
  cancel-in-progress: true

jobs:
  smoke-test:
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - name: Check canonical frontend
        run: curl --fail --show-error --location --head --retry 5 --retry-delay 10 --retry-connrefused https://www.infamousfreight.com

      - name: Check bare domain redirects to canonical www host
        run: |
          set -euo pipefail
          final_url=$(curl --silent --location --head --retry 5 --retry-delay 10 --retry-connrefused --output /dev/null --write-out '%{url_effective}' https://infamousfreight.com)
          test "$final_url" = "https://www.infamousfreight.com/"

      - name: Check Fly root health
        run: curl --fail --show-error --silent --max-time 15 --retry 5 --retry-delay 10 --retry-connrefused https://infamous-freight.fly.dev/health

      - name: Check Fly API health
        run: curl --fail --show-error --silent --max-time 15 --retry 5 --retry-delay 10 --retry-connrefused https://infamous-freight.fly.dev/api/health

      - name: Check proxied API health
        run: curl --fail --show-error --silent --retry 5 --retry-delay 10 --retry-connrefused https://www.infamousfreight.com/api/health
