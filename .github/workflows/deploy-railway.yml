name: Deploy Railway Database

on:
  workflow_dispatch:
    inputs:
      environment:
        description: "Railway environment"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging
  workflow_call:
    inputs:
      environment:
        required: false
        type: string

concurrency:
  group: ci-${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: false

permissions:
  contents: read

env:
  RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
  RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}

jobs:
  migrate-db:
    name: Migrate Railway Postgres
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Validate Railway secrets
        run: |
          if [ -z "$RAILWAY_TOKEN" ]; then
            echo "Missing RAILWAY_TOKEN secret"
            exit 1
          fi
          if [ -z "$RAILWAY_PROJECT_ID" ]; then
            echo "Missing RAILWAY_PROJECT_ID secret"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0
          run_install: false

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Select Railway project
        run: railway project "$RAILWAY_PROJECT_ID"

      - name: Select Railway environment
        run: |
          ENV_NAME="${{ inputs.environment }}"
          if [ -z "$ENV_NAME" ]; then
            ENV_NAME="production"
          fi
          railway environment "$ENV_NAME"

      - name: Select Railway service
        run: railway service api

      - name: Run Prisma migrations
        run: railway run pnpm --filter api prisma:migrate

      - name: Migration summary
        run: |
          echo "## 🛤️ Railway Database Migration" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Environment**: ${{ inputs.environment || 'production' }}" >> $GITHUB_STEP_SUMMARY
          echo "- **Status**: ✅ Completed" >> $GITHUB_STEP_SUMMARY
          echo "- **Dashboard**: https://railway.app/project/${{ secrets.RAILWAY_PROJECT_ID }}" >> $GITHUB_STEP_SUMMARY
