name: Deploy Mobile (EAS Update)

on:
  push:
    branches: [main]
    paths:
      - "mobile/**"
      - "packages/**"
      - "pnpm-lock.yaml"
  workflow_call:

concurrency:
  group: deploy-mobile
  cancel-in-progress: true

jobs:
  ota:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "pnpm"

      - run: pnpm install --frozen-lockfile

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS Update (OTA)
        run: cd mobile && eas update --auto --channel production
