name: Deploy Mobile (EAS Update)

on:
  push:
    branches: [main]
    paths:
      - "src/apps/mobile/**"
      - "packages/**"
      - "pnpm-lock.yaml"
  workflow_call: {}

concurrency:
  group: deploy-mobile
  cancel-in-progress: true

jobs:
  ota:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: EAS Update (OTA)
        run: cd src/apps/mobile && eas update --channel production

      - name: Slack notify (success)
        if: success() && secrets.SLACK_WEBHOOK_URL != ''
        run: |
          payload=$(jq -n \
            --arg text "✅ Deploy Success: ${{ github.workflow }} @ ${{ github.ref_name }} (commit ${{ github.sha }})" \
            '{text:$text}')
          curl -X POST -H 'Content-type: application/json' \
            --data "$payload" "${{ secrets.SLACK_WEBHOOK_URL }}"

      - name: Slack notify (failure)
        if: failure() && secrets.SLACK_WEBHOOK_URL != ''
        run: |
          payload=$(jq -n \
            --arg text "❌ Deploy Failed: ${{ github.workflow }} @ ${{ github.ref_name }} (commit ${{ github.sha }})" \
            '{text:$text}')
          curl -X POST -H 'Content-type: application/json' \
            --data "$payload" "${{ secrets.SLACK_WEBHOOK_URL }}"
