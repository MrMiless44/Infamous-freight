name: Deploy ALL Platforms

on:
  push:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: deploy-all
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy-fly-api:
    uses: ./.github/workflows/fly-deploy.yml
    secrets: inherit

  deploy-vercel-web:
    uses: ./.github/workflows/vercel-deploy.yml
    secrets: inherit

  deploy-railway-db:
    uses: ./.github/workflows/deploy-railway.yml
    with:
      environment: production
    secrets: inherit

  deploy-supabase:
    uses: ./.github/workflows/deploy-supabase.yml
    secrets: inherit

  smoke-test:
    name: Post-Deploy Smoke Tests
    runs-on: ubuntu-latest
    needs: [deploy-fly-api, deploy-vercel-web]
    if: always()
    steps:
      - name: Test Fly.io API Health
        run: |
          API_HEALTH_URL="${{ needs.deploy-fly-api.outputs.health_url }}"
          if [ -z "$API_HEALTH_URL" ]; then
            echo "No API health URL available. Skipping."
            exit 0
          fi
          echo "Testing API: $API_HEALTH_URL"
          RESPONSE=$(curl -sf "$API_HEALTH_URL" || echo '{"error":"failed"}')
          if echo "$RESPONSE" | jq -e '.success == true or .data.status == "ok"' > /dev/null 2>&1; then
            echo "API health check passed"
          else
            echo "API health check failed"
            exit 1
          fi

      - name: Test Vercel Web App
        run: |
          WEB_URL="${{ needs.deploy-vercel-web.outputs.deploy_url }}"
          if [ -z "$WEB_URL" ]; then
            echo "No web deploy URL available. Skipping."
            exit 0
          fi
          echo "Testing Web: $WEB_URL"
          HTTP_CODE=$(curl -o /dev/null -s -w "%{http_code}" "$WEB_URL" || echo "000")
          if [ "$HTTP_CODE" = "200" ]; then
            echo "Web app is accessible"
          else
            echo "Web app returned HTTP $HTTP_CODE"
            exit 1
          fi

      - name: Smoke test summary
        if: always()
        run: |
          echo "## 🧪 Smoke Test Results" >> $GITHUB_STEP_SUMMARY
          echo "- API Health: See logs above" >> $GITHUB_STEP_SUMMARY
          echo "- Web Accessibility: See logs above" >> $GITHUB_STEP_SUMMARY

  summary:
    runs-on: ubuntu-latest
    needs: [deploy-fly-api, deploy-vercel-web, deploy-railway-db, deploy-supabase, smoke-test]
    if: always()
    steps:
      - name: Deployment Summary
        run: |
          echo "## 🌍 Multi-Platform Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Platform | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| Fly.io API | ${{ needs.deploy-fly-api.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Vercel Web | ${{ needs.deploy-vercel-web.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Railway DB | ${{ needs.deploy-railway-db.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Supabase | ${{ needs.deploy-supabase.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Smoke Tests | ${{ needs.smoke-test.result }} |" >> $GITHUB_STEP_SUMMARY

  notify:
    name: Send Notifications
    runs-on: ubuntu-latest
    needs:
      [deploy-fly-api, deploy-vercel-web, deploy-railway-db, deploy-supabase, smoke-test, summary]
    if: always()
    env:
      SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
    steps:
      - name: Determine overall status
        id: status
        run: |
          if [ "${{ needs.deploy-fly-api.result }}" = "success" ] && \
             [ "${{ needs.deploy-vercel-web.result }}" = "success" ] && \
             [ "${{ needs.deploy-railway-db.result }}" = "success" ] && \
             [ "${{ needs.deploy-supabase.result }}" = "success" ] && \
             [ "${{ needs.smoke-test.result }}" = "success" ]; then
            echo "status=success" >> $GITHUB_OUTPUT
            echo "emoji=🎉" >> $GITHUB_OUTPUT
          else
            echo "status=failure" >> $GITHUB_OUTPUT
            echo "emoji=❌" >> $GITHUB_OUTPUT
          fi

      - name: Slack notification
        if: env.SLACK_WEBHOOK_URL != ''
        uses: slackapi/slack-github-action@v2
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: |
            {
              "text": "${{ steps.status.outputs.emoji }} Multi-Platform Deployment ${{ steps.status.outputs.status }}",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "${{ steps.status.outputs.emoji }} *Multi-Platform Deployment ${{ steps.status.outputs.status }}*\n\n*Platforms:*\n• Fly.io: ${{ needs.deploy-fly-api.result }}\n• Vercel: ${{ needs.deploy-vercel-web.result }}\n• Railway: ${{ needs.deploy-railway-db.result }}\n• Supabase: ${{ needs.deploy-supabase.result }}\n• Smoke Tests: ${{ needs.smoke-test.result }}\n\n*Branch:* ${{ github.ref_name }}\n*Commit:* <${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}|${{ github.sha }}>\n*Workflow:* <${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}|View Details>"
                  }
                }
              ]
            }

      - name: Discord notification
        if: env.DISCORD_WEBHOOK_URL != ''
        run: |
          STATUS_EMOJI="${{ steps.status.outputs.emoji }}"
          STATUS="${{ steps.status.outputs.status }}"

          curl -H "Content-Type: application/json" \
            -d "{\"content\": \"${STATUS_EMOJI} **Multi-Platform Deployment ${STATUS}**\n\n**Platforms:**\n• Fly.io: ${{ needs.deploy-fly-api.result }}\n• Vercel: ${{ needs.deploy-vercel-web.result }}\n• Railway: ${{ needs.deploy-railway-db.result }}\n• Supabase: ${{ needs.deploy-supabase.result }}\n• Smoke Tests: ${{ needs.smoke-test.result }}\n\n**Branch:** ${{ github.ref_name }}\n**Commit:** ${{ github.sha }}\n**Workflow:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
            "$DISCORD_WEBHOOK_URL"
