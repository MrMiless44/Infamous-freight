name: Health Check & Monitoring

on:
  schedule:
    - cron: "*/15 * * * *" # Every 15 minutes
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: read
  checks: write
  statuses: write

jobs:
  health_check:
    runs-on: ubuntu-latest
    name: API & Web Health Check

    steps:
      - name: Check API Health
        id: api_health
        run: |
          echo "🔍 Checking API health..."

          MAX_RETRIES=3
          RETRY_COUNT=0

          while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
            RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
              -m 10 \
              "${{ secrets.API_URL || 'https://infamous-freight-api.fly.dev' }}/api/health")
            
            if [ "$RESPONSE" = "200" ]; then
              echo "✅ API is healthy (HTTP $RESPONSE)"
              echo "api_status=healthy" >> $GITHUB_OUTPUT
              break
            fi
            
            RETRY_COUNT=$((RETRY_COUNT + 1))
            echo "⏳ Attempt $RETRY_COUNT/$MAX_RETRIES - HTTP $RESPONSE"
            sleep 5
          done

          if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
            echo "❌ API health check failed"
            echo "api_status=unhealthy" >> $GITHUB_OUTPUT
          fi

      - name: Check Web Health
        id: web_health
        run: |
          echo "🔍 Checking Web health..."

          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -m 10 \
            "https://infamous-freight-enterprises.vercel.app")

          if [ "$RESPONSE" = "200" ]; then
            echo "✅ Web is healthy (HTTP $RESPONSE)"
            echo "web_status=healthy" >> $GITHUB_OUTPUT
          else
            echo "❌ Web returned HTTP $RESPONSE"
            echo "web_status=unhealthy" >> $GITHUB_OUTPUT
          fi

      - name: Database Connection Check
        id: db_check
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "🔍 Checking database connectivity..."

          if [ -z "$DATABASE_URL" ]; then
            echo "⚠️  DATABASE_URL not configured"
            echo "db_status=unknown" >> $GITHUB_OUTPUT
          else
            echo "✅ Database URL configured"
            echo "db_status=configured" >> $GITHUB_OUTPUT
          fi

      - name: Check Redis Connection
        id: redis_check
        env:
          REDIS_URL: ${{ secrets.REDIS_URL }}
        run: |
          echo "🔍 Checking Redis connectivity..."

          if [ -z "$REDIS_URL" ]; then
            echo "⚠️  REDIS_URL not configured"
            echo "redis_status=unknown" >> $GITHUB_OUTPUT
          else
            echo "✅ Redis URL configured"
            echo "redis_status=configured" >> $GITHUB_OUTPUT
          fi

      - name: Performance Metrics
        id: metrics
        run: |
          echo "📊 Collecting performance metrics..."

          # API response time
          API_TIME=$(curl -s -o /dev/null -w "%{time_total}" \
            "${{ secrets.API_URL || 'https://infamous-freight-api.fly.dev' }}/api/health" \
            2>/dev/null || echo "N/A")
          echo "api_response_time=$API_TIME" >> $GITHUB_OUTPUT

          # Web response time
          WEB_TIME=$(curl -s -o /dev/null -w "%{time_total}" \
            "https://infamous-freight-enterprises.vercel.app" \
            2>/dev/null || echo "N/A")
          echo "web_response_time=$WEB_TIME" >> $GITHUB_OUTPUT

      - name: Create Status Check
        uses: actions/github-script@v7
        with:
          script: |
            const conclusion = '${{ steps.api_health.outputs.api_status }}' === 'healthy' 
              ? 'success' 
              : 'failure';

            github.rest.checks.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'Health Check',
              head_sha: context.sha,
              status: 'completed',
              conclusion: conclusion,
              output: {
                title: 'Service Health Status',
                summary: `
                  API: ${{ steps.api_health.outputs.api_status }}
                  Web: ${{ steps.web_health.outputs.web_status }}
                  Database: ${{ steps.db_check.outputs.db_status }}
                  Redis: ${{ steps.redis_check.outputs.redis_status }}
                `,
                text: `
                  API Response Time: ${{ steps.metrics.outputs.api_response_time }}s
                  Web Response Time: ${{ steps.metrics.outputs.web_response_time }}s
                `,
              },
            });

      - name: Send Slack Notification
        if: failure()
        uses: slackapi/slack-github-action@v1.24.0
        with:
          webhook-url: ${{ secrets.SLACK_WEBHOOK }}
          payload: |
            {
              "text": "🚨 Health Check Failed",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*Health Check Failed*\nAPI: ${{ steps.api_health.outputs.api_status }}\nWeb: ${{ steps.web_health.outputs.web_status }}"
                  }
                }
              ]
            }
