name: Full Validation

on:
  workflow_dispatch:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

concurrency:
  group: full-validation-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Install, lint, build, and test
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Setup pnpm
        uses: pnpm/action-setup@b906affcce14559ad1aafd4ab0e942779e9f58b1 # v4.1.0

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build

      - name: Test API workspace
        run: pnpm -C apps/api run test -- --runInBand

      - name: Environment diagnostics (non-strict)
        run: pnpm run codex:env-check

      - name: Write validation summary
        if: always()
        run: |
          {
            echo "## Full Validation"
            echo ""
            echo "Validated commands:"
            echo "- pnpm install --frozen-lockfile"
            echo "- pnpm run lint"
            echo "- pnpm run build"
            echo "- pnpm -C apps/api run test -- --runInBand"
            echo "- pnpm run codex:env-check"
            echo ""
            echo "Ref: ${{ github.ref }}"
            echo "SHA: ${{ github.sha }}"
          } >> "$GITHUB_STEP_SUMMARY"

  docker-runtime:
    name: Docker runtime build and healthcheck
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 20
    env:
      IMAGE_NAME: infamous-freight-local-check
      CONTAINER_NAME: infamous-freight-runtime-check-${{ github.run_id }}-${{ github.run_attempt }}
      DATABASE_URL: postgresql://user:pass@127.0.0.1:5432/db

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@5b527519f648035f8be57f79b1a08876fa6a6e64 # v3.11.1

      - name: Build runtime image
        run: docker build --pull -t "$IMAGE_NAME" .

      - name: Start runtime container
        run: |
          docker run -d \
            --name "$CONTAINER_NAME" \
            -e DATABASE_URL="$DATABASE_URL" \
            -e NODE_ENV=production \
            -e PORT=3000 \
            -e HOST=0.0.0.0 \
            -p 3000:3000 \
            "$IMAGE_NAME"

      - name: Probe Docker healthcheck
        run: |
          for i in {1..60}; do
            if ! docker ps --format '{{.Names}}' | grep -qx "$CONTAINER_NAME"; then
              echo "Container is not running." >&2
              docker logs "$CONTAINER_NAME" || true
              exit 1
            fi

            health_status="$(docker inspect --format '{{if .State.Health}}{{.State.Health.Status}}{{else}}none{{end}}' "$CONTAINER_NAME")"
            echo "Docker health status: $health_status"

            case "$health_status" in
              healthy)
                curl -fsS http://127.0.0.1:3000/api/health >/dev/null
                echo "Container healthcheck is healthy and /api/health responds."
                exit 0
                ;;
              unhealthy)
                echo "Container healthcheck is unhealthy." >&2
                docker logs "$CONTAINER_NAME" || true
                exit 1
                ;;
              none)
                if curl -fsS http://127.0.0.1:3000/api/health >/dev/null; then
                  echo "No Docker HEALTHCHECK present, but /api/health responds."
                  exit 0
                fi
                ;;
            esac

            sleep 5
          done

          echo "Docker healthcheck did not become healthy in time." >&2
          docker inspect "$CONTAINER_NAME" || true
          docker logs "$CONTAINER_NAME" || true
          exit 1

      - name: Cleanup container
        if: always()
        run: |
          docker rm -f "$CONTAINER_NAME" || true
          docker image rm -f "$IMAGE_NAME" || true
