name: Fly Deploy Main

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: fly-deploy-main
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify FLY_API_TOKEN exists
        shell: bash
        run: |
          if [ -z "${{ secrets.FLY_API_TOKEN }}" ]; then
            echo "FLY_API_TOKEN is missing or empty. Add it in GitHub -> Settings -> Secrets and variables -> Actions."
            exit 1
          fi

      - name: Validate API env schema/template sync
        shell: bash
        run: bash tests/ci/env-schema-sync.test.sh

      - name: Validate toolchain consistency
        shell: bash
        run: bash tests/ci/toolchain-consistency.test.sh

      - name: Set up Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Resolve Fly app config
        id: fly-config
        shell: bash
        run: |
          APP_NAME=$(grep -E '^app\s*=\s*' fly.toml | head -1 | sed -E 's/.*=\s*["\x27]?([^"\x27 ]+)["\x27]?/\1/')
          if [ -z "$APP_NAME" ]; then
            echo "Fly app name not found in fly.toml"
            exit 1
          fi
          echo "app_name=$APP_NAME" >> "$GITHUB_OUTPUT"

      - name: Deploy to Fly.io
        shell: bash
        run: flyctl deploy -c fly.toml -a "${{ steps.fly-config.outputs.app_name }}" --remote-only --depot=false
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Get app URLs
        id: get-url
        shell: bash
        run: |
          APP_NAME="${{ steps.fly-config.outputs.app_name }}"
          echo "app_url=https://$APP_NAME.fly.dev" >> "$GITHUB_OUTPUT"
          echo "health_url=https://$APP_NAME.fly.dev/health" >> "$GITHUB_OUTPUT"

      - name: Health check
        shell: bash
        run: |
          bash scripts/fly-postdeploy-check.sh \
            "${{ steps.fly-config.outputs.app_name }}" \
            "${{ steps.get-url.outputs.health_url }}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Deployment summary
        shell: bash
        run: |
          APP_NAME="${{ steps.fly-config.outputs.app_name }}"
          echo "## Fly.io Deployment" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- App: $APP_NAME" >> "$GITHUB_STEP_SUMMARY"
          echo "- URL: ${{ steps.get-url.outputs.app_url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Health Check: ${{ steps.get-url.outputs.health_url }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Dashboard: https://fly.io/apps/$APP_NAME" >> "$GITHUB_STEP_SUMMARY"
