name: Code Quality

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  lint-and-format:
    name: Lint & Format Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run ESLint
        run: pnpm lint
        continue-on-error: false

      - name: Run Prettier format check
        run: pnpm format:check
        continue-on-error: false

  type-check:
    name: TypeScript Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package (required for types)
        run: pnpm --filter @infamous-freight/shared build

      - name: Type check all packages
        run: pnpm check:types

  tests:
    name: Run Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    services:
      postgres:
        image: postgres:14-alpine
        env:
          POSTGRES_USER: test
          POSTGRES_PASSWORD: test
          POSTGRES_DB: infamous_freight_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build shared package
        run: pnpm --filter @infamous-freight/shared build

      - name: Setup test database
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/infamous_freight_test
        run: |
          cd apps/api
          pnpm prisma:generate
          pnpm prisma:migrate:deploy

      - name: Run API tests
        env:
          DATABASE_URL: postgresql://test:test@localhost:5432/infamous_freight_test
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: test-secret-key-for-ci
          JWT_REFRESH_SECRET: test-refresh-secret-key-for-ci
          NODE_ENV: test
        run: pnpm --filter api test

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        if: always()
        with:
          files: ./apps/api/coverage/coverage-final.json
          flags: api
          name: API Coverage

  dependency-audit:
    name: Security Audit & Dependency Check
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run comprehensive security audit
        run: |
          echo "Running HIGH-level security audit..."
          pnpm audit --audit-level=high --recursive
        continue-on-error: false # Fail on NEW vulnerabilities introduced

      - name: Check for outdated dependencies with report
        run: |
          echo "Checking for outdated packages..."
          pnpm outdated --recursive || echo "ℹ️  Review outdated packages (non-blocking)"

      - name: Generate vulnerability summary
        if: always()
        run: |
          echo "## Security Audit Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Timestamp**: $(date -u +%Y-%m-%dT%H:%M:%SZ)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Known Vulnerabilities (Tracked)" >> $GITHUB_STEP_SUMMARY
          echo "- CRITICAL: fast-xml-parser (aws-sdk) - Awaiting AWS fix (Q2 2026)" >> $GITHUB_STEP_SUMMARY
          echo "- HIGH: React Native 0.73.4 chain (13 vulns) - Blocked on RN 0.74+ (Q1 2026)" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "See [SECURITY.md](./SECURITY.md) and [VULNERABILITY-AUDIT-REPORT.md](./VULNERABILITY-AUDIT-REPORT.md) for details." >> $GITHUB_STEP_SUMMARY

      - name: Comment on PR with audit results
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Security audit passed (known vulnerabilities documented in SECURITY.md)'
            })

  build-check:
    name: Build Check
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm build
        env:
          # Provide minimal env vars for build
          NEXT_PUBLIC_API_URL: http://localhost:4000
          DATABASE_URL: postgresql://user:pass@localhost:5432/db
          SKIP_ENV_VALIDATION: true

  code-quality-summary:
    name: Code Quality Summary
    runs-on: ubuntu-latest
    needs: [lint-and-format, type-check, tests, dependency-audit, build-check]
    if: always()

    steps:
      - name: Check job results
        run: |
          echo "Lint & Format: ${{ needs.lint-and-format.result }}"
          echo "Type Check: ${{ needs.type-check.result }}"
          echo "Tests: ${{ needs.tests.result }}"
          echo "Security Audit: ${{ needs.dependency-audit.result }}"
          echo "Build Check: ${{ needs.build-check.result }}"

          if [[ "${{ needs.lint-and-format.result }}" != "success" || \
                "${{ needs.type-check.result }}" != "success" || \
                "${{ needs.tests.result }}" != "success" || \
                "${{ needs.build-check.result }}" != "success" ]]; then
            echo "❌ Code quality checks failed!"
            exit 1
          else
            echo "✅ All code quality checks passed!"
          fi
