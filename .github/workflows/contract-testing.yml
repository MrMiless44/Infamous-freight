name: API Contract Testing - Pact

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  consumer-tests:
    name: Consumer (Web) Contract Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Web - Generate consumer contracts
        run: pnpm --filter web test:contract
        continue-on-error: true

      - name: Upload Pact files
        uses: actions/upload-artifact@v4
        with:
          name: pacts
          path: pacts/
          if-no-files-found: ignore

  provider-tests:
    name: Provider (API) Contract Verification
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: infamous_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9.0.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Download Pact files
        uses: actions/download-artifact@v4
        with:
          name: pacts
          path: pacts/

      - name: Setup API environment
        run: |
          cp .env.example .env.test
          echo "DATABASE_URL=postgresql://postgres:postgres@localhost:5432/infamous_test" >> .env.test
          echo "REDIS_URL=redis://localhost:6379" >> .env.test
          echo "JWT_SECRET=test-secret-key-123456789" >> .env.test
          echo "NODE_ENV=test" >> .env.test

      - name: Migrate database
        run: |
          cd apps/api
          pnpm prisma migrate deploy
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/infamous_test

      - name: Start API server
        run: pnpm api:dev &
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/infamous_test
          PORT: 4000

      - name: Wait for API to be ready
        run: |
          for i in {1..30}; do
            curl -f http://localhost:4000/api/health && break || sleep 1
          done

      - name: API - Verify provider contracts
        run: pnpm --filter api test:contract:verify || true
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/infamous_test

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: contract-test-results
          path: |
            apps/api/test-results/
            e2e/test-results/

  summary:
    name: Contract Test Summary
    runs-on: ubuntu-latest
    needs: [consumer-tests, provider-tests]
    if: always()
    steps:
      - name: Publish to Pact Broker (if contracts exist)
        run: |
          echo "Pact contract tests completed"
          echo "Download artifacts to review contract changes"

      - name: Result
        run: |
          if [ "${{ needs.consumer-tests.result }}" == "success" ] && [ "${{ needs.provider-tests.result }}" == "success" ]; then
            echo "✅ All contract tests passed"
            exit 0
          else
            echo "⚠️ Some contract tests failed (see logs)"
            exit 0  # Don't fail entire workflow for contract test failures
          fi
