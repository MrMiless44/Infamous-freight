name: Compliance Check

on:
  pull_request:
    branches: [main, develop]
    paths:
      - "compliance/policies/**"
      - ".github/workflows/compliance-check.yml"
  push:
    branches: [main, develop]
    paths:
      - "compliance/policies/**"
      - ".github/workflows/compliance-check.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${ github.ref }-${ github.workflow }
  cancel-in-progress: true

jobs:
  validate-compliance-policies:
    name: Validate Compliance Policies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Compliance Policies
        run: |
          job_name="Validate Compliance Policies"
          required_policies=(
            "dispute-policy.md"
            "enforcement-policy.md"
            "fraud-policy.md"
            "payment-policy.md"
            "refunds-policy.md"
          )

          missing_policies=()
          for policy in "${required_policies[@]}"; do
            if [[ ! -f "compliance/policies/${policy}" ]]; then
              missing_policies+=("${policy}")
            fi
          done

          if (( ${#missing_policies[@]} )); then
            echo "❌ ${job_name}: missing required policy files:"
            printf ' - %s\n' "${missing_policies[@]}"
            exit 1
          fi

          echo "✅ ${job_name}: all required policy files are present."
