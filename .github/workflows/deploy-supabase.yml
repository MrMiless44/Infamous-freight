name: Deploy Supabase

on:
  workflow_dispatch:
  workflow_call:

permissions:
  contents: read

concurrency:
  group: ci-${ github.ref }-${ github.workflow }
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate Supabase secrets
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "Missing SUPABASE_ACCESS_TOKEN secret"
            exit 1
          fi
          if [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "Missing SUPABASE_PROJECT_REF secret"
            exit 1
          fi
          if [ -z "$SUPABASE_DB_PASSWORD" ]; then
            echo "Missing SUPABASE_DB_PASSWORD secret"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Supabase CLI
        run: |
          curl -sL https://github.com/supabase/cli/releases/latest/download/supabase_linux_amd64.tar.gz |
            tar -xz -C /usr/local/bin supabase

      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"

      - name: Apply database migrations
        run: supabase db push

      - name: Deploy Edge Functions
        run: |
          supabase functions deploy analytics
          supabase functions deploy shipment-tracking
          supabase functions deploy thread-summary

      - name: Deployment summary
        run: |
          echo "## 🧩 Supabase Deployment" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **Project**: $SUPABASE_PROJECT_REF" >> $GITHUB_STEP_SUMMARY
          echo "- **Database**: ✅ Migrations applied" >> $GITHUB_STEP_SUMMARY
          echo "- **Edge Functions**: ✅ analytics, shipment-tracking, thread-summary" >> $GITHUB_STEP_SUMMARY
          echo "- **Dashboard**: https://supabase.com/dashboard/project/$SUPABASE_PROJECT_REF" >> $GITHUB_STEP_SUMMARY
