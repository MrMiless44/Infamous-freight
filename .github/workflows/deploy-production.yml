name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      environment:
        description: "Deployment environment"
        required: true
        default: "production"
        type: choice
        options:
          - production
          - staging

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: "22.22.0"
  PNPM_VERSION: "9.0.0"

jobs:
  test:
    name: Lint, Typecheck & Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm -r --if-present lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Run tests
        run: pnpm -r --if-present test
        continue-on-error: true

  build:
    name: Build All Packages
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 20
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build all packages
        run: pnpm -r --if-present build

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            apps/web/.next
            packages/shared/dist
          retention-days: 1

  deploy-web:
    name: Deploy Web to Vercel
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy to Vercel
        run: |
          echo "Vercel deployment triggered automatically on push to main"
          echo "Monitor at: https://vercel.com/dashboard"

  deploy-api:
    name: Deploy API to Fly.io
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Fly CLI
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy to Fly.io
        run: |
          if [ -n "$FLY_API_TOKEN" ]; then
            flyctl deploy --remote-only
          else
            echo "⚠️ FLY_API_TOKEN not found in secrets"
            echo "To enable automatic Fly.io deployments:"
            echo "1. Get your token: flyctl auth token"
            echo "2. Add it to GitHub Secrets: FLY_API_TOKEN"
          fi
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  verify-deployment:
    name: Verify Production Deployment
    runs-on: ubuntu-latest
    needs: [deploy-web, deploy-api]
    if: github.ref == 'refs/heads/main'
    timeout-minutes: 10
    steps:
      - name: Wait for deployments
        run: sleep 60

      - name: Check web deployment
        run: |
          WEB_URL="https://infamous-freight-enterprises-git-main-santorio-miles-projects.vercel.app"
          echo "Checking web at: $WEB_URL"
          curl -I "$WEB_URL" || echo "Web may still be deploying"

      - name: Check API health
        run: |
          API_URL="https://infamous-freight-api.fly.dev/api/health"
          echo "Checking API at: $API_URL"
          curl -f "$API_URL" || echo "API may still be deploying"

      - name: Deployment summary
        run: |
          echo "╔════════════════════════════════════════════════════════════════╗"
          echo "║                                                                ║"
          echo "║              🎉 PRODUCTION DEPLOYMENT COMPLETE 🎉             ║"
          echo "║                                                                ║"
          echo "║  Web: https://infamous-freight.vercel.app                     ║"
          echo "║  API: https://infamous-freight-api.fly.dev                    ║"
          echo "║                                                                ║"
          echo "╚════════════════════════════════════════════════════════════════╝"
