name: Vercel Preview Deployment

# The primary web deployment platform for this project is Netlify (native Git
# integration on push to main). Vercel is an optional secondary target.
#
# This workflow is intentionally non-blocking: if the Vercel project account
# hits a build-rate-limit or quota issue, the step is retried up to three times
# and then marked as a warning rather than a hard failure, so it cannot block
# PR merges.
#
# Vercel's native GitHub bot integration is also disabled in
# apps/web/vercel.json ("github": {"enabled": false}) to prevent the Vercel
# bot from posting its own rate-limited check status on pull requests.

on:
  pull_request:
    branches: [main]
    paths:
      - 'apps/web/**'

permissions:
  contents: read
  pull-requests: read

jobs:
  vercel-preview:
    name: Vercel Preview (non-blocking)
    runs-on: ubuntu-latest
    # Do NOT block PR merges on this job — Netlify is the required deploy gate.
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Check Vercel token availability
        id: token-check
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          if [ -z "${VERCEL_TOKEN}" ]; then
            echo "available=false" >> "$GITHUB_OUTPUT"
            echo "::warning::VERCEL_TOKEN secret is not set. Skipping Vercel preview deployment."
          else
            echo "available=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        if: steps.token-check.outputs.available == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'

      - name: Install Vercel CLI
        if: steps.token-check.outputs.available == 'true'
        run: npm install --global vercel@latest

      - name: Deploy preview to Vercel (with retry)
        if: steps.token-check.outputs.available == 'true'
        id: deploy
        # Retry up to 3 times with exponential back-off to recover from
        # transient build-rate-limit or quota errors.
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          MAX_ATTEMPTS=3
          DELAY=30
          ATTEMPT=0
          while [ $ATTEMPT -lt $MAX_ATTEMPTS ]; do
            ATTEMPT=$((ATTEMPT + 1))
            echo "Vercel deploy attempt $ATTEMPT of $MAX_ATTEMPTS"
            if vercel deploy --token "$VERCEL_TOKEN" \
                             --cwd apps/web \
                             --yes > /tmp/vercel-output.txt 2>&1; then
              PREVIEW_URL=$(grep -oE 'https://[^[:space:]]+\.vercel\.app' /tmp/vercel-output.txt | tail -1)
              echo "preview_url=${PREVIEW_URL}" >> "$GITHUB_OUTPUT"
              echo "::notice::Vercel preview deployed: ${PREVIEW_URL}"
              exit 0
            fi
            # Detect rate-limit response and back off before retrying
            if grep -qi 'rate.limit\|quota\|429\|build limit' /tmp/vercel-output.txt; then
              echo "::warning::Vercel rate-limit detected on attempt $ATTEMPT. Waiting ${DELAY}s before retry..."
              sleep "$DELAY"
              DELAY=$((DELAY * 2))
            else
              echo "::warning::Vercel deploy failed on attempt $ATTEMPT with a non-rate-limit error."
              cat /tmp/vercel-output.txt
              exit 1
            fi
          done
          echo "::warning::Vercel preview deploy did not succeed after $MAX_ATTEMPTS attempts (rate-limit). This is non-blocking — Netlify is the required deploy gate."
          exit 0
