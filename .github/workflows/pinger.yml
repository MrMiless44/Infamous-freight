name: Watchdog Pinger
on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${ github.ref }-${ github.workflow }
  cancel-in-progress: false

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API health
        run: curl -fsS https://infamous-freight-api.fly.dev/health
