name: Daily

on:
  schedule:
    - cron: "0 12 * * *"
  workflow_dispatch:

jobs:
  daily-ci:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "pnpm"
      - uses: pnpm/action-setup@v4
        with:
          version: "8"
      - run: pnpm install --frozen-lockfile || pnpm install
      - run: pnpm -C api --if-present build || true
      - run: pnpm -C web --if-present build || true
      - run: node ./scripts/ci-smoke.mjs || true
