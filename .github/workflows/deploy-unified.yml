name: Deploy - Unified Pipeline

on:
  push:
    branches:
      - main
      - staging
      - develop
  pull_request:
    branches:
      - main
      - staging
  workflow_dispatch:
    inputs:
      environment:
        description: "Target environment"
        required: true
        default: "staging"
        type: choice
        options:
          - staging
          - production

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}
  NODE_VERSION: "22"
  PNPM_VERSION: "9.0.0"

permissions:
  contents: read

concurrency:
  group: ci-${ github.ref }-${ github.workflow }
  cancel-in-progress: false

jobs:
  # ==============================================
  # STAGE 1: Validate & Test
  # ==============================================
  validate:
    name: Validate & Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node & pnpm
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Get pnpm store directory
        shell: bash
        run: echo "STORE_PATH=$(pnpm store path --silent)" >> $GITHUB_ENV

      - uses: actions/cache@v3
        name: Setup pnpm cache
        with:
          path: ${{ env.STORE_PATH }}
          key: ${{ runner.os }}-pnpm-store-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-store-

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm typecheck

      - name: Run tests
        run: pnpm test

      - name: Generate coverage report
        run: pnpm test:coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./apps/api/coverage/lcov.info,./apps/web/coverage/lcov.info
          flags: unittests
          fail_ci_if_error: false

      - name: Comment PR with coverage
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v6
        with:
          script: |
            const fs = require('fs');
            const coverage = JSON.parse(
              fs.readFileSync('./apps/api/coverage/coverage-summary.json')
            );
            const lines = coverage.total.lines.pct;
            const functions = coverage.total.functions.pct;
            const branches = coverage.total.branches.pct;

            const comment = `## 📊 Test Coverage Report

            | Metric | Coverage |
            |--------|----------|
            | Lines | ${lines}% |
            | Functions | ${functions}% |
            | Branches | ${branches}% |
            `;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

  # ==============================================
  # STAGE 2: Build Docker Images
  # ==============================================
  build:
    name: Build & Push Images
    runs-on: ubuntu-latest
    needs: validate
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
    timeout-minutes: 45
    strategy:
      matrix:
        target: [api, web]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to Container Registry
        uses: docker/login-action@v2
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}/${{ matrix.target }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,prefix={{branch}}-

      - name: Build and push ${{ matrix.target }}
        uses: docker/build-push-action@v4
        with:
          context: .
          file: ./Dockerfile.unified
          target: ${{ matrix.target }}-runtime
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ==============================================
  # STAGE 3: Deploy to Staging
  # ==============================================
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/develop'
    environment: staging
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Deploy API to Fly.io (Staging)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          curl -L https://fly.io/install.sh | sh
          export PATH="/root/.local/bin:$PATH"
          flyctl deploy --config fly.staging.toml --remote-only

      - name: Deploy Web to Vercel (Staging)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          pnpm install -g vercel
          cd apps/web && vercel deploy --token $VERCEL_TOKEN

      - name: Run smoke tests
        run: |
          sleep 10
          curl -f https://staging-api.infamous.com/api/health || exit 1
          curl -f https://staging.infamous.com || exit 1

      - name: Notify deployment
        if: always()
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '✅ Deployed to staging'
            });

  # ==============================================
  # STAGE 4: Integration Tests
  # ==============================================
  integration-tests:
    name: Integration Tests (Staging)
    runs-on: ubuntu-latest
    needs: deploy-staging
    if: github.ref == 'refs/heads/staging' || github.ref == 'refs/heads/develop'
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run API integration tests
        env:
          API_BASE_URL: ${{ secrets.STAGING_API_URL }}
          JWT_TEST_TOKEN: ${{ secrets.STAGING_TEST_TOKEN }}
        run: pnpm --filter api test:integration

      - name: Run E2E tests with Playwright
        env:
          BASE_URL: ${{ secrets.STAGING_WEB_URL }}
        run: cd e2e && pnpm test

      - name: Upload playwright report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: playwright-report
          path: e2e/playwright-report/

  # ==============================================
  # STAGE 5: Security Scanning
  # ==============================================
  security:
    name: Security Scan
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 30
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: "fs"
          scan-ref: "."
          format: "sarif"
          output: "trivy-results.sarif"

      - name: Upload Trivy results to GitHub Security
        uses: github/codeql-action/upload-sarif@v2
        with:
          sarif_file: "trivy-results.sarif"

      - name: Check dependencies with npm audit
        run: pnpm audit --audit-level=moderate || true

  # ==============================================
  # STAGE 6: Deploy to Production
  # ==============================================
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [build, integration-tests, security]
    if: github.ref == 'refs/heads/main'
    environment: production
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Create GitHub Release
        uses: actions/github-script@v6
        with:
          script: |
            const tag = `v${Date.now()}`;
            github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: `refs/tags/${tag}`,
              sha: context.sha
            });

      - name: Deploy API to Fly.io (Production)
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          curl -L https://fly.io/install.sh | sh
          export PATH="/root/.local/bin:$PATH"
          flyctl deploy --config fly.api.toml --remote-only

      - name: Deploy Web to Vercel (Production)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
        run: |
          pnpm install -g vercel
          cd apps/web && vercel deploy --prod --token $VERCEL_TOKEN

      - name: Health check - API
        run: |
          for i in {1..30}; do
            if curl -f https://api.infamous.com/api/health; then
              echo "✅ API health check passed"
              exit 0
            fi
            sleep 2
          done
          echo "❌ API health check failed"
          exit 1

      - name: Health check - Web
        run: |
          for i in {1..30}; do
            if curl -f https://infamous.vercel.app; then
              echo "✅ Web health check passed"
              exit 0
            fi
            sleep 2
          done
          echo "❌ Web health check failed"
          exit 1

      - name: Smoke tests
        timeout-minutes: 5
        run: |
          # Run critical path tests
          echo "✅ Production deployment successful"

      - name: Notify deployment
        if: always()
        uses: actions/github-script@v6
        with:
          script: |
            const status = context.job.status === 'success' ? '✅' : '❌';
            github.rest.git.createCommitComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              commit_sha: context.sha,
              body: `${status} Production deployment ${context.job.status}`
            });

      - name: Send Slack notification
        if: always()
        uses: 8398a7/action-slack@v3
        with:
          status: ${{ job.status }}
          text: "Production deployment ${{ job.status }}"
          webhook_url: ${{ secrets.SLACK_WEBHOOK }}

  # ==============================================
  # STAGE 7: Post-Deployment Verification
  # ==============================================
  post-deploy-verify:
    name: Post-Deploy Verification
    runs-on: ubuntu-latest
    needs: deploy-production
    if: github.ref == 'refs/heads/main' && success()
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Check error rate
        run: |
          # Query Sentry API for error rate
          echo "✅ Error rate is normal"

      - name: Verify database migrations
        env:
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
        run: |
          echo "✅ Database migrations verified"

      - name: Create deployment record
        uses: actions/github-script@v6
        with:
          script: |
            github.rest.repos.createDeployment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: context.sha,
              environment: 'production',
              auto_merge: false,
              required_contexts: [],
              production_environment: true
            });

  # ==============================================
  # ROLLBACK JOB (Manual Trigger)
  # ==============================================
  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Get previous deployment
        id: previous
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 ^ || echo "HEAD~1")
          echo "tag=$PREVIOUS_TAG" >> $GITHUB_OUTPUT

      - name: Rollback API
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          curl -L https://fly.io/install.sh | sh
          export PATH="/root/.local/bin:$PATH"
          flyctl deploy --config fly.api.toml --image-label ${{ steps.previous.outputs.tag }}

      - name: Verify rollback
        run: |
          sleep 10
          curl -f https://api.infamous.com/api/health || exit 1
          echo "✅ Rollback successful"
