name: Auto Deploy (Change Detection)

on:
  workflow_dispatch:
jobs:
  changes:
    runs-on: tenki-standard-medium-4c-8g
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      mobile: ${{ steps.filter.outputs.mobile }}
      ai: ${{ steps.filter.outputs.ai }}
      igfx: ${{ steps.filter.outputs.igfx }}
    steps:
      - uses: actions/checkout@v4

      - name: Detect changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api:
              - 'api/**'
              - 'packages/**'
            web:
              - 'web/**'
              - 'packages/**'
            mobile:
              - 'mobile/**'
              - 'packages/**'
            ai:
              - 'ai/**'
              - 'packages/**'
            igfx:
              - 'igfx/**'
              - 'packages/**'

  deploy-api:
    needs: changes
    if: needs.changes.outputs.api == 'true'
    uses: ./.github/workflows/fly-deploy.yml
    secrets: inherit

  deploy-web:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    uses: ./.github/workflows/vercel-deploy.yml
    secrets: inherit

  deploy-mobile:
    needs: changes
    if: needs.changes.outputs.mobile == 'true'
    uses: ./.github/workflows/mobile-deploy.yml
    secrets: inherit

  deploy-ai:
    needs: changes
    if: needs.changes.outputs.ai == 'true'
    uses: ./.github/workflows/deploy-ai.yml
    secrets: inherit

  deploy-igfx:
    needs: changes
    if: needs.changes.outputs.igfx == 'true'
    uses: ./.github/workflows/deploy-market.yml
    secrets: inherit

  summary:
    runs-on: tenki-standard-medium-4c-8g
    needs: [deploy-api, deploy-web, deploy-mobile, deploy-ai, deploy-igfx]
    if: always()
    steps:
      - name: Publish summary
        run: |
          echo "## 🚀 Auto Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| App | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | ------ |" >> $GITHUB_STEP_SUMMARY
          echo "| API | ${{ contains(fromJson('["success","failure"]'), needs.deploy-api.result) && needs.deploy-api.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Web | ${{ contains(fromJson('["success","failure"]'), needs.deploy-web.result) && needs.deploy-web.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Mobile | ${{ contains(fromJson('["success","failure"]'), needs.deploy-mobile.result) && needs.deploy-mobile.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Genesis AI | ${{ needs.deploy-ai.result == 'failure' && 'failure' || 'unknown' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| IGFX | ${{ needs.deploy-igfx.result == 'failure' && 'failure' || 'unknown' }} |" >> $GITHUB_STEP_SUMMARY