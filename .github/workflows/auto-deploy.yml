name: Auto Deploy (Change Detection)

on:
  workflow_dispatch:

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.filter.outputs.api }}
      web: ${{ steps.filter.outputs.web }}
      mobile: ${{ steps.filter.outputs.mobile }}
    steps:
      - uses: actions/checkout@v6

      - name: Detect changes
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api:
              - 'api/**'
              - 'packages/**'
            web:
              - 'web/**'
              - 'packages/**'
            mobile:
              - 'src/apps/mobile/**'
              - 'packages/**'

  deploy-api:
    needs: changes
    if: needs.changes.outputs.api == 'true'
    uses: ./.github/workflows/fly-deploy.yml
    secrets: inherit

  deploy-web:
    needs: changes
    if: needs.changes.outputs.web == 'true'
    uses: ./.github/workflows/vercel-deploy.yml
    secrets: inherit

  deploy-mobile:
    needs: changes
    if: needs.changes.outputs.mobile == 'true'
    uses: ./.github/workflows/mobile-deploy.yml
    secrets: inherit

  summary:
    runs-on: ubuntu-latest
    needs: [deploy-api, deploy-web, deploy-mobile]
    if: always()
    steps:
      - name: Publish summary
        run: |
          echo "## 🚀 Auto Deploy Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| App | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | ------ |" >> $GITHUB_STEP_SUMMARY
          echo "| API | ${{ contains(fromJson('["success","failure"]'), needs.deploy-api.result) && needs.deploy-api.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Web | ${{ contains(fromJson('["success","failure"]'), needs.deploy-web.result) && needs.deploy-web.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Mobile | ${{ contains(fromJson('["success","failure"]'), needs.deploy-mobile.result) && needs.deploy-mobile.result || 'skipped' }} |" >> $GITHUB_STEP_SUMMARY
