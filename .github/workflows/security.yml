name: Security

on:
  pull_request:
  push:
    branches:
      - main
      - develop
  schedule:
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write

jobs:
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  dependency-audit:
    name: Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Audit all dependencies
        run: pnpm run audit

      - name: Audit prod dependencies
        run: pnpm run audit:prod

      - name: Generate audit reports
        if: failure()
        run: |
          pnpm audit --json > audit-report-full.json || true
          pnpm audit --prod --json > audit-report-prod.json || true

      - name: Upload audit reports
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: dependency-audit-reports
          path: |
            audit-report-full.json
            audit-report-prod.json
          if-no-files-found: warn
