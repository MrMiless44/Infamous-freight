name: Security Scanning

on:
  push:
    branches: [main, develop]
    paths:
      - '**.ts'
      - '**.tsx'
      - '**.js'
      - '**.jsx'
      - '**/package.json'
      - 'pnpm-lock.yaml'
  pull_request:
    branches: [main, develop]
  schedule:
    # Weekly security scan on Sunday at 2 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  actions: read

env:
  NODE_VERSION: '22.16.0'
  PNPM_VERSION: '9.15.0'

jobs:
  # Dependency Audit
  dependency-audit:
    name: Dependency Security Audit
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm

      - name: Run pnpm audit
        run: pnpm audit --audit-level=high
        continue-on-error: true

      - name: Check for known vulnerabilities
        run: |
          echo "Checking for security advisories..."
          pnpm audit --json > audit-results.json || true
          cat audit-results.json

  # Secret Scanning with TruffleHog
  secret-scan:
    name: Secret Scanning
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: TruffleHog OSS
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --debug --only-verified

      - name: Check for secrets in code (Fallback)
        run: |
          echo "Scanning for potential secrets..."
          # Check for common secret patterns
          if git grep -E "(?i)(password|secret|key|token|api_key)\s*=\s*['\"][^'\"]{8,}" -- '*.js' '*.ts' '*.env*' || true; then
            echo "⚠️ Potential secrets found - please review"
          fi

      - name: Verify .env files are not committed
        run: |
          if git ls-files | grep -E "\.env$" | grep -v ".env.example"; then
            echo "❌ ERROR: .env file committed to repository"
            exit 1
          fi

  # Security Summary
  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [dependency-audit, secret-scan]
    if: always()
    steps:
      - name: Report Security Status
        run: |
          echo "🔒 Security Scan Complete"
          echo "- Dependency Audit: ${{ needs.dependency-audit.result }}"
          echo "- Secret Scan: ${{ needs.secret-scan.result }}"
