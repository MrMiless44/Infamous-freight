name: Security vulnerability reporting (guidance only)
description: How to report a potential security vulnerability (do not file details as a public issue)
title: "[Security]: "
labels:
  - security

body:
  - type: markdown
    attributes:
      value: |
        ## Reporting security vulnerabilities
        
        Security vulnerabilities must **not** be reported via public GitHub issues.
        
        To report a potential security vulnerability, please follow the instructions in our security policy
        (see `SECURITY.md` or the "Security" tab in this repository). Use the private reporting channels
        listed there (for example, GitHub private vulnerability reporting or the designated security contact).
        
        If you reached this form while trying to report a vulnerability, please **do not** provide any
        technical details here. Instead, go back and use the private reporting mechanism described in the
        security policy so that your report is handled confidentially and responsibly.
