body:
  - type: markdown
    attributes:
      value: |-
        ## Reporting security vulnerabilities
        
        Thank you for taking the time to report a potential security issue.
        
        To protect our users and systems, **do not include any sensitive security details, exploit code, or step-by-step reproduction instructions in a public GitHub issue**.
        
        Instead, please report vulnerabilities privately using GitHub's security reporting flow:
        
        1. Go to this repository's **Security** tab.
        2. Click **"Report a vulnerability"**.
        3. Follow the prompts to submit your report privately to the maintainers.
        
        If this project has a documented **Security Policy**, please review and follow it as well. You can typically find it via:
        
        - The **Security** tab → **"Security policy"**, or
        - A `SECURITY.md` file in the repository.
        
        If you opened this issue by mistake, you may close it and re-submit your report through the private vulnerability reporting flow described above.
        
        ---
        If you are unable to use the GitHub Security tab for any reason, please contact the maintainers using the method described in the Security Policy and avoid sharing sensitive details publicly.
