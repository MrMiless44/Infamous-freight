name: Security issue reporting
description: Instructions for reporting a potential security vulnerability privately
title: "[Security]: "
labels:
  - security

body:
  - type: markdown
    attributes:
      value: |
        **Do not disclose security vulnerabilities in public issues.**

        This project uses a private, responsible disclosure process for security reports.

        Please report potential vulnerabilities by following our **Security Policy**:

        - Open the **Security** tab of this repository on GitHub and follow the instructions there; or
        - If this repository includes a `SECURITY.md` file, follow the reporting process described in that document.

        Do not include exploit details, credentials, personal data, or any other sensitive information in this public issue tracker.
