name: Security issue reporting
description: Report a potential security vulnerability
title: "[Security]: "

labels: ["security"]

body:

- type: textarea
  id: vulnerability_description
  - type: markdown
    attributes:
      value: |
        Thank you for taking the time to report a potential security vulnerability.

        To protect our users, **do not disclose security vulnerabilities in public issues.**

        Please follow our security policy and the instructions in `SECURITY.md` (or the security contact links shown on the repository) to report vulnerabilities through a private and responsible disclosure channel.

        If you arrived here from the issue chooser, please close this draft and use the private security reporting channel instead.
