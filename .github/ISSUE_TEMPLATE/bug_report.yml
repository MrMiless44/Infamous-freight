name: Bug Report
description: Report a reproducible bug
title: "[Bug]: "
labels: ["bug"]

body:

- type: textarea
  attributes:
    label: Description
    description: What happened?
  validations:
    required: true

- type: textarea
  attributes:
    label: Steps to reproduce
    description: How can we reproduce the issue?
  validations:
    required: true

- type: textarea
  attributes:
    label: Expected behavior
    description: What should happen?

- type: input
  attributes:
    label: Environment
    placeholder: Node version, OS, browser, etc.

- type: textarea
  attributes:
    label: Logs or screenshots
