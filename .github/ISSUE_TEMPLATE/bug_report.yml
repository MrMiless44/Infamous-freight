name: Bug report
description: Report a reproducible bug
title: "fix: "
labels: [bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What broke?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List exact steps.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See error ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Remove secrets before pasting.
      render: shell
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - API
        - Web
        - CI/CD
        - Deployment
        - Database
        - Docs
        - Other
    validations:
      required: true
