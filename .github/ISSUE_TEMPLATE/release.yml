name: Release
description: Production deployment checklist
title: "[Release]: "
labels:
  - release

body:
  - type: markdown
    attributes:
      value: |
        Confirm the following before releasing.

  - type: checkboxes
    id: checklist
    attributes:
      label: Checklist
      options:
        - label: CI is green
          required: true
        - label: Tests are passing
          required: true
        - label: Security scan is clean
          required: true
        - label: Version has been updated
          required: true
        - label: Release notes are ready
          required: true
        - label: Deployment plan is ready
          required: true
        - label: Rollback plan is ready
          required: true

  - type: textarea
    id: scope
    attributes:
      label: Release scope
      description: What is included in this release?
      placeholder: Summarize the changes shipping in this release.
    validations:
      required: true

  - type: textarea
    id: risks
    attributes:
      label: Risks / notes
      description: Known risks, migrations, or operator notes.
      placeholder: Add deployment caveats or known risks.
    validations:
      required: false
