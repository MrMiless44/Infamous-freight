version: 2

updates:
  # Root JS/TS dependencies (Next.js / tooling)
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
      time: "04:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 10
    labels:
      - automated
      - dependencies
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions dependencies
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      time: "05:00"
      timezone: "America/Chicago"
    open-pull-requests-limit: 5
    labels:
      - automated
      - ci
      - dependencies
    commit-message:
      prefix: "chore"
      include: "scope"

  # API dependencies
  - package-ecosystem: "npm"
    directory: "/api"
    schedule:
      interval: "daily"
      time: "04:10"
      timezone: "America/Chicago"
    open-pull-requests-limit: 10
    labels:
      - automated
      - dependencies
      - infra
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  # Mobile dependencies
  - package-ecosystem: "npm"
    directory: "/mobile"
    schedule:
      interval: "daily"
      time: "04:20"
      timezone: "America/Chicago"
    open-pull-requests-limit: 10
    labels:
      - automated
      - dependencies
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      minor-and-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"
