# Dependabot configuration for automated dependency updates and security scanning
# https://docs.github.com/github/administering-a-repository/configuration-options-for-dependency-updates

version: 2
updates:
  # DevContainers configuration
  - package-ecosystem: "devcontainers"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "02:00"

  # Root-level dependencies
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:00"
    open-pull-requests-limit: 5
    reviewers:
      - "MrMiless44"
    labels:
      - "dependencies"
    versioning-strategy: increase
    commit-message:
      prefix: "chore(deps)"
      include: "scope"

  # API service
  - package-ecosystem: "npm"
    directory: "/api"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "03:30"
    open-pull-requests-limit: 5
    reviewers:
      - "MrMiless44"
    labels:
      - "dependencies"
      - "api"
    versioning-strategy: increase

  # Web application
  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:00"
    open-pull-requests-limit: 5
    reviewers:
      - "MrMiless44"
    labels:
      - "dependencies"
      - "web"
    versioning-strategy: increase

  # Shared package
  - package-ecosystem: "npm"
    directory: "packages/shared"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "04:30"
    open-pull-requests-limit: 5
    reviewers:
      - "MrMiless44"
    labels:
      - "dependencies"
      - "shared"
    versioning-strategy: increase

  # E2E tests
  - package-ecosystem: "npm"
    directory: "tests/e2e"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:00"
    open-pull-requests-limit: 5
    reviewers:
      - "MrMiless44"
    labels:
      - "dependencies"
      - "e2e"
    versioning-strategy: increase

  # GitHub Actions
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "05:30"
    open-pull-requests-limit: 5
    reviewers:
      - "MrMiless44"
    labels:
      - "dependencies"
      - "github-actions"

  # Docker
  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
    open-pull-requests-limit: 5
    reviewers:
      - "MrMiless44"
    labels:
      - "dependencies"
      - "docker"
