version: 2
updates:
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: daily
      day: everyday
      time: "09:00"
      timezone: America/Chicago
    open-pull-requests-limit: 5
    labels:
      - dependencies
    groups:
      npm-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
      time: "09:30"
      timezone: America/Chicago
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - github-actions
