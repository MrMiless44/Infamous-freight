name: "Infamous Freight CodeQL Config"

disable-default-queries: false

queries:
  - uses: security-and-quality

paths:
  - apps
  - packages
  - prisma
  - scripts

paths-ignore:
  - "**/node_modules/**"
  - "**/dist/**"
  - "**/build/**"
  - "**/.next/**"
  - "**/coverage/**"
  - "**/.turbo/**"
  - "**/generated/**"
  - "**/*.min.js"
  - "**/*.bundle.js"
