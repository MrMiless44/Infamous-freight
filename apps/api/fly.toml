app = "infamous-freight-api"
primary_region = "ord"

# Multi-region configuration for global deployment
[deploy]
  strategy = "rolling"

# Scale to multiple regions globally
[regions]
  ord = true  # Chicago (primary)
  iad = true  # Washington DC (US East)
  sjc = true  # San Jose (US West)
  lhr = true  # London (Europe)
  fra = true  # Frankfurt (Europe)
  nrt = true  # Tokyo (Asia)
  syd = true  # Sydney (Oceania)
  gru = true  # São Paulo (South America)

[build]
  dockerfile = "api/Dockerfile"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1

  [http_service.concurrency]
    type = "requests"
    soft_limit = 50
    hard_limit = 100

  [[http_service.checks]]
    interval = "10s"
    timeout = "2s"
    grace_period = "20s"
    method = "GET"
    path = "/health"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 1024
