<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Infamous Freight</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { width: 360px; min-height: 400px; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Arial, sans-serif; background: #0a0a0a; color: white; }
  .header { background: linear-gradient(135deg, #ff3d00, #ff6d00); padding: 24px; text-align: center; }
  .header h1 { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
  .header p { font-size: 12px; margin-top: 4px; opacity: 0.9; }
  .content { padding: 20px; }
  .section { margin-bottom: 20px; }
  .section-title { font-size: 11px; text-transform: uppercase; color: #888; letter-spacing: 0.5px; margin-bottom: 10px; }
  .input-group { display: flex; gap: 8px; margin-bottom: 10px; }
  input[type="text"] {
    flex: 1; background: #1a1a1a; border: 1px solid #333; border-radius: 8px;
    padding: 10px 12px; color: white; font-size: 13px; outline: none;
  }
  input:focus { border-color: #ff3d00; }
  .btn {
    width: 100%; padding: 12px; border: none; border-radius: 8px;
    font-size: 14px; font-weight: 600; cursor: pointer; transition: all 0.2s;
  }
  .btn-primary { background: linear-gradient(135deg, #ff3d00, #ff6d00); color: white; }
  .btn-primary:hover { filter: brightness(1.1); }
  .btn-secondary { background: #1a1a1a; color: #888; border: 1px solid #333; }
  .status { display: flex; align-items: center; gap: 8px; padding: 12px; border-radius: 8px; font-size: 13px; }
  .status-connected { background: rgba(76, 175, 80, 0.1); color: #4caf50; }
  .status-disconnected { background: rgba(255, 61, 0, 0.1); color: #ff3d00; }
  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .stat { background: #1a1a1a; border-radius: 8px; padding: 12px; text-align: center; }
  .stat-value { font-size: 22px; font-weight: 700; color: #ff3d00; }
  .stat-label { font-size: 11px; color: #888; margin-top: 2px; }
  .quick-actions { display: flex; gap: 8px; }
  .quick-actions .btn { flex: 1; font-size: 12px; padding: 10px; }
  .divider { height: 1px; background: #222; margin: 16px 0; }
  .footer { padding: 16px; text-align: center; font-size: 11px; color: #555; }
</style>
</head>
<body>
  <div class="header">
    <h1>INFAMOUS FREIGHT</h1>
    <p>Book loads directly from any load board</p>
  </div>

  <div class="content">
    <!-- Not Connected State -->
    <div id="login-state" style="display:none;">
      <div class="section">
        <div class="section-title">Connect Your Account</div>
        <div class="input-group">
          <input type="text" id="api-key-input" placeholder="Paste your API key">
        </div>
        <div class="input-group">
          <input type="text" id="carrier-id-input" placeholder="Carrier ID">
        </div>
        <button class="btn btn-primary" id="connect-btn">Connect Account</button>
        <p style="font-size:11px;color:#666;margin-top:8px;">
          Get your API key from <a href="https://infamousfreight.com/settings/api" target="_blank" style="color:#ff3d00;">Settings → API</a>
        </p>
      </div>
    </div>

    <!-- Connected State -->
    <div id="connected-state" style="display:none;">
      <div class="section">
        <div class="status status-connected">
          <span style="font-size:18px;">●</span>
          <span>Connected to Infamous Freight</span>
        </div>
      </div>

      <div class="section">
        <div class="section-title">Today</div>
        <div class="stats">
          <div class="stat">
            <div class="stat-value" id="stat-booked">0</div>
            <div class="stat-label">Booked</div>
          </div>
          <div class="stat">
            <div class="stat-value" id="stat-rate">$0</div>
            <div class="stat-label">Avg Rate/Mi</div>
          </div>
        </div>
      </div>

      <div class="divider"></div>

      <div class="section">
        <div class="section-title">Quick Actions</div>
        <div class="quick-actions">
          <button class="btn btn-primary" id="open-dashboard">Dashboard</button>
          <button class="btn btn-secondary" id="disconnect-btn">Disconnect</button>
        </div>
      </div>
    </div>
  </div>

  <div class="footer">
    Infamous Freight v1.0.0
  </div>

  <script src="popup.js"></script>
</body>
</html>
