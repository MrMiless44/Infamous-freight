functionsDirectory = "/opt/build/repo/apps/web/.netlify/functions"
functionsDirectoryOrigin = "config-v1"
headersOrigin = "inline"
redirectsOrigin = "inline"

[dev]
command = "pnpm --filter web dev"
port = 8888.0
targetPort = 3000.0
autoLaunch = false

[functions]

[functions."*"]

[[plugins]]
origin = "config"
package = "@netlify/plugin-nextjs"

[plugins.inputs]

[[plugins]]
origin = "ui"
package = "@netlify/plugin-lighthouse"

[plugins.inputs]

[[plugins]]
origin = "ui"
package = "@21yunbox/netlify-plugin-21yunbox-deploy-to-china-cdn"

[plugins.inputs]

[[plugins]]
origin = "ui"
package = "netlify-plugin-a11y"

[plugins.inputs]

[[plugins]]
origin = "ui"
package = "netlify-plugin-checklinks"

[plugins.inputs]

[[plugins]]
origin = "ui"
package = "netlify-plugin-is-website-vulnerable"

[plugins.inputs]

[[plugins]]
origin = "ui"
package = "netlify-plugin-image-optim"

[plugins.inputs]

[[plugins]]
origin = "ui"
package = "netlify-plugin-webmentions"

[plugins.inputs]

[build]
publish = "/opt/build/repo/apps/web/.next"
publishOrigin = "config"
commandOrigin = "config"
command = "pnpm install --frozen-lockfile && pnpm --filter web build"
base = "/opt/build/repo"
functions = "/opt/build/repo/apps/web/.netlify/functions"

[build.environment]
NODE_VERSION = "24"
PNPM_VERSION = "10.15.0"
NEXT_TELEMETRY_DISABLED = "1"
BUILD_TARGET = "netlify"

[build.processing]

[build.processing.css]

[build.processing.html]

[build.processing.images]

[build.processing.js]

[build.services]

[[headers]]
for = "/_next/static/*"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[redirects]]
from = "/_next/image"
to = "/.netlify/images?url=:url&w=:width&q=:quality"
status = 200.0
force = false

[redirects.query]
url = ":url"
w = ":width"
q = ":quality"

[redirects.conditions]

[redirects.headers]

[[redirects]]
from = "/_ipx/*"
to = "/.netlify/images?url=:url&w=:width&q=:quality"
status = 200.0
force = false

[redirects.query]
url = ":url"
w = ":width"
q = ":quality"

[redirects.conditions]

[redirects.headers]