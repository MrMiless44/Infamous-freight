headersOrigin = "config"
redirectsOrigin = "config"
functionsDirectory = "/opt/build/repo/apps/web/apps/web/.netlify/functions"
functionsDirectoryOrigin = "config-v1"

[dev]
command = "pnpm dev"
port = 3000.0
targetPort = 3000.0
autoLaunch = false

[functions]

[functions."*"]

[[plugins]]
origin = "config"
package = "@netlify/plugin-nextjs"

[plugins.inputs]

[[plugins]]
origin = "ui"
package = "@netlify/plugin-lighthouse"
pinned_version = "6.0.1"

[plugins.inputs]

[build]
publish = "/opt/build/repo/apps/web/apps/web/.next"
publishOrigin = "config"
commandOrigin = "config"
command = "cd ../.. && pnpm install --frozen-lockfile && pnpm --filter web build"
base = "/opt/build/repo/apps/web"
functions = "/opt/build/repo/apps/web/apps/web/.netlify/functions"

[build.environment]
NODE_VERSION = "20.19.0"
PNPM_VERSION = "9.15.0"
NPM_FLAGS = "--version"
NEXT_TELEMETRY_DISABLED = "1"

[build.processing]

[build.processing.css]

[build.processing.html]

[build.processing.images]

[build.processing.js]

[build.services]

[[headers]]
for = "/*"

[headers.values]
X-Frame-Options = "DENY"
X-Content-Type-Options = "nosniff"
X-XSS-Protection = "1; mode=block"
Referrer-Policy = "strict-origin-when-cross-origin"
Permissions-Policy = "camera=(), microphone=(), geolocation=()"
Strict-Transport-Security = "max-age=31536000; includeSubDomains"

[[headers]]
for = "/_next/static/*"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
for = "/api/*"

[headers.values]
Cache-Control = "no-store, max-age=0"

[[redirects]]
from = "/api/supabase/*"
to = "https://supabase.com/:splat"
status = 200.0
force = false

[redirects.query]

[redirects.conditions]

[redirects.headers]