functionsDirectory = "/opt/build/repo/apps/web/.netlify/functions"
functionsDirectoryOrigin = "config-v1"

[[headers]]
for = "/*"

[headers.values]
Strict-Transport-Security = "max-age=63072000; includeSubDomains; preload"
X-Frame-Options = "DENY"
X-Content-Type-Options = "nosniff"
Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
for = "/_next/static/*"

[headers.values]
Cache-Control = "public, max-age=31536000, immutable"
[dev]
command = "pnpm --filter web dev"
port = 8888
targetPort = 3000
autoLaunch = false

[functions]

[functions."*"]

[[plugins]]
origin = "config"
package = "@netlify/plugin-nextjs"

[plugins.inputs]

[[plugins]]
origin = "ui"
package = "@netlify/plugin-lighthouse"

[plugins.inputs]

[build]
publish = "/opt/build/repo/apps/web/.next"
publishOrigin = "config"
commandOrigin = "config"
command = "pnpm install --frozen-lockfile && pnpm --filter web build"
base = "/opt/build/repo"
functions = "/opt/build/repo/apps/web/.netlify/functions"

[build.environment]
NODE_VERSION = "24"
PNPM_VERSION = "10.15.0"
NEXT_TELEMETRY_DISABLED = "1"
BUILD_TARGET = "netlify"

[build.processing]

[build.processing.css]

[build.processing.html]

[build.processing.images]

[build.processing.js]

[build.services]