from = "http://infamousfreight.com/*"
to = "https://www.infamousfreight.com/:splat"
status = 301.0
force = true

[redirects.query]

[redirects.conditions]

[redirects.headers]

[[redirects]]
from = "http://www.infamousfreight.com/*"
to = "https://www.infamousfreight.com/:splat"
status = 301.0
force = true

[redirects.query]

[redirects.conditions]

[redirects.headers]

