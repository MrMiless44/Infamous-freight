# fly.web.toml - Configuration for Web Frontend (Next.js)
# Deploy with: flyctl deploy --config fly.web.toml
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.

app = 'infamous-freight-enterprises-ra8cwg'
primary_region = 'ord'
kill_signal = "SIGINT"
kill_timeout = "5s"

[build]
  builder = "paketobuildpacks/builder:base"
  buildpacks = ["gcr.io/paketo-buildpacks/nodejs"]

[env]
  PORT = "3000"
  NODE_ENV = "production"
  # Set in secrets: NEXT_PUBLIC_API_URL

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/"

  [http_service.concurrency]
    type = "requests"
    hard_limit = 250
    soft_limit = 200

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1

# Static asset configuration for Next.js
[[statics]]
  guest_path = "/app/web/.next/static"
  url_prefix = "/_next/static"
