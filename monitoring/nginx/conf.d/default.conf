# Server configuration for blue-green deployment
# To switch deployments, change upstream api_active to point to api_green or api_blue

server {
  listen 80;
  server_name _;
  client_max_body_size 50M;

  # Health check endpoint (direct to blue for availability check)
  location /health {
    access_log off;
    proxy_pass http://api-blue:4000/api/health;
    proxy_read_timeout 5s;
    proxy_connect_timeout 2s;
  }

  # API routes with load balancing
  location /api/ {
    limit_req zone=api_limit burst=20 nodelay;

    # Add custom headers
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Forwarded-Host $server_name;
    proxy_set_header X-Request-ID $request_id;

    # Proxy settings
    proxy_pass http://api_active;
    proxy_http_version 1.1;
    proxy_set_header Connection "";
    
    proxy_read_timeout 30s;
    proxy_connect_timeout 5s;
    proxy_send_timeout 30s;

    # Buffering
    proxy_buffering on;
    proxy_buffer_size 4k;
    proxy_buffers 24 4k;
    proxy_busy_buffers_size 8k;
  }

  # Web app
  location / {
    limit_req zone=web_limit burst=50 nodelay;

    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header X-Request-ID $request_id;

    proxy_pass http://web_upstream;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection "upgrade";

    proxy_read_timeout 30s;
    proxy_connect_timeout 5s;

    # Cache static assets
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
      proxy_pass http://web_upstream;
      proxy_cache_valid 200 30d;
      proxy_cache_valid 404 1h;
      add_header Cache-Control "public, max-age=2592000, immutable";
    }
  }

  # Nginx status endpoint (internal only)
  location /nginx-status {
    stub_status on;
    access_log off;
    allow 127.0.0.1;
    allow 172.16.0.0/12;  # Docker internal network
    deny all;
  }

  # Block sensitive paths
  location ~ /\.ht { deny all; }
  location ~ /\.env { deny all; }
  location ~ /config\.php { deny all; }

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
}

# Blue-Green manual switch endpoints (admin only)
server {
  listen 8080;
  server_name _;

  location /switch-to-blue {
    access_log off;
    allow 127.0.0.1;
    allow 172.16.0.0/12;
    deny all;
    
    return 200 "Switched to blue deployment\nUpdate upstream api_active to point to api-blue:4000\n";
  }

  location /switch-to-green {
    access_log off;
    allow 127.0.0.1;
    allow 172.16.0.0/12;
    deny all;

    return 200 "Switched to green deployment\nUpdate upstream api_active to point to api-green:4000\n";
  }

  location /current-deployment {
    access_log off;
    allow 127.0.0.1;
    allow 172.16.0.0/12;
    deny all;

    return 200 "Current deployment: blue\nAPI at: api-blue:4000\n";
  }
}
