version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: infamous-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-infamous}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-changeme}
      POSTGRES_DB: ${DB_NAME:-infamous_freight}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-infamous} -d ${DB_NAME:-infamous_freight}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - infamous-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: infamous-redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD:-changeme}
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - infamous-network

  # API Backend
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: infamous-api
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3001
      DATABASE_URL: postgresql://${DB_USER:-infamous}:${DB_PASSWORD:-changeme}@postgres:5432/${DB_NAME:-infamous_freight}?schema=public
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_PASSWORD: ${REDIS_PASSWORD:-changeme}
      JWT_SECRET: ${JWT_SECRET:-changeme}
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_SERVICE_KEY: ${SUPABASE_SERVICE_KEY}
      DAT_API_KEY: ${DAT_API_KEY}
      TRUCKSTOP_API_KEY: ${TRUCKSTOP_API_KEY}
      LOADBOARD_API_KEY: ${LOADBOARD_API_KEY}
      QBO_CLIENT_ID: ${QBO_CLIENT_ID}
      QBO_CLIENT_SECRET: ${QBO_CLIENT_SECRET}
      XERO_CLIENT_ID: ${XERO_CLIENT_ID}
      XERO_CLIENT_SECRET: ${XERO_CLIENT_SECRET}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY}
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - infamous-network
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M

  # Frontend (static served by nginx)
  web:
    image: nginx:alpine
    container_name: infamous-web
    restart: unless-stopped
    volumes:
      - ./apps/web/dist:/usr/share/nginx/html:ro
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - api
    networks:
      - infamous-network

volumes:
  postgres_data:
  redis_data:

networks:
  infamous-network:
    driver: bridge
